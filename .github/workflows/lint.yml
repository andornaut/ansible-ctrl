name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: collections-${{ hashFiles('requirements.yml') }}
          restore-keys: collections-

      - name: Install ansible-lint
        run: pip install ansible-lint

      # Install the collections the roles use so ansible-lint's syntax-check can
      # validate their module arguments; without them those modules are unknown.
      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      # roles are local, but the playbooks use community.*/ansible.posix modules;
      # install the collections so FQCN references resolve during the parse.
      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      # The real inventory is gitignored, so parse against tests/inventory.ini,
      # which just supplies a resolvable member for every targeted group.
      - name: Syntax-check every playbook
        run: |
          status=0
          for pb in *.yml; do
            [ "$pb" = requirements.yml ] && continue
            echo "== $pb =="
            ansible-playbook --syntax-check -i tests/inventory.ini "$pb" || status=1
          done
          exit $status

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Lint every shell script under roles/, discovered by shebang rather than
      # an enumerated list, so a new script in any role is covered automatically.
      # A script is a file under templates/ or files/ whose FIRST line is a
      # bash/sh shebang (checked on line 1 only, so a #! line deeper in a
      # non-script file is not mistaken for one). ShellCheck cannot parse Jinja2,
      # so scripts under templates/ are rendered first by replacing {{ ... }}
      # expressions with a placeholder and stripping {% ... %} tags; scripts
      # under files/ are linted as-is. The output name is the repo-relative path
      # flattened (/ -> _), so scripts sharing a basename across roles cannot
      # overwrite each other.
      - name: Render shell scripts
        run: |
          mkdir -p .ci-shellcheck
          while IFS= read -r src; do
            IFS= read -r firstline < "$src" || true
            grep -qE '^#!.*\b(bash|sh)\b' <<< "$firstline" || continue
            dest=".ci-shellcheck/${src//\//_}"
            dest="${dest%.j2}.sh"
            if [[ "$src" == */templates/* ]]; then
              sed -E \
                -e 's/\{\{[^}]*\}\}/PLACEHOLDER/g' \
                -e 's/\{%[^%]*%\}//g' \
                "$src" > "$dest"
            else
              cp "$src" "$dest"
            fi
          done < <(find roles/ -type f \( -path '*/templates/*' -o -path '*/files/*' \))

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .ci-shellcheck
