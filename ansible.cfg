[defaults]
collections_path = .ansible/collections
display_failed_stderr = yes
# No fact_caching: the cache is shared by every invocation, and the cert-renewal cron runs
# ansible as root, so it cached facts describing root (user_id, user_dir, env.HOME) and
# every later run reused them for the rest of the day. Facts are cheap to gather and are
# now always the ones belonging to the run that gathered them.
gathering = smart
interpreter_python = auto_silent
inventory = ./hosts
nocows = True
result_format = yaml
roles_path = .ansible/roles

[ssh_connection]
# Pipelining requires that sudoers does not set requiretty, which Ubuntu does not.
pipelining = True
# Compression (-C) is omitted from the default ssh_args: it costs CPU on a LAN.
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o PreferredAuthentications=publickey
