---
# Directory containing GitHub repositories
ai_maintainer_base_dir: "{{ ansible_env.HOME }}/src/github.com/{{ ansible_user_id }}"

# AI agent configuration
ai_maintainer_agent_command: "claude"
ai_maintainer_agent_flags: "--dangerously-skip-permissions"

# Cron schedule (default: weekly on Sunday at 3 AM)
ai_maintainer_cron_minute: "0"
ai_maintainer_cron_hour: "3"
ai_maintainer_cron_day: "*"
ai_maintainer_cron_weekday: "0"

# Script customizations
ai_maintainer_dependency_min_age_days: 30
ai_maintainer_exclude_repositories: []
ai_maintainer_script_args: "--quiet"
ai_maintainer_script_path: "{{ ansible_env.HOME }}/.local/bin/ai-maintainer"
