---
- name: Get the latest version of filectrl
  ansible.builtin.uri:
    url: https://api.github.com/repos/andornaut/filectrl/releases/latest
    return_content: true
  register: base_filectrl_release

- name: Set filectrl download URL fact
  ansible.builtin.set_fact:
    base_filectrl_download_url: >-
      {{ base_filectrl_release.json.assets
      | selectattr('name', 'match', 'filectrl-linux')
      | map(attribute='browser_download_url') | first }}

- name: Download filectrl binary
  ansible.builtin.get_url:
    url: "{{ base_filectrl_download_url }}"
    dest: /usr/local/bin/filectrl
    mode: "0755"
    force: true
  become: true
