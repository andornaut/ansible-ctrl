---
- name: Remove snap
  become: true
  block:
    # Purging snapd also removes ubuntu-server-minimal (hard-dependency); nothing else is
    # orphaned. See README.
    - name: Purge and pin snap packages
      ansible.builtin.include_tasks: purge-and-pin.yml
      vars:
        purge_pin_name: snap
        purge_pin_packages: "{{ base_snap_packages }}"

    - name: Find user snap directories
      ansible.builtin.find:
        paths: /home
        patterns: snap
        depth: 2
        file_type: directory
        recurse: true
      register: base_snap_directories_result

    - name: Remove the discovered snap directories
      ansible.builtin.file:
        path: "{{ item.path | default(item) }}"
        state: absent
      loop: "{{ base_snap_directories_result.files + ['/root/snap', '/var/cache/snapd'] }}"

    # Purging snapd leaves dangling .wants symlinks in per-user ~/.config/systemd/user;
    # resolved by unit name, they outlive the units and systemd reports not-found at login.
    - name: Find user systemd unit directories
      ansible.builtin.find:
        paths: /home
        file_type: directory
      register: base_home_directories_result

    # snap.* matches the per-snap units; snapd.* matches snapd's own session-agent units,
    # which snap.* misses (it requires a literal dot after "snap").
    - name: Find leftover snap enable symlinks
      ansible.builtin.find:
        paths: "{{ (base_home_directories_result.files | map(attribute='path') | list + ['/root'])
          | product(['/.config/systemd/user']) | map('join') | list }}"
        patterns:
          - snap.*
          - snapd.*
        depth: 2
        file_type: link
        recurse: true
      register: base_snap_links_result

    - name: Remove the discovered snap enable symlinks
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ base_snap_links_result.files }}"
      loop_control:
        label: "{{ item.path }}"
