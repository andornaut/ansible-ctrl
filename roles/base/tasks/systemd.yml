---
# Unit start timeout (Default: 90s)
- name: Configure Systemd DefaultTimeoutStartSec
  ansible.builtin.lineinfile:
    path: /etc/systemd/system.conf
    line: DefaultTimeoutStartSec=30
    regexp: DefaultTimeoutStartSec
  become: true
  notify: Reload systemd

# Unit stop timeout (Default: 90s)
- name: Configure Systemd DefaultTimeoutStopSec
  ansible.builtin.lineinfile:
    path: /etc/systemd/system.conf
    line: DefaultTimeoutStopSec=30
    regexp: DefaultTimeoutStopSec
  become: true
  notify: Reload systemd

# Delay between automatic unit restarts (Default: 100s)
- name: Configure Systemd DefaultRestartSec
  ansible.builtin.lineinfile:
    path: /etc/systemd/system.conf
    line: DefaultRestartSec=30
    regexp: DefaultRestartSec
  become: true
  notify: Reload systemd

# Max unit starts per interval before systemd refuses further starts (Default: 5)
- name: Configure Systemd DefaultStartLimitBurst
  ansible.builtin.lineinfile:
    path: /etc/systemd/system.conf
    line: DefaultStartLimitBurst=3
    regexp: DefaultStartLimitBurst
  become: true
  notify: Reload systemd

# Start-limit interval span (Default: 10s)
- name: Configure Systemd DefaultStartLimitIntervalSec
  ansible.builtin.lineinfile:
    path: /etc/systemd/system.conf
    line: DefaultStartLimitIntervalSec=15
    regexp: DefaultStartLimitIntervalSec
  become: true
  notify: Reload systemd

# Cap total journal disk usage (Default: 10% of the filesystem).
- name: Configure journald SystemMaxUse
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    line: SystemMaxUse=500M
    regexp: '^#?\s*SystemMaxUse\s*='
  become: true
  notify: Restart systemd-journald

# Cap journal retention by age; with SystemMaxUse, whichever limit hits first wins
# (Default: none).
- name: Configure journald MaxRetentionSec
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    line: MaxRetentionSec=4week
    regexp: '^#?\s*MaxRetentionSec\s*='
  become: true
  notify: Restart systemd-journald
