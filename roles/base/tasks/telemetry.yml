---
- name: Disable telemetry and crash reporting
  become: true
  block:
    # apport/whoopsie/kerneloops/ubuntu-report/popularity-contest are default reporters.
    # ubuntu-server* Depend on apport, so the pin makes dist-upgrade drop them (already
    # gone via the snapd purge); desktop metapackages only Recommend them.
    - name: Purge and pin telemetry packages
      ansible.builtin.include_tasks: purge-and-pin.yml
      vars:
        purge_pin_name: telemetry
        purge_pin_packages: "{{ base_telemetry_packages }}"

    # ubuntu-insights leaves per-user state (~/.config, ~/.cache) that purge doesn't touch.
    # Sweep every home; depth 3 reaches <home>/.cache/ubuntu-insights.
    - name: Find leftover ubuntu-insights user state
      ansible.builtin.find:
        depth: 3
        file_type: directory
        paths:
          - /home
          - /root
        patterns: ubuntu-insights
        recurse: true
      register: base_telemetry_insights_state

    - name: Remove leftover ubuntu-insights user state
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ base_telemetry_insights_state.files }}"
      loop_control:
        label: "{{ item.path }}"

    # update-notifier-crash.service is static (mask, not disable) and fails once whoopsie is
    # purged. Mask both it and its triggering .path unit; masking in /etc/systemd/user covers
    # every user. No handler: it affects only per-user managers, which pick it up on next load.
    - name: Mask update-notifier-crash units for all users
      ansible.builtin.file:
        dest: "/etc/systemd/user/{{ item }}"
        force: true
        src: /dev/null
        state: link
      loop:
        - update-notifier-crash.path
        - update-notifier-crash.service
