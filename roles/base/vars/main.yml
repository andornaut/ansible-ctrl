---
# Role-internal values in vars/ (not defaults/) so they outrank host_vars: a host cannot
# desync base_arch from its fact or override the purge sets.

# GoReleaser arch name for the gog/mrs release assets: keeps x86_64, maps aarch64 to arm64.
base_arch: >-
  {{ {'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}

# Purged and negatively pinned by tasks/cloud-init.yml.
base_cloud_init_packages:
  - cloud-init
  - cloud-init-base

# Purged and negatively pinned by tasks/snap.yml.
base_snap_packages:
  - gnome-software-plugin-snap
  - snapd

# Purged and negatively pinned by tasks/telemetry.yml.
base_telemetry_packages:
  - apport
  - kerneloops
  - popularity-contest
  - ubuntu-insights
  - ubuntu-report
  - whoopsie
