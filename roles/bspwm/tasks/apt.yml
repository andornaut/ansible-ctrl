---
# X11 tools that have a true Wayland replacement in the niri role: scrot -> grim and
# slurp, xscreensaver -> hypridle and hyprlock, xbacklight -> brightnessctl. The X11 tools
# that both sessions use (niri runs them as XWayland clients) are installed by the desktop
# role's apt_tiling.yml, and xdotool by its apt.yml.
#
# xscreensaver blanks, locks and powers down the display on its own timers, which the
# desktop role writes to ~/.xscreensaver. It is built from source by xscreensaver.yml
# rather than installed here, because Ubuntu ships a build from October 2023.
- name: Install X11 system packages and build dependencies
  ansible.builtin.apt:
    name:
      # Provides /etc/X11/Xsession.d/95dbus_update-activation-env, which runs
      # `dbus-update-activation-environment --systemd --all` during login and imports the
      # session environment (notably XDG_SESSION_TYPE) into the systemd --user manager.
      # Without it that manager never learns XDG_SESSION_TYPE, so systemd-restarted user
      # services inherit an empty value: eww then reads it as not-x11 and hides the bspwm
      # workspace switcher until the next login. ly launches the session through
      # /etc/X11/Xsession, so the hook fires when this package is present.
      - dbus-x11
      - dex
      - scrot
      - xbacklight
      - xorg
      # Build dependencies for the projects in bspwm_projects, which are
      # compiled from source by bspwm.yml.
      - libasound2-dev
      - libcairo2-dev
      - libx11-xcb-dev
      - libxcb1-dev
      - libxcb-ewmh-dev
      - libxcb-icccm4-dev
      - libxcb-keysyms1-dev
      - libxcb-xkb-dev
      - libxcb-randr0-dev
      - libxcb-render-util0-dev
      - libxcb-shape0-dev
      - libxcb-util0-dev
      - libxcb-xinerama0-dev
      - libxcb-xtest0-dev
      - libxft-dev
      - libxinerama-dev
      - libxpm-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true
