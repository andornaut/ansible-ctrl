---
# X11 session tools and the build dependencies for bspwm_projects (compiled by bspwm.yml).
# scrot, xsecurelock, xss-lock and xbacklight have Wayland replacements in the niri role;
# X11 tools both sessions share live in the desktop role.
- name: Install X11 system packages and build dependencies
  ansible.builtin.apt:
    name:
      # Provides the /etc/X11/Xsession.d hook that imports the session environment
      # (notably XDG_SESSION_TYPE) into the systemd --user manager. Without it, eww reads an
      # empty XDG_SESSION_TYPE and hides the bspwm workspace switcher until the next login.
      - dbus-x11
      - dex
      - scrot
      - xbacklight
      - xorg
      - xsecurelock
      - xss-lock
      # Build dependencies for bspwm_projects.
      - libasound2-dev
      - libcairo2-dev
      - libx11-xcb-dev
      - libxcb1-dev
      - libxcb-ewmh-dev
      - libxcb-icccm4-dev
      - libxcb-keysyms1-dev
      - libxcb-xkb-dev
      - libxcb-randr0-dev
      - libxcb-render-util0-dev
      - libxcb-shape0-dev
      - libxcb-util0-dev
      - libxcb-xinerama0-dev
      - libxcb-xtest0-dev
      - libxft-dev
      - libxinerama-dev
      - libxpm-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true
