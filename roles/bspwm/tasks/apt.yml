---
# X11 tools that have a true Wayland replacement in the niri role: scrot -> grim and
# slurp, xscreensaver -> hypridle and hyprlock, xbacklight -> brightnessctl. The X11 tools
# that both sessions use (niri runs them as XWayland clients) are installed by the desktop
# role's apt_tiling.yml, and xdotool by its apt.yml.
#
# xscreensaver blanks, locks and powers down the display on its own timers, which the
# desktop role writes to ~/.xscreensaver. It is installed here rather than by that role,
# which owns the timeout policy but not the X11 mechanism.
- name: Install X11 system packages and build dependencies
  ansible.builtin.apt:
    name:
      - dex
      - scrot
      - xbacklight
      - xorg
      - xscreensaver
      # Build dependencies for the projects in bspwm_projects, which are
      # compiled from source by bspwm.yml.
      - libasound2-dev
      - libcairo2-dev
      - libx11-xcb-dev
      - libxcb1-dev
      - libxcb-ewmh-dev
      - libxcb-icccm4-dev
      - libxcb-keysyms1-dev
      - libxcb-xkb-dev
      - libxcb-randr0-dev
      - libxcb-render-util0-dev
      - libxcb-shape0-dev
      - libxcb-util0-dev
      - libxcb-xinerama0-dev
      - libxcb-xtest0-dev
      - libxft-dev
      - libxinerama-dev
      - libxpm-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# CLEANUP (added 2026-07-10): remove once every bspwm desktop host has converged.
#
# Both are superseded by xscreensaver, which blanks, locks and powers down the display
# itself. Purging them matters beyond tidiness, because either one left installed fights
# xscreensaver for the same X screensaver extension:
#
# gnome-screensaver is a GNOME 3.6-era program that Ubuntu still ships but no longer uses.
# On startup it zeroes the X screensaver timeout, so a session that runs it never blanks,
# and it then locks on its own timer read from org.gnome.desktop.session/idle-delay rather
# than on the role's.
#
# xautolock was the idle trigger, and it invoked gnome-screensaver to do the locking. No
# role ever installed gnome-screensaver, so on a host that never happened to have it,
# xautolock spent every idle period running a command that did not exist. It reports
# nothing when its locker is missing, so the session simply never locked.
- name: Purge the superseded screen lockers
  ansible.builtin.apt:
    name:
      - gnome-screensaver
      - xautolock
    state: absent
    purge: true
    autoremove: true
  become: true
