---
# Built from source: Ubuntu ships 6.08 (Oct 2023) and nothing packages
# bspwm_xscreensaver_version. Only the driver is built; the top-level make would also compile
# hundreds of never-run screen hacks (the desktop role writes `mode: blank`). `make -C driver
# install` still installs the PAM config, app-defaults and systemd unit.
#
# xscreensaver-auth must be setuid root and separate from the daemon so a daemon or hack
# crash can't unlock the screen. The Makefile only warns when it can't set setuid, so it is
# asserted below rather than trusted.
- name: Install xscreensaver build dependencies
  ansible.builtin.apt:
    name:
      - bc
      - build-essential
      - intltool
      - libcap-dev
      - libgdk-pixbuf-2.0-dev
      - libgl-dev
      - libgle-dev
      - libglu1-mesa-dev
      - libgtk-3-dev
      - libjpeg-dev
      - libpam0g-dev
      - libpng-dev
      - libsystemd-dev
      - libx11-dev
      - libxext-dev
      - libxinerama-dev
      - libxml2-dev
      - libxmu-dev
      - libxrandr-dev
      - libxss-dev
      - libxt-dev
      - libxtst-dev
      - libxxf86vm-dev
      - pkgconf
      - x11proto-core-dev
      - xbitmaps
      - xutils-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# Purged before the build, not after: dpkg owns /etc/pam.d/xscreensaver and `make install`
# overwrites it, so purging afterwards would delete the PAM stack from under the new binary.
# The other lockers are purged at the end of this file, once there is a replacement: removing
# them first leaves a host with no locker if the build fails.
- name: Purge the packaged xscreensaver
  ansible.builtin.apt:
    name: xscreensaver
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Check the installed xscreensaver version
  ansible.builtin.command: /usr/local/bin/xscreensaver --version
  register: bspwm_xscreensaver_installed
  changed_when: false
  failed_when: false

- name: Build and install xscreensaver
  when: bspwm_xscreensaver_version not in (bspwm_xscreensaver_installed.stdout | default(''))
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: bspwm_xscreensaver_tmp

    # The checksum pins the unsigned tarball (the only tie between what is built and what was
    # reviewed). Downloaded separately because unarchive's remote_src has no checksum param.
    - name: Download xscreensaver
      ansible.builtin.get_url:
        url: "{{ bspwm_xscreensaver_url }}"
        dest: "{{ bspwm_xscreensaver_tmp.path }}/xscreensaver.tar.gz"
        checksum: "sha256:{{ bspwm_xscreensaver_sha256 }}"
        mode: "0644"

    - name: Unarchive xscreensaver
      ansible.builtin.unarchive:
        src: "{{ bspwm_xscreensaver_tmp.path }}/xscreensaver.tar.gz"
        dest: "{{ bspwm_xscreensaver_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Configure xscreensaver
      ansible.builtin.command: ./configure --prefix=/usr/local
      args:
        chdir: "{{ bspwm_xscreensaver_tmp.path }}"
      changed_when: true

    - name: Build the xscreensaver utility objects
      community.general.make:
        chdir: "{{ bspwm_xscreensaver_tmp.path }}/utils"

    - name: Build the xscreensaver driver
      community.general.make:
        chdir: "{{ bspwm_xscreensaver_tmp.path }}/driver"

    - name: Install xscreensaver
      community.general.make:
        chdir: "{{ bspwm_xscreensaver_tmp.path }}/driver"
        target: install
      become: true
  always:
    - name: Remove the temporary directory
      ansible.builtin.file:
        path: "{{ bspwm_xscreensaver_tmp.path }}"
        state: absent
      when: bspwm_xscreensaver_tmp.path is defined
      become: true

# Outside the build block so it runs every converge, not just on rebuild: the setuid bit must
# be correct even when the version is unchanged. The Makefile's `install -o root -m 4755`
# lands non-setuid because coreutils install clears setuid when -o/-g is given (and exits 0),
# so set the bit explicitly with chmod.
- name: Make the authentication helper setuid root
  ansible.builtin.file:
    path: /usr/local/libexec/xscreensaver/xscreensaver-auth
    owner: root
    group: root
    mode: "04755"
  become: true

- name: Stat the authentication helper
  ansible.builtin.stat:
    path: /usr/local/libexec/xscreensaver/xscreensaver-auth
  register: bspwm_xscreensaver_auth

# Without the setuid bit authentication silently fails, so assert rather than trust.
- name: Assert that the authentication helper is setuid root
  ansible.builtin.assert:
    that:
      - bspwm_xscreensaver_auth.stat.exists
      - bspwm_xscreensaver_auth.stat.pw_name == "root"
      - bspwm_xscreensaver_auth.stat.mode is search('^4')
    fail_msg: >-
      /usr/local/libexec/xscreensaver/xscreensaver-auth is not setuid root
      (owner {{ bspwm_xscreensaver_auth.stat.pw_name | default('missing') }},
      mode {{ bspwm_xscreensaver_auth.stat.mode | default('missing') }}). Authentication
      will not work without it.
    success_msg: xscreensaver-auth is setuid root

# Only now, with a working setuid xscreensaver on disk: purging before the build left a failed
# build with no locker (the old locker ran from a deleted binary). Hence the guard, not a bare
# `state: absent`.
- name: Stat the xscreensaver binary
  ansible.builtin.stat:
    path: /usr/local/bin/xscreensaver
  register: bspwm_xscreensaver_binary

# CLEANUP (added 2026-07-10): remove once every bspwm desktop host has converged.
#
# All superseded by xscreensaver: gnome-screensaver and xautolock (an old idle trigger that
# invoked a locker it often lacked), and the xss-lock/i3lock pair that replaced xscreensaver
# for one release (i3lock fails open and grabs no keyboard during the blank-before-lock gap).
- name: Purge the superseded screen lockers
  when: bspwm_xscreensaver_binary.stat.exists
  ansible.builtin.apt:
    name:
      - gnome-screensaver
      - i3lock
      - xautolock
      - xss-lock
    state: absent
    purge: true
    autoremove: true
  become: true
