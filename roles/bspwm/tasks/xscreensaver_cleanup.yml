---
# CLEANUP (added 2026-07-14): remove this file, its import in main.yml and the matching block
# in the desktop role's idle.yml, once every bspwm host in the desktop group has run this
# role. xsecurelock replaced xscreensaver, which this role used to build from source into
# /usr/local; nothing starts it any more, so the build is removed rather than left to rot.
#
# `make install` wrote outside /usr/local as well (the PAM stack and the app-defaults file),
# and the packaged xscreensaver was purged before that build, so none of this is dpkg's to
# clean up.
- name: Remove the source-built xscreensaver
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/X11/app-defaults/XScreenSaver
    - /etc/X11/app-defaults/XScreenSaver-nogl
    - /etc/pam.d/xscreensaver
    - /usr/local/bin/xscreensaver
    - /usr/local/bin/xscreensaver-command
    - /usr/local/bin/xscreensaver-demo
    - /usr/local/bin/xscreensaver-settings
    - /usr/local/lib/systemd/user/xscreensaver.service
    - /usr/local/libexec/xscreensaver
    - /usr/local/share/man/man1/xscreensaver-command.1
    - /usr/local/share/man/man1/xscreensaver-demo.1
    - /usr/local/share/man/man1/xscreensaver-settings.1
    - /usr/local/share/man/man1/xscreensaver.1
    - /usr/local/share/man/man6/xscreensaver-auth.6
    - /usr/local/share/man/man6/xscreensaver-gfx.6
    - /usr/local/share/man/man6/xscreensaver-systemd.6
    - /usr/local/share/xscreensaver
  become: true

# The build dependencies the source build installed, less the ones other roles still ask for.
# They are marked automatic rather than removed: most are pulled in by packages that are still
# wanted (libgtk-3-dev needs libgdk-pixbuf-2.0-dev, the new xterm needs xbitmaps), so apt is
# left to work out what is genuinely orphaned. In practice that is only what was xscreensaver's
# alone: intltool, libcap-dev, libgle-dev, libxmu-dev, libxt-dev, libxxf86vm-dev and
# xutils-dev. Nothing autoremoves here, for the reason purge-and-pin.yml gives in the base
# role: disk-cleanup already runs `apt-get autoremove --purge` weekly, and sweeping orphans
# from a role would take unrelated packages with them.
- name: Mark the xscreensaver build dependencies as automatically installed
  ansible.builtin.command:
    cmd: >-
      apt-mark auto bc intltool libcap-dev libgdk-pixbuf-2.0-dev libgl-dev libgle-dev
      libglu1-mesa-dev libjpeg-dev libpng-dev libxext-dev libxmu-dev libxt-dev libxtst-dev
      libxxf86vm-dev pkgconf x11proto-core-dev xbitmaps xutils-dev
  register: bspwm_xscreensaver_apt_mark
  # apt-mark prints a line per package it changes and nothing at all when there is none.
  changed_when: bspwm_xscreensaver_apt_mark.stdout | length > 0
  become: true

# xterm was installed for the locked-screen indicator that the first xsecurelock version of
# this role shipped, and it was dropped the same day. Nothing else here wants a terminal in
# /usr/bin, and only a host that ran that version has it.
- name: Remove xterm
  ansible.builtin.apt:
    name: xterm
    state: absent
    purge: true
  become: true
