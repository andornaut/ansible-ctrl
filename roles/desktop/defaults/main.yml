---
# desktop_environment is required and has no default: set it per host to
# "niri" or "bspwm" (tiling window managers with lemurs/ly, plus dunst, eww,
# rofi, pavolume) or "gnome" (GNOME Shell with gdm3). The matching window
# manager role is applied by desktop.yml. The role fails fast if it is unset.

desktop_eww_bar: bar
# Extra kernel parameters written to GRUB_CMDLINE_LINUX_DEFAULT. Empty leaves
# the line unset; set per host (e.g. a laptop touchpad scrolling fix).
desktop_grub_cmdline_linux_default: ""
desktop_install_firefox_apt: false
desktop_install_insync: false
# Out-of-tree DKMS Super I/O drivers for CPU/case fan control. Enable the one
# matching the board's chip (they expose the pwm/fan hwmon that CoolerControl
# manages). See it87.yml and nct6687d.yml.
# it87: ITE IT8696E/IT8883 on Gigabyte AM5 boards (the mainline it87 driver does
# not support these chips).
desktop_install_it87: false
desktop_it87_repo: https://github.com/frankcrawford/it87.git
desktop_it87_version: master
# nct6687d: Nuvoton NCT6687D on MSI boards.
desktop_install_nct6687d: false
desktop_nct6687d_repo: https://github.com/Fred78290/nct6687d.git
desktop_nct6687d_version: main
# Web browser set as the xdg-settings default: "firefox" or "google-chrome".
desktop_default_browser: firefox
# Display manager settings
desktop_install_ly: false
desktop_install_lemurs: false
# Must be one of https://ziglang.org/download/community-mirrors.txt
desktop_zig_mirror: https://ziglang.freetls.fastly.net

# Idle timeouts in minutes: the screen blanks, then the session locks, then the monitor
# powers off. They must not decrease in that order; idle.yml fails fast if they do. Only
# X11 tells blanking apart from powering the monitor down, so bspwm honours all three,
# niri ignores the blank timeout, and GNOME ignores the power-off timeout. See idle.yml.
desktop_screen_blank_minutes: 10
desktop_screen_lock_minutes: 20
desktop_screen_off_minutes: 60
# What xscreensaver draws once a bspwm session blanks, written as its `mode` resource.
# "blank" is a black screen; "random" runs the screen hacks, some of which display images
# from the user's home directory.
desktop_xscreensaver_mode: blank

# Archive MIME types associated with file-roller as the default handler. Limited
# to genuine archive formats; container-like types (deb, rpm, iso, apk, jar) are
# intentionally excluded so they keep opening in their proper handlers.
desktop_file_roller_mime_types:
  - application/zip
  - application/x-7z-compressed
  - application/vnd.rar
  - application/x-rar
  - application/x-tar
  - application/gzip
  - application/x-compressed-tar
  - application/x-bzip-compressed-tar
  - application/x-xz-compressed-tar
  - application/x-xz
  - application/x-lzma-compressed-tar
  - application/zstd
  - application/x-zstd-compressed-tar

# Parental controls (malcontent OARS filter + Chrome SafeSearch).
# Set desktop_install_parental_controls: true per host to enable.
desktop_install_parental_controls: false
# OARS content rating ceilings. Apps rated above the given level are hidden in
# gnome-software. Levels: none < mild < moderate < intense.
# Example: sex-nudity: mild blocks anything rated moderate or intense.
desktop_parental_controls_oars: {}
# Chrome managed policies written to /etc/opt/chrome/policies/managed/family.json
# when desktop_install_parental_controls is true. Override per host to adjust.
desktop_chrome_family_policies:
  ForceGoogleSafeSearch: true
  ForceYouTubeRestrict: 1
  DnsOverHttpsMode: "off"

# Web filtering for desktop_user, enforced by the nss-malcontent name service module
# rather than by the browser. "none" leaves it disabled and touches nothing;
# "block-list" allows every domain except those listed; "allow-list" blocks every
# domain except those listed, which is strict enough that a missing CDN or login
# domain breaks a site outright.
#
# Enabling it installs libnss-malcontent and inserts that module into the hosts lookup
# chain in /etc/nsswitch.conf, which is a system-wide change. It only filters users who
# have a compiled list; the module defers for everyone else. DnsOverHttpsMode: "off"
# above is what keeps Chrome resolving through it.
#
# Firefox is handled by malcontent itself, which blocks the use-application-dns.net canary
# domain so that Firefox disables DNS-over-HTTPS rather than resolving past the module.
# That check runs before the per-user list is opened, so the canary is blocked for *every*
# user on the host, not just the filtered one, and every user's Firefox turns DoH off.
desktop_parental_controls_web_filter_type: none
# Filter lists to compile into desktop_user's blocklist, as {id: HTTPS URI}. The id is a
# free-form label. Each list must be a plain newline-separated list of bare hostnames;
# `#` comments and blank lines are ignored. Hosts-file lines ("0.0.0.0 example.com") are
# not accepted, and one malformed line aborts the whole update, leaving the previous
# list in place and an error in /var/lib/malcontent-webd/update-error.
desktop_parental_controls_web_block_lists: {}
desktop_parental_controls_web_allow_lists: {}
# Individual hostnames added alongside the fetched lists. Matching is exact: neither
# these nor the lists match subdomains, so name each host that must be covered.
desktop_parental_controls_web_blocked_hosts: []
desktop_parental_controls_web_allowed_hosts: []
# Force safe search in the search engines malcontent knows how to rewrite.
desktop_parental_controls_web_force_safe_search: true

# Target desktop user account. Defaults to the remote user running the play;
# override per host. This is NOT applied to every task in the role: only the
# few that must act as a specific user (flatpak method:user
# installs via become_user) or read from that user's home use it. It is not a
# blanket privilege-escalation setting.
desktop_user: "{{ ansible_facts['user_id'] }}"

# Apt packages to replace with flatpak equivalents
desktop_flatpak_replacements:
  audacity: org.audacityteam.Audacity
  blender: org.blender.Blender
  filezilla: org.filezillaproject.Filezilla
  gimp: org.gimp.GIMP
  inkscape: org.inkscape.Inkscape
  libreoffice: org.libreoffice.LibreOffice
  vlc: org.videolan.VLC

# Additional flatpak applications
desktop_flatpak_extras:
  - com.obsproject.Studio
  - fr.handbrake.ghb
  - io.missioncenter.MissionCenter
  - org.flameshot.Flameshot
