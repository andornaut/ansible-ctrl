---
- name: Update font cache
  ansible.builtin.command: fc-cache --force
  become: true
  changed_when: true

- name: Update GRUB
  ansible.builtin.command: update-grub
  become: true
  changed_when: true

- name: Reload dconf
  ansible.builtin.command: dconf reset -f /
  become: true
  changed_when: true
