---
# Deferred so it runs after eww.service is installed in a later block.
- name: Restart eww
  ansible.builtin.systemd_service:
    name: eww.service
    daemon_reload: true
    scope: user
    state: restarted
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"

# hypridle is built and started by the niri role, applied after this one. The unit may not
# exist yet on a --tags idle run, which failed_when below tolerates.
- name: Restart hypridle
  ansible.builtin.systemd_service:
    name: hypridle.service
    daemon_reload: true
    scope: user
    state: restarted
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  register: desktop_hypridle_restart
  failed_when:
    - desktop_hypridle_restart is failed
    - "'Could not find the requested service' not in desktop_hypridle_restart.msg | default('')"

# Oneshot with RemainAfterExit, so restart rather than start; it refetches every filter
# list, so only a changed filter fires it.
- name: Recompile the malcontent web filter lists
  ansible.builtin.systemd_service:
    name: malcontent-webd-update.service
    state: restarted
  become: true

- name: Update font cache
  ansible.builtin.command: fc-cache --force
  become: true
  changed_when: true

# GTK reads hicolor's icon-theme.cache in preference to scanning, so a new icon stays
# invisible until it is rebuilt.
- name: Update hicolor icon cache
  ansible.builtin.command: gtk-update-icon-cache --force /usr/share/icons/hicolor
  become: true
  changed_when: true

- name: Update GRUB
  ansible.builtin.command: update-grub
  become: true
  changed_when: true
