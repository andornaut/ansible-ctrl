---
# Deferred to a handler so that it runs after eww.service is installed, which
# happens in a later block than the binary it restarts.
- name: Restart eww
  ansible.builtin.systemd_service:
    name: eww.service
    daemon_reload: true
    scope: user
    state: restarted
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"

# hypridle is built and started by the niri role, which desktop.yml applies after this
# one. Handlers flush at the end of the play, so on a full run the unit exists by the
# time this fires, even on a host being provisioned for the first time. A tag selection
# that writes the config but skips the niri role (`--tags idle`) leaves the unit absent,
# which is tolerated: hypridle reads the config when the niri role first starts it.
- name: Restart hypridle
  ansible.builtin.systemd_service:
    name: hypridle.service
    daemon_reload: true
    scope: user
    state: restarted
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  register: desktop_hypridle_restart
  failed_when:
    - desktop_hypridle_restart is failed
    - "'Could not find the requested service' not in desktop_hypridle_restart.msg | default('')"

# Restart rather than start: the unit is a oneshot with RemainAfterExit=yes, so it is
# already active on a converged host and `started` would do nothing. It re-downloads every
# filter list and rebuilds the per-user cdb, which is why only a changed filter fires it.
- name: Recompile the malcontent web filter lists
  ansible.builtin.systemd_service:
    name: malcontent-webd-update.service
    state: restarted
  become: true

- name: Update font cache
  ansible.builtin.command: fc-cache --force
  become: true
  changed_when: true

# hicolor ships an icon-theme.cache, which GTK reads in preference to scanning the
# directory, so a newly added icon stays invisible until the cache is rebuilt.
- name: Update hicolor icon cache
  ansible.builtin.command: gtk-update-icon-cache --force /usr/share/icons/hicolor
  become: true
  changed_when: true

- name: Update GRUB
  ansible.builtin.command: update-grub
  become: true
  changed_when: true
