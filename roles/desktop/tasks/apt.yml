---
- name: Install common system packages
  ansible.builtin.apt:
    name:
      # adwaita-icon-theme supplies the Adwaita cursor theme, selected by
      # gtk-cursor-theme-name in the dotfiles:
      # https://github.com/andornaut/dotfiles/blob/master/$HOME/.config/gtk-3.0/settings.ini
      # The GTK widget themes are installed by theme.yml instead, which also selects one.
      - adwaita-icon-theme
      - desktop-file-utils
      - file-roller
      # gnome-keyring is only a Recommends of ubuntu-desktop-minimal, which
      # gnome.yml installs with recommends disabled, so it must be listed here.
      - gnome-keyring
      - gvfs-backends
      - imagemagick
      - jq
      - libnotify-bin
      - network-manager
      # pavucontrol supports per-app routing and port selection that the GNOME
      # sound panel does not, so it is installed on every desktop.
      - pavucontrol
      - playerctl
      - python3-pip
      - python3-setuptools
      - xdg-user-dirs
      - xdg-utils
      # xdotool is X11-only, but the shell functions in ~/.bashrc are sourced on every
      # desktop, GNOME included, so it cannot live in the bspwm role.
      - xdotool
      # yaru-theme-icon is the icon theme selected by /etc/gtk-3.0/settings.ini, and
      # the only theme packaged for Ubuntu that ships system-software-update-symbolic,
      # which eww.yml copies into the hicolor theme.
      - yaru-theme-icon
      - zenity
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# Papers (GTK4) is the successor to Evince and replaced it as GNOME's document
# viewer. It is only packaged on Ubuntu >= 26.04; fall back to Evince on older.
- name: Install document viewer
  ansible.builtin.apt:
    name: "{{ 'papers' if ansible_facts['distribution_version'] is version('26.04', '>=') else 'evince' }}"
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# Disable systemd-networkd, which conflicts with NetworkManager and causes a
# 2-minute boot delay (systemd-networkd-wait-online times out waiting for
# interfaces that NetworkManager manages).
- name: Disable systemd-networkd
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - systemd-networkd.service
    - systemd-networkd-wait-online.service
  become: true
