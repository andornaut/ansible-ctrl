---
- name: Install common system packages
  ansible.builtin.apt:
    name:
      - blueman
      - desktop-file-utils
      - evince # PDF reader
      - feh
      - gnome-keyring
      - gnome-themes-extra
      # - gnome-themes-standard
      - gvfs-backends
      - imagemagick
      - jq
      - libnotify-bin
      - lxappearance
      - network-manager
      - network-manager-gnome
      - pavucontrol
      - playerctl
      - policykit-1-gnome
      - python3-pip
      - python3-setuptools
      - redshift
      - scrot
      - suckless-tools
      - thunar
      - thunar-archive-plugin
      - thunar-media-tags-plugin
      - thunar-volman
      - tumbler
      - tumbler-plugins-extra
      - unzip
      - wmctrl
      - xarchiver
      - xautolock
      - xbacklight
      - xclip
      - xdg-user-dirs
      - xdg-utils
      - xdotool
      - xinput
      - xsel
      - zenity
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# Disable systemd-networkd, which conflicts with NetworkManager and causes a
# 2-minute boot delay (systemd-networkd-wait-online times out waiting for
# interfaces that NetworkManager manages).
- name: Disable systemd-networkd
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - systemd-networkd.service
    - systemd-networkd-wait-online.service
  become: true
