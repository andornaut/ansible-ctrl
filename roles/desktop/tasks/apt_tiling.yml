---
# Desktop-session utilities that a tiling WM does not provide for itself.
# Not installed on GNOME hosts, which ship their own bluetooth panel, network
# applet, polkit agent and theme configuration.
#
# The X11 tools below stay here rather than moving to the bspwm role: niri runs XWayland,
# and the dotfiles that call them (ranger, rofi, dunst) run as XWayland clients under it.
# Only the tools with a true Wayland replacement are split between the bspwm role (scrot,
# xss-lock, i3lock, xbacklight) and the niri role (grim, slurp, hypridle, brightnessctl).
- name: Install tiling window manager system packages
  ansible.builtin.apt:
    name:
      - blueman
      - feh
      - lxappearance
      - network-manager-gnome
      - policykit-1-gnome
      - suckless-tools
      - wmctrl
      - xclip
      - xinput
      - xsel
    state: latest
    install_recommends: false
    update_cache: true
  become: true
