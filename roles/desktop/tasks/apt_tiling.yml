---
# Desktop-session utilities a tiling WM does not provide for itself. Not installed on GNOME
# hosts, which ship their own equivalents.
#
# The X11 tools below serve both sessions (niri runs them as XWayland clients), so they
# stay here. Tools with a true Wayland replacement live in the bspwm role (scrot,
# xscreensaver, xbacklight) and the niri role (grim, slurp, hypridle, brightnessctl).
- name: Install tiling window manager system packages
  ansible.builtin.apt:
    name:
      - blueman
      - feh
      - lxappearance
      - network-manager-gnome
      - policykit-1-gnome
      - suckless-tools
      - wmctrl
      - xclip
      - xinput
      - xsel
    state: latest
    install_recommends: false
    update_cache: true
  become: true
