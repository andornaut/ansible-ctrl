---
- name: Install dconf dependencies
  ansible.builtin.apt:
    name:
      - dconf-cli
      - python3-psutil
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# dconf writes to the invoking user's database, so these run as desktop_user rather than
# as whoever the play connects as. XDG_RUNTIME_DIR points the module at that user's
# session bus, which is not set when Ansible escalates to a user it did not log in as.
- name: Configure keyboard settings
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  block:
    - name: Prevent Super+Space from switching input sources
      community.general.dconf:
        key: "/org/gnome/desktop/wm/keybindings/switch-input-source"
        value: "@au []"
        state: present

    - name: Set US keyboard layout as the only available layout
      community.general.dconf:
        key: "/org/gnome/desktop/input-sources/sources"
        value: "[('xkb', 'us')]"
        state: present

    - name: Prevent ibus-daemon from interfering with keyboard shortcuts
      community.general.dconf:
        key: "/org/gnome/settings-daemon/plugins/keyboard/active"
        value: "false"
        state: present
