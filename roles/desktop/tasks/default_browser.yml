---
# Runs after chrome.yml, flatpak.yml and firefox.yml, so every candidate .desktop file
# exists by the time xdg-settings is asked to resolve one.
- name: Configure the default browser for {{ desktop_user }}
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    HOME: "{{ desktop_user_home }}"
    # The Firefox flatpak exports its .desktop file to the per-user flatpak directory,
    # which is not in XDG_DATA_DIRS over an Ansible SSH session. Without this, `check`
    # cannot resolve that id and answers "no" forever while `set` fails outright; and
    # for any other id `check` falls through to the x-www-browser alternative and
    # answers "yes" even when the real default is the Firefox flatpak, so the set task
    # below would be skipped forever.
    XDG_DATA_DIRS: "{{ desktop_user_home }}/.local/share/flatpak/exports/share:/usr/local/share:/usr/share"
  block:
    - name: Check the current default browser
      ansible.builtin.command: xdg-settings check default-web-browser {{ desktop_default_browser_desktop_id }}
      register: desktop_default_browser_check
      changed_when: false

    - name: Set the default browser to {{ desktop_default_browser_desktop_id }}
      ansible.builtin.command: xdg-settings set default-web-browser {{ desktop_default_browser_desktop_id }}
      changed_when: true
      when: desktop_default_browser_check.stdout != "yes"
