---
- name: Install eww build dependencies
  ansible.builtin.apt:
    name:
      - libdbusmenu-glib-dev
      - libdbusmenu-gtk3-dev
      - libgtk-layer-shell-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Build and install eww
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: desktop_eww_tmp

    # Install from main branch because the latest stable release (v0.6.0, Aug 2024) is stale
    - name: Clone eww repository (main branch)
      ansible.builtin.git:
        repo: https://github.com/elkowar/eww.git
        dest: "{{ desktop_eww_tmp.path }}"
        version: master
        depth: 1

    # - name: Get releases of eww
    #   ansible.builtin.uri:
    #     url: https://api.github.com/repos/elkowar/eww/releases
    #     return_content: true
    #   register: desktop_eww_releases

    # - name: Set eww version to latest stable release
    #   ansible.builtin.set_fact:
    #     desktop_eww_version: >-
    #       {{ (desktop_eww_releases.json | selectattr('prerelease', 'equalto', false)
    #       | selectattr('draft', 'equalto', false) | list | first).tag_name }}

    # - name: Download and unarchive eww {{ desktop_eww_version }}
    #   ansible.builtin.unarchive:
    #     src: "https://github.com/elkowar/eww/archive/refs/tags/{{ desktop_eww_version }}.tar.gz"
    #     dest: "{{ desktop_eww_tmp.path }}"
    #     remote_src: true
    #     extra_opts:
    #       - --strip-components
    #       - 1

    - name: Build eww
      ansible.builtin.command:
        cmd: cargo build --release --no-default-features --features x11 --features=wayland
        chdir: "{{ desktop_eww_tmp.path }}"
      changed_when: true

    - name: Install eww binary
      ansible.builtin.copy:
        src: "{{ desktop_eww_tmp.path }}/target/release/eww"
        dest: /usr/local/bin/
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart eww
      become: true

# eww's systray resolves StatusNotifierItem icons through a freshly constructed GTK
# IconTheme, which searches only the hicolor fallback and ignores gtk-icon-theme-name.
# update-notifier publishes an item whose IconName is system-software-update-symbolic,
# which hicolor does not ship, so eww fails to load it and logs a warning on every
# start. Yaru is the only theme packaged for Ubuntu that provides the icon, so copy it
# into hicolor where eww looks. The Yaru file is a symlink to software-updater-symbolic,
# so the link target is copied rather than the link.
- name: Install system-software-update-symbolic into the hicolor icon theme
  ansible.builtin.copy:
    src: /usr/share/icons/Yaru/scalable/apps/software-updater-symbolic.svg
    dest: /usr/share/icons/hicolor/scalable/apps/system-software-update-symbolic.svg
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: Update hicolor icon cache
  become: true

- name: Configure eww service
  block:
    # eww is installed under /usr/local, so its unit belongs in
    # /usr/local/lib/systemd/user. /etc/systemd/user is reserved for the
    # administrator and outranks it, so a copy left there silently shadows this one
    # and every change to the unit becomes a no-op.
    - name: Create the local systemd user unit directory
      ansible.builtin.file:
        path: /usr/local/lib/systemd/user
        state: directory
        mode: "0755"
      become: true

    - name: Install eww.service
      ansible.builtin.copy:
        dest: /usr/local/lib/systemd/user/eww.service
        mode: "0644"
        content: |
          [Unit]
          Description=ElKowars wacky widgets
          Documentation=https://elkowar.github.io/eww/
          PartOf=graphical-session.target
          Requires=graphical-session.target
          After=graphical-session.target
          #ConditionEnvironment=WAYLAND_DISPLAY

          [Service]
          Type=exec
          # The daemon does not exit on SIGTERM once its windows are mapped, so the
          # unit would sit deactivating until TimeoutStopSec elapsed and systemd
          # resorted to SIGKILL. The incoming daemon then found the outgoing one
          # still holding the IPC socket, printed "Eww server already running",
          # declined to serve, and lingered tailing logs, leaving systemd reporting
          # the unit active while the old daemon served the old config. `eww kill`
          # shuts the daemon down cleanly, so stop through it, and bound the stop and
          # clear any surviving server as backstops.
          TimeoutStopSec=5
          ExecStartPre=-/usr/local/bin/eww kill
          ExecStart=/usr/local/bin/eww daemon --no-daemonize --logs
          ExecStartPost=/usr/local/bin/eww open {{ desktop_eww_bar }}
          ExecReload=/usr/local/bin/eww reload
          ExecStop=-/usr/local/bin/eww kill
          Slice=session.slice

          [Install]
          WantedBy=graphical-session.target
      notify: Restart eww
      become: true

    # CLEANUP (added 2026-07-09): remove once every desktop host has run this role at
    # least once.
    #
    # Written by an earlier version of this role, which installed the unit into the
    # administrator's directory. /etc/systemd/user outranks /usr/local/lib/systemd/user,
    # so a copy left there shadows the one above and every change to it is a no-op.
    - name: Remove eww.service from the administrator unit directory
      ansible.builtin.file:
        path: /etc/systemd/user/eww.service
        state: absent
      become: true

    # The enable symlink records an absolute path, so it still points into
    # /etc/systemd/user after the unit moves, and `systemctl enable` will not rewrite it
    # for a unit it already considers enabled. `reenable` rewrites it unconditionally and
    # is idempotent, so this asserts the end state rather than reacting to the removal
    # above: a run interrupted between the two tasks still converges on the next run.
    - name: Re-enable eww.service against its unit path # noqa: command-instead-of-module
      ansible.builtin.command: systemctl --user reenable eww.service
      changed_when: false
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"

    - name: Enable eww service
      ansible.builtin.systemd_service:
        name: eww.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
