---
- name: Install eww build dependencies
  ansible.builtin.apt:
    name:
      - libdbusmenu-glib-dev
      - libdbusmenu-gtk3-dev
      - libgtk-layer-shell-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Build and install eww
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: desktop_eww_tmp

    # Build from main: the latest stable release is stale.
    - name: Clone eww repository (main branch)
      ansible.builtin.git:
        repo: https://github.com/elkowar/eww.git
        dest: "{{ desktop_eww_tmp.path }}"
        version: master
        depth: 1

    - name: Build eww
      ansible.builtin.command:
        cmd: cargo build --release --no-default-features --features x11 --features=wayland
        chdir: "{{ desktop_eww_tmp.path }}"
      changed_when: true

    - name: Install eww binary
      ansible.builtin.copy:
        src: "{{ desktop_eww_tmp.path }}/target/release/eww"
        dest: /usr/local/bin/
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart eww
      become: true
  always:
    # A release build leaves ~1GB of cargo output, and /tmp is a tmpfs at half of RAM, so a few
    # leaked runs exhaust it.
    - name: Remove the temporary directory
      ansible.builtin.file:
        path: "{{ desktop_eww_tmp.path }}"
        state: absent
      when: desktop_eww_tmp.path is defined
      become: true

# eww's systray resolves StatusNotifierItem icons through the hicolor fallback only, ignoring
# gtk-icon-theme-name. update-notifier publishes system-software-update-symbolic, which hicolor
# does not ship, so eww logs a warning every start. Copy it from Yaru (the only Ubuntu-packaged
# theme that has it) into hicolor. The Yaru file is a symlink, so remote_src copies the target.
- name: Install system-software-update-symbolic into the hicolor icon theme
  ansible.builtin.copy:
    src: /usr/share/icons/Yaru/scalable/apps/software-updater-symbolic.svg
    dest: /usr/share/icons/hicolor/scalable/apps/system-software-update-symbolic.svg
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: Update hicolor icon cache
  become: true

- name: Configure eww service
  block:
    # eww is under /usr/local, so its unit belongs in /usr/local/lib/systemd/user.
    # /etc/systemd/user is reserved for the administrator and outranks it, so a copy left there
    # would silently shadow this one.
    - name: Create the local systemd user unit directory
      ansible.builtin.file:
        path: /usr/local/lib/systemd/user
        state: directory
        mode: "0755"
      become: true

    - name: Install eww.service
      ansible.builtin.copy:
        dest: /usr/local/lib/systemd/user/eww.service
        mode: "0644"
        content: |
          [Unit]
          Description=ElKowars wacky widgets
          Documentation=https://elkowar.github.io/eww/
          PartOf=graphical-session.target
          Requires=graphical-session.target
          After=graphical-session.target
          #ConditionEnvironment=WAYLAND_DISPLAY

          [Service]
          Type=exec
          # The daemon does not exit on SIGTERM once its windows are mapped, so stop it through
          # `eww kill` (ExecStop) instead. TimeoutStopSec and ExecStartPre kill are backstops
          # against a surviving server that would refuse to serve ("Eww server already running").
          TimeoutStopSec=5
          ExecStartPre=-/usr/local/bin/eww kill
          ExecStart=/usr/local/bin/eww daemon --no-daemonize --logs
          ExecStartPost=/usr/local/bin/eww open {{ desktop_eww_bar }}
          ExecReload=/usr/local/bin/eww reload
          ExecStop=-/usr/local/bin/eww kill
          Slice=session.slice

          [Install]
          WantedBy=graphical-session.target
      notify: Restart eww
      become: true

    - name: Enable eww service
      ansible.builtin.systemd_service:
        name: eww.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
