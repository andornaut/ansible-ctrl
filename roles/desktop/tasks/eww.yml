---
- name: Install eww build dependencies
  ansible.builtin.apt:
    name:
      - libdbusmenu-glib-dev
      - libdbusmenu-gtk3-dev
      - libgtk-layer-shell-dev
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Build and install eww
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: desktop_eww_tmp

    # Install from main branch because the latest stable release (v0.6.0, Aug 2024) is stale
    - name: Clone eww repository (main branch)
      ansible.builtin.git:
        repo: https://github.com/elkowar/eww.git
        dest: "{{ desktop_eww_tmp.path }}"
        version: master
        depth: 1

    # - name: Get releases of eww
    #   ansible.builtin.uri:
    #     url: https://api.github.com/repos/elkowar/eww/releases
    #     return_content: true
    #   register: desktop_eww_releases

    # - name: Set eww version to latest stable release
    #   ansible.builtin.set_fact:
    #     desktop_eww_version: >-
    #       {{ (desktop_eww_releases.json | selectattr('prerelease', 'equalto', false)
    #       | selectattr('draft', 'equalto', false) | list | first).tag_name }}

    # - name: Download and unarchive eww {{ desktop_eww_version }}
    #   ansible.builtin.unarchive:
    #     src: "https://github.com/elkowar/eww/archive/refs/tags/{{ desktop_eww_version }}.tar.gz"
    #     dest: "{{ desktop_eww_tmp.path }}"
    #     remote_src: true
    #     extra_opts:
    #       - --strip-components
    #       - 1

    - name: Build eww
      ansible.builtin.command:
        cmd: cargo build --release --no-default-features --features x11 --features=wayland
        chdir: "{{ desktop_eww_tmp.path }}"
      changed_when: true

    - name: Install eww binary
      ansible.builtin.copy:
        src: "{{ desktop_eww_tmp.path }}/target/release/eww"
        dest: /usr/local/bin/
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart eww
      become: true

# eww's systray resolves StatusNotifierItem icons through a freshly constructed GTK
# IconTheme, which searches only the hicolor fallback and ignores gtk-icon-theme-name.
# update-notifier publishes an item whose IconName is system-software-update-symbolic,
# which hicolor does not ship, so eww fails to load it and logs a warning on every
# start. Yaru is the only theme packaged for Ubuntu that provides the icon, so copy it
# into hicolor where eww looks. The Yaru file is a symlink to software-updater-symbolic,
# so the link target is copied rather than the link.
- name: Install system-software-update-symbolic into the hicolor icon theme
  ansible.builtin.copy:
    src: /usr/share/icons/Yaru/scalable/apps/software-updater-symbolic.svg
    dest: /usr/share/icons/hicolor/scalable/apps/system-software-update-symbolic.svg
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  notify: Update hicolor icon cache
  become: true

- name: Configure eww service
  block:
    - name: Install eww.service
      ansible.builtin.copy:
        dest: /etc/systemd/user/eww.service
        mode: "0644"
        content: |
          [Unit]
          Description=ElKowars wacky widgets
          Documentation=https://elkowar.github.io/eww/
          PartOf=graphical-session.target
          Requires=graphical-session.target
          After=graphical-session.target
          #ConditionEnvironment=WAYLAND_DISPLAY

          [Service]
          Type=exec
          # The daemon does not always exit on SIGTERM once its windows are mapped,
          # which leaves the unit deactivating for the default 90s. The incoming
          # daemon then finds the outgoing one still holding the IPC socket, prints
          # "Eww server already running", declines to serve, and lingers tailing logs,
          # so systemd reports the unit active while the old daemon serves the old
          # config. Bound the stop, and kill any surviving server before starting.
          TimeoutStopSec=5
          ExecStartPre=-/usr/local/bin/eww kill
          ExecStart=/usr/local/bin/eww daemon --no-daemonize --logs
          ExecStartPost=/usr/local/bin/eww open {{ desktop_eww_bar }}
          ExecReload=/usr/local/bin/eww reload
          Slice=session.slice

          [Install]
          WantedBy=graphical-session.target
      notify: Restart eww
      become: true

    - name: Enable eww service
      ansible.builtin.systemd_service:
        name: eww.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
      become: true
      become_user: "{{ desktop_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
