---
# Associate genuine archive formats with GNOME file-roller as the default
# handler for the desktop user (desktop_file_roller_mime_types in defaults).
# mimeapps.list is written directly rather than shelling out to xdg-mime, which
# resolves the path from $HOME and so needs the environment fixed up under
# become_user.
- name: Set file-roller as the default archive handler
  become: true
  become_user: "{{ desktop_user }}"
  community.general.ini_file:
    path: "{{ desktop_user_home }}/.config/mimeapps.list"
    section: Default Applications
    option: "{{ item }}"
    value: org.gnome.FileRoller.desktop
    no_extra_spaces: true
    mode: "0644"
  loop: "{{ desktop_file_roller_mime_types }}"
