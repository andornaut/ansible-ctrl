---
# Apt
- name: Configure Firefox Apt installation method
  when: not desktop_install_firefox_flatpak
  block:
    - name: Remove Firefox flatpak if using apt
      community.general.flatpak:
        name: org.mozilla.firefox
        method: user
        state: absent
      register: desktop_firefox_flatpak_removal
      failed_when:
        - desktop_firefox_flatpak_removal is failed
        - "'Executable \\'flatpak\\' was not found' not in desktop_firefox_flatpak_removal.msg"

    - name: Configure Firefox apt packages
      block:
        - name: Check if Firefox is installed from non-PPA source
          ansible.builtin.shell: set -o pipefail && dpkg -l firefox | grep -E "ii.*firefox.*ubuntu"
          register: desktop_firefox_installed_from_ubuntu
          failed_when: false
          changed_when: false
          become: true

        - name: Remove Firefox if installed from Ubuntu repositories
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true
          when: desktop_firefox_installed_from_ubuntu.rc == 0

        - name: Add Firefox Next PPA
          ansible.builtin.apt_repository:
            repo: ppa:mozillateam/firefox-next
            update_cache: true
          become: true

        - name: Configure mozilla PPA priority
          ansible.builtin.copy:
            content: |
              Package: firefox*
              Pin: release o=Ubuntu*
              Pin-Priority: -1
            dest: /etc/apt/preferences.d/firefox-no-snap
            mode: "0644"
          become: true

        - name: Install Firefox and dependencies
          ansible.builtin.apt:
            name:
              - firefox
              - speech-dispatcher # Required for text-to-speech
            state: present
            install_recommends: false
          become: true

    - name: Set Firefox as default browser
      ansible.builtin.command: xdg-settings set default-web-browser firefox.desktop
      changed_when: true

# Flatpak
- name: Configure Firefox flatpak installation method
  when: desktop_install_firefox_flatpak
  block:
    - name: Remove and hold Firefox apt package
      block:
        - name: Remove Firefox apt package
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true

        - name: Hold Firefox apt package
          ansible.builtin.dpkg_selections:
            name: firefox
            selection: hold
          become: true

    - name: Install and configure Firefox flatpak
      block:
        - name: Install Firefox flatpak
          community.general.flatpak:
            name: org.mozilla.firefox
            method: user

        - name: Configure Firefox cursor theme
          ansible.builtin.command: flatpak override --user --env=XCURSOR_THEME=Adwaita org.mozilla.firefox
          changed_when: true

    - name: Set Firefox as default browser
      ansible.builtin.command: xdg-settings set default-web-browser org.mozilla.firefox.desktop
      changed_when: true
