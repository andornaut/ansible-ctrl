---
# One pin record, written unconditionally, rather than one file per install method (two records
# for the same package collide, and apt's resolution depends on filename ordering nothing here
# controls). Pin-Priority -1 blocks an install from the Mozilla repo as it does from Ubuntu's, so
# no branch has to remove that repo or its key; it also blocks firefox as a dependency and makes
# dist-upgrade remove any installed copy. Only the apt method raises it to 1000.
- name: Pin Firefox to the chosen install method
  ansible.builtin.copy:
    content: |
      Package: firefox*
      Pin: {{ 'origin packages.mozilla.org' if (desktop_install_firefox and desktop_install_firefox_apt) else 'release a=*' }}
      Pin-Priority: {{ 1000 if (desktop_install_firefox and desktop_install_firefox_apt) else -1 }}
    dest: /etc/apt/preferences.d/firefox
    mode: "0644"
  become: true

- name: Configure Firefox Apt installation method
  when: desktop_install_firefox and desktop_install_firefox_apt
  block:
    - name: Remove Firefox flatpak if using apt
      become: true
      become_user: "{{ desktop_user }}"
      community.general.flatpak:
        name: org.mozilla.firefox
        method: user
        state: absent
      register: desktop_firefox_flatpak_removal
      failed_when:
        - desktop_firefox_flatpak_removal is failed
        - "'Executable \\'flatpak\\' was not found' not in desktop_firefox_flatpak_removal.msg"

    - name: Configure Firefox apt packages
      block:
        - name: Remove Firefox if installed from non-Mozilla source
          ansible.builtin.shell: set -o pipefail && dpkg -l firefox 2>/dev/null | grep -q "^ii"
          register: desktop_firefox_installed
          failed_when: false
          changed_when: false
          become: true

        - name: Purge old Firefox package
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true
          when: desktop_firefox_installed.rc == 0

        - name: Download Mozilla apt signing key
          ansible.builtin.get_url:
            url: https://packages.mozilla.org/apt/repo-signing-key.gpg
            dest: /etc/apt/keyrings/packages.mozilla.org.asc
            mode: "0644"
          become: true

        - name: Add Mozilla apt repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc]
              https://packages.mozilla.org/apt mozilla main
            state: present
            update_cache: true
          become: true

        - name: Install Firefox and dependencies
          ansible.builtin.apt:
            name:
              - firefox
              - speech-dispatcher # Required for text-to-speech
            state: latest
            install_recommends: false
            update_cache: true
          become: true

- name: Configure Firefox flatpak installation method
  when: desktop_install_firefox and not desktop_install_firefox_apt
  block:
    # The pin at the top of this file prevents an install; it cannot undo one.
    - name: Remove Firefox apt package
      ansible.builtin.apt:
        name: firefox
        purge: true
        state: absent
      become: true

    - name: Install and configure Firefox flatpak for the target user
      become: true
      become_user: "{{ desktop_user }}"
      block:
        - name: Install Firefox flatpak
          community.general.flatpak:
            name: org.mozilla.firefox
            method: user

        - name: Configure Firefox cursor theme
          ansible.builtin.command: >-
            flatpak override --user --env=XCURSOR_THEME={{ desktop_cursor_theme | quote }}
            org.mozilla.firefox
          changed_when: true

# desktop_install_firefox: false converges the host to no Firefox, purging any copy an earlier
# run installed. The pin above stays at -1 so apt cannot bring it back. The flatpak removal runs
# as desktop_user because the install (method: user) was per-user.
- name: Remove Firefox
  when: not desktop_install_firefox
  block:
    - name: Remove Firefox flatpak
      become: true
      become_user: "{{ desktop_user }}"
      community.general.flatpak:
        name: org.mozilla.firefox
        method: user
        state: absent
      register: desktop_firefox_flatpak_removal
      failed_when:
        - desktop_firefox_flatpak_removal is failed
        - "'Executable \\'flatpak\\' was not found' not in desktop_firefox_flatpak_removal.msg"

    - name: Remove Firefox apt package
      ansible.builtin.apt:
        name: firefox
        purge: true
        state: absent
      become: true
