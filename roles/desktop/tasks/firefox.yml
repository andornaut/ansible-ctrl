---
# One pin record, written unconditionally, rather than one file per install method.
# Two records for the same package in preferences.d collide, and apt resolves the
# collision by taking the first specific-form record it reads, which is a function of
# filename ordering that nothing here controls. A single idempotent record has no
# sibling to be outranked by.
#
# This is also why neither branch below has to remove the Mozilla repository or its
# signing key: Pin-Priority -1 blocks an install from that repository exactly as it
# blocks one from Ubuntu's. Note -1 also blocks firefox as a dependency of another
# package, and dist-upgrade removes it rather than skipping it if it is ever installed.
- name: Pin Firefox to the chosen install method
  ansible.builtin.copy:
    content: |
      Package: firefox*
      Pin: {{ 'origin packages.mozilla.org' if desktop_install_firefox_apt else 'release a=*' }}
      Pin-Priority: {{ 1000 if desktop_install_firefox_apt else -1 }}
    dest: /etc/apt/preferences.d/firefox
    mode: "0644"
  become: true

# Apt
- name: Configure Firefox Apt installation method
  when: desktop_install_firefox_apt
  block:
    - name: Remove Firefox flatpak if using apt
      become: true
      become_user: "{{ desktop_user }}"
      community.general.flatpak:
        name: org.mozilla.firefox
        method: user
        state: absent
      register: desktop_firefox_flatpak_removal
      failed_when:
        - desktop_firefox_flatpak_removal is failed
        - "'Executable \\'flatpak\\' was not found' not in desktop_firefox_flatpak_removal.msg"

    - name: Configure Firefox apt packages
      block:
        - name: Remove Firefox if installed from non-Mozilla source
          ansible.builtin.shell: set -o pipefail && dpkg -l firefox 2>/dev/null | grep -q "^ii"
          register: desktop_firefox_installed
          failed_when: false
          changed_when: false
          become: true

        - name: Purge old Firefox package
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true
          when: desktop_firefox_installed.rc == 0

        - name: Download Mozilla apt signing key
          ansible.builtin.get_url:
            url: https://packages.mozilla.org/apt/repo-signing-key.gpg
            dest: /etc/apt/keyrings/packages.mozilla.org.asc
            mode: "0644"
          become: true

        - name: Add Mozilla apt repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc]
              https://packages.mozilla.org/apt mozilla main
            state: present
            update_cache: true
          become: true

        - name: Install Firefox and dependencies
          ansible.builtin.apt:
            name:
              - firefox
              - speech-dispatcher # Required for text-to-speech
            state: latest
            install_recommends: false
            update_cache: true
          become: true

# Flatpak
- name: Configure Firefox flatpak installation method
  when: not desktop_install_firefox_apt
  block:
    # The pin at the top of this file prevents an install; it cannot undo one.
    - name: Remove Firefox apt package
      ansible.builtin.apt:
        name: firefox
        purge: true
        state: absent
      become: true

    - name: Install and configure Firefox flatpak for the target user
      become: true
      become_user: "{{ desktop_user }}"
      block:
        - name: Install Firefox flatpak
          community.general.flatpak:
            name: org.mozilla.firefox
            method: user

        - name: Configure Firefox cursor theme
          ansible.builtin.command: flatpak override --user --env=XCURSOR_THEME=Adwaita org.mozilla.firefox
          changed_when: true
