---
# Apt
- name: Configure Firefox Apt installation method
  when: not desktop_install_firefox_flatpak
  block:
    - name: Remove Firefox flatpak if using apt
      community.general.flatpak:
        name: org.mozilla.firefox
        method: user
        state: absent
      register: desktop_firefox_flatpak_removal
      failed_when:
        - desktop_firefox_flatpak_removal is failed
        - "'Executable \\'flatpak\\' was not found' not in desktop_firefox_flatpak_removal.msg"

    - name: Configure Firefox apt packages
      block:
        - name: Remove old Firefox PPA
          ansible.builtin.apt_repository:
            repo: ppa:mozillateam/firefox-next
            state: absent
            update_cache: false
          become: true

        - name: Remove old Firefox PPA file
          ansible.builtin.file:
            path: /etc/apt/sources.list.d/ppa_mozillateam_firefox_next_noble.list
            state: absent
          become: true

        - name: Remove old Firefox apt pin
          ansible.builtin.file:
            path: /etc/apt/preferences.d/firefox-no-snap
            state: absent
          become: true

        - name: Remove Firefox if installed from non-Mozilla source
          ansible.builtin.shell: set -o pipefail && dpkg -l firefox 2>/dev/null | grep -q "^ii"
          register: desktop_firefox_installed
          failed_when: false
          changed_when: false
          become: true

        - name: Purge old Firefox package
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true
          when: desktop_firefox_installed.rc == 0

        - name: Download Mozilla apt signing key
          ansible.builtin.get_url:
            url: https://packages.mozilla.org/apt/repo-signing-key.gpg
            dest: /etc/apt/keyrings/packages.mozilla.org.gpg
            mode: "0644"
          become: true

        - name: Add Mozilla apt repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.gpg]
              https://packages.mozilla.org/apt mozilla main
            state: present
            update_cache: true
          become: true

        - name: Configure Mozilla apt priority
          ansible.builtin.copy:
            content: |
              Package: firefox*
              Pin: origin packages.mozilla.org
              Pin-Priority: 1000
            dest: /etc/apt/preferences.d/mozilla-firefox
            mode: "0644"
          become: true

        - name: Install Firefox and dependencies
          ansible.builtin.apt:
            name:
              - firefox
              - speech-dispatcher # Required for text-to-speech
            state: present
            install_recommends: false
            update_cache: true
          become: true

    - name: Set Firefox as default browser
      ansible.builtin.command: xdg-settings set default-web-browser firefox.desktop
      changed_when: true

# Flatpak
- name: Configure Firefox flatpak installation method
  when: desktop_install_firefox_flatpak
  block:
    - name: Remove and hold Firefox apt package
      block:
        - name: Remove Firefox apt package
          ansible.builtin.apt:
            name: firefox
            purge: true
            state: absent
          become: true

        - name: Hold Firefox apt package
          ansible.builtin.dpkg_selections:
            name: firefox
            selection: hold
          become: true

    - name: Install and configure Firefox flatpak
      block:
        - name: Install Firefox flatpak
          community.general.flatpak:
            name: org.mozilla.firefox
            method: user

        - name: Configure Firefox cursor theme
          ansible.builtin.command: flatpak override --user --env=XCURSOR_THEME=Adwaita org.mozilla.firefox
          changed_when: true

    - name: Set Firefox as default browser
      ansible.builtin.command: xdg-settings set default-web-browser org.mozilla.firefox.desktop
      changed_when: true
