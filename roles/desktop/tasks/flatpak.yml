---
- name: Remove system packages replaced by flatpak
  become: true
  block:
    - name: Purge packages replaced by flatpak
      ansible.builtin.apt:
        name: "{{ desktop_flatpak_pinned_packages }}"
        autoremove: true
        clean: true
        purge: true
        state: absent

    # A negative pin, not a dpkg hold: dpkg discards a hold for a package it has no record of,
    # and a pin also refuses to install these to satisfy another package's dependency and makes
    # dist-upgrade remove any that is somehow installed. One Package: line takes several names.
    - name: Pin packages replaced by flatpak
      ansible.builtin.copy:
        content: |
          Package: {{ desktop_flatpak_pinned_packages | join(' ') }}
          Pin: release a=*
          Pin-Priority: -1
        dest: /etc/apt/preferences.d/flatpak-replacements
        mode: "0644"

- name: Configure flatpak
  block:
    - name: Install flatpak packages
      ansible.builtin.apt:
        name:
          - flatpak
          - flatpak-builder
        state: latest
        install_recommends: false
      become: true

    - name: Install and configure flatpak applications for the target user
      become: true
      become_user: "{{ desktop_user }}"
      block:
        - name: Add flathub repository
          community.general.flatpak_remote:
            name: flathub
            flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
            method: user

        # No org.gtk.Gtk3theme extensions: flathub carries only some themes, under names that
        # do not always match the host's. theme.yml copies the host's own into ~/.themes.
        - name: Install flatpak applications
          community.general.flatpak:
            name: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras }}"
            method: user

        - name: Configure cursor theme for flatpak applications
          ansible.builtin.command: >-
            flatpak override --user --env=XCURSOR_THEME={{ desktop_cursor_theme | quote }} {{ item }}
          loop: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras }}"
          changed_when: true

        - name: Configure FileZilla IPC
          ansible.builtin.command: flatpak override --user --share=ipc org.filezillaproject.Filezilla
          changed_when: true
