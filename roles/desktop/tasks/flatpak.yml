---
- name: Remove system packages replaced by flatpak
  become: true
  block:
    - name: Purge packages replaced by flatpak
      ansible.builtin.apt:
        name: "{{ desktop_flatpak_pinned_packages }}"
        autoremove: true
        clean: true
        purge: true
        state: absent

    # dpkg discards a hold for a package it has no record of (state "un"), which is the
    # case for the ones it never knew, so a hold could not keep them uninstalled. A
    # negative pin does, regardless of dpkg state. apt_preferences(5) takes several
    # names on one Package: line, so this is one record rather than one per package.
    #
    # A negative pin is stronger than a hold in two ways worth knowing: apt will not
    # install these even to satisfy another package's dependency, and `apt dist-upgrade`
    # removes any of them that is somehow installed rather than leaving it alone.
    - name: Pin packages replaced by flatpak
      ansible.builtin.copy:
        content: |
          Package: {{ desktop_flatpak_pinned_packages | join(' ') }}
          Pin: release a=*
          Pin-Priority: -1
        dest: /etc/apt/preferences.d/flatpak-replacements
        mode: "0644"

- name: Remove snap directories
  become: true
  block:
    - name: Find user snap directories
      ansible.builtin.find:
        paths: /home
        patterns: snap
        depth: 2
        file_type: directory
        recurse: true
      register: desktop_snap_directories_result

    - name: Remove the discovered snap directories
      ansible.builtin.file:
        path: "{{ item.path | default(item) }}"
        state: absent
      loop: "{{ desktop_snap_directories_result.files + ['/root/snap', '/var/cache/snapd'] }}"

- name: Configure flatpak
  block:
    - name: Install flatpak packages
      ansible.builtin.apt:
        name:
          - flatpak
          - flatpak-builder
        state: latest
        install_recommends: false
      become: true

    - name: Install and configure flatpak applications for the target user
      become: true
      become_user: "{{ desktop_user }}"
      block:
        - name: Add flathub repository
          community.general.flatpak_remote:
            name: flathub
            flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
            method: user

        - name: Install flatpak applications
          community.general.flatpak:
            name: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras + ['org.gtk.Gtk3theme.Adwaita-dark'] }}"
            method: user

        - name: Configure cursor theme for flatpak applications
          ansible.builtin.command: flatpak override --user --env=XCURSOR_THEME=Adwaita {{ item }}
          loop: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras }}"
          changed_when: true

        - name: Configure FileZilla IPC
          ansible.builtin.command: flatpak override --user --share=ipc org.filezillaproject.Filezilla
          changed_when: true
