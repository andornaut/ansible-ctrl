---
- name: Remove system packages replaced by flatpak
  become: true
  block:
    - name: Remove snap and applications, clean cache, and autoremove
      ansible.builtin.apt:
        name: "{{ desktop_flatpak_replacements.keys() | list + ['gnome-software-plugin-snap', 'snapd'] }}"
        autoremove: true
        clean: true
        purge: true
        state: absent

    - name: Hold packages replaced by flatpak
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: "{{ desktop_flatpak_replacements.keys() | list + ['gnome-software-plugin-snap', 'snapd'] }}"
      failed_when: false

- name: Remove snap directories
  become: true
  block:
    - name: Find user snap directories
      ansible.builtin.find:
        paths: /home
        patterns: snap
        depth: 2
        file_type: directory
        recurse: true
      register: desktop_snap_directories_result

    - name: Remove snap directories
      ansible.builtin.file:
        path: "{{ item.path | default(item) }}"
        state: absent
      loop: "{{ desktop_snap_directories_result.files + ['/root/snap', '/var/cache/snapd'] }}"

- name: Configure flatpak
  block:
    - name: Install flatpak packages
      ansible.builtin.apt:
        name:
          - flatpak
          - flatpak-builder
        state: latest
        install_recommends: false
      become: true

    - name: Add flathub repository
      community.general.flatpak_remote:
        name: flathub
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo
        method: user

    - name: Install flatpak applications
      community.general.flatpak:
        name: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras + ['org.gtk.Gtk3theme.Adwaita-dark'] }}"
        method: user

    - name: Configure cursor theme for flatpak applications
      ansible.builtin.command: flatpak override --user --env=XCURSOR_THEME=Adwaita {{ item }}
      loop: "{{ desktop_flatpak_replacements.values() | list + desktop_flatpak_extras }}"
      changed_when: true

    - name: Configure FileZilla IPC
      ansible.builtin.command: flatpak override --user --share=ipc org.filezillaproject.Filezilla
      changed_when: true
