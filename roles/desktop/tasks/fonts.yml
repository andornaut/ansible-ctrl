---
- name: Install system fonts
  block:
    - name: Install font packages
      ansible.builtin.apt:
        name:
          - fonts-dejavu
          - fonts-hack
          - fonts-ubuntu-console
          - ttf-mscorefonts-installer
          - xfonts-terminus
        state: latest
        install_recommends: false
        update_cache: true
      become: true

    - name: Configure Microsoft fonts
      block:
        - name: Accept mscorefonts EULA
          ansible.builtin.debconf:
            name: ttf-mscorefonts-installer
            question: msttcorefonts/accepted-mscorefonts-eula
            vtype: select
            value: "true"
          become: true

        - name: Install mscorefonts
          ansible.builtin.apt:
            name: ttf-mscorefonts-installer
            state: latest
            install_recommends: false
          notify: Update font cache
          become: true

- name: Install Source Code Pro font
  block:
    - name: Get latest Source Code Pro release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: adobe-fonts/source-code-pro
        github_release_fact: desktop_source_code_pro_release

    - name: Set Source Code Pro download URL fact
      ansible.builtin.set_fact:
        desktop_source_code_pro_url: >-
          {{ desktop_source_code_pro_release.assets
          | selectattr('name', 'match', '.*TTF.*.zip')
          | map(attribute='browser_download_url') | first }}

    - name: Create temporary directory
      ansible.builtin.file:
        path: /tmp/source-code-pro
        state: directory
        mode: "0755"

    - name: Download and extract Source Code Pro package
      ansible.builtin.unarchive:
        src: "{{ desktop_source_code_pro_url }}"
        dest: /tmp/source-code-pro/
        remote_src: true
        creates: /tmp/source-code-pro/LICENSE.md

    - name: Install Source Code Pro font files
      ansible.builtin.copy:
        src: /tmp/source-code-pro/TTF/
        dest: /usr/share/fonts/truetype/source-code-pro/
        remote_src: true
        mode: "0644"
        directory_mode: "0755"
        owner: root
        group: root
      notify: Update font cache
      become: true

    # The copy above applies its file `mode` (0644) to the destination
    # directory too, stripping the search (x) bit and making the fonts
    # unreadable. Reassert the directory mode after copying so it stays 0755.
    - name: Ensure Source Code Pro font directory is searchable
      ansible.builtin.file:
        path: /usr/share/fonts/truetype/source-code-pro/
        state: directory
        mode: "0755"
        owner: root
        group: root
      become: true
