---
- name: Install system fonts
  block:
    - name: Install font packages
      ansible.builtin.apt:
        name:
          - fonts-dejavu
          - fonts-hack
          - fonts-ubuntu-console
          - xfonts-terminus
        state: latest
        install_recommends: false
        update_cache: true
      become: true

    - name: Configure Microsoft fonts
      block:
        - name: Accept mscorefonts EULA
          ansible.builtin.debconf:
            name: ttf-mscorefonts-installer
            question: msttcorefonts/accepted-mscorefonts-eula
            vtype: select
            value: "true"
          become: true

        - name: Install mscorefonts
          ansible.builtin.apt:
            name: ttf-mscorefonts-installer
            state: latest
            install_recommends: false
          notify: Update font cache
          become: true

- name: Install Source Code Pro font
  block:
    - name: Get latest Source Code Pro release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: adobe-fonts/source-code-pro
        github_release_fact: desktop_source_code_pro_release

    - name: Set Source Code Pro download URL fact
      ansible.builtin.set_fact:
        desktop_source_code_pro_url: >-
          {{ desktop_source_code_pro_release.assets
          | selectattr('name', 'match', '.*TTF.*.zip')
          | map(attribute='browser_download_url') | first }}

    - name: Create temporary directory
      ansible.builtin.file:
        path: /tmp/source-code-pro
        state: directory
        mode: "0755"

    # The archive holds a single TTF/ directory and no LICENSE.md, so `creates`
    # must name a file the archive actually contains. /tmp is tmpfs, so this
    # downloads once per boot.
    - name: Download and extract Source Code Pro package
      ansible.builtin.unarchive:
        src: "{{ desktop_source_code_pro_url }}"
        dest: /tmp/source-code-pro/
        remote_src: true
        creates: /tmp/source-code-pro/TTF/SourceCodePro-Regular.ttf

    - name: Create Source Code Pro font directory
      ansible.builtin.file:
        path: /usr/share/fonts/truetype/source-code-pro/
        state: directory
        mode: "0755"
        owner: root
        group: root
      become: true

    # `find` warns and returns an empty list for a missing path rather than failing, so
    # a release that moves the fonts out of TTF/ would install nothing and still report
    # a green run. Fail instead.
    - name: Find extracted Source Code Pro font files
      ansible.builtin.find:
        paths: /tmp/source-code-pro/TTF
        patterns: "*.ttf"
      register: desktop_source_code_pro_files
      failed_when: desktop_source_code_pro_files.matched == 0

    # Copy the fonts individually. A recursive copy of the TTF/ directory would
    # apply `mode` to the destination directory as well, stripping its search
    # bit (`directory_mode` only covers directories the module creates).
    - name: Install Source Code Pro font files
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: /usr/share/fonts/truetype/source-code-pro/{{ item.path | basename }}
        remote_src: true
        mode: "0644"
        owner: root
        group: root
      loop: "{{ desktop_source_code_pro_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      notify: Update font cache
      become: true
