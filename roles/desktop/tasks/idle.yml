---
# Screen blanking, session locking and monitor power-off. The policy is shared across
# every desktop environment (the desktop_screen_*_minutes variables); the mechanism is
# not. GNOME reads dconf, bspwm delegates to xss-lock and i3lock, and niri to hypridle.
#
# Only X11 separates blanking the screen from powering the monitor down, so only bspwm
# honours all three timeouts. niri has no blanking step and gets the lock and power-off
# timeouts; GNOME exposes no separate power-off delay and gets the blank and lock
# timeouts, powering the display down when it blanks.
#
# Under bspwm the three timeouts are split across two mechanisms rather than one daemon.
# `xset s` programs the blank timeout and the blank-to-lock grace period as the screensaver's
# timeout and cycle; xss-lock defers i3lock to the cycle when a notifier is set. `xset dpms`
# programs power-off alone, leaving the monitor powered while the screen is merely blanked.
# See templates/bspwm_idle.j2.
#
# hypridle.conf and the autostart entries are generated whole: the role owns every setting
# in them, so there is nothing to pattern-match. The bspwm session script is a hand-written
# shell script, so the xset lines are appended to it in a managed block.
#
# Any of these files may be a symlink into a dotfiles repository, which rules out template
# and copy. When the content they would write already matches, their action plugin re-runs
# the file module against the resolved link target, and the file module expands environment
# variables in that path. A dotfiles repository whose tree lives under a directory named
# `$HOME` is corrupted by that expansion, so every no-op run fails. blockinfile, lineinfile
# and replace resolve the link themselves and write through it, leaving it in place.
#
# So the generated files are rendered into an ANSIBLE MANAGED BLOCK rather than templated.
# blockinfile appends, so replace empties any content the block does not already own.
#
# A dangling link is a separate problem that nothing can resolve, so idle_check_dotfile.yml
# classifies each path first and fails on one.

- name: Validate idle timeouts
  ansible.builtin.assert:
    that:
      # It is the BLANK timeout that becomes the X screensaver's timeout (bspwm_idle.j2
      # renders `xset s <blank> <lock delay>`), and `xset s 0` turns the screensaver off.
      # The session would then never blank and never lock, because xss-lock triggers on the
      # screensaver rather than on a clock of its own. GNOME reads the same value as
      # idle-delay, where 0 likewise means never.
      - desktop_screen_blank_minutes | int > 0
      - desktop_screen_lock_minutes | int >= desktop_screen_blank_minutes | int
      - desktop_screen_off_minutes | int >= desktop_screen_lock_minutes | int
      # The X server will not activate the screensaver while DPMS has the display powered
      # off. Powering it off at the very moment the screensaver is due is a race the lock
      # can lose, so the power-off must come strictly after the blank.
      - desktop_screen_off_minutes | int > desktop_screen_blank_minutes | int
    fail_msg: >-
      Idle timeouts must satisfy 0 < desktop_screen_blank_minutes
      ({{ desktop_screen_blank_minutes }}) <= desktop_screen_lock_minutes
      ({{ desktop_screen_lock_minutes }}) <= desktop_screen_off_minutes
      ({{ desktop_screen_off_minutes }}), and the monitor must power off strictly after the
      screen blanks: desktop_screen_off_minutes > desktop_screen_blank_minutes.
    success_msg: >-
      Screen blanks after {{ desktop_screen_blank_minutes }}m, locks after
      {{ desktop_screen_lock_minutes }}m, monitor powers off after
      {{ desktop_screen_off_minutes }}m

# dconf writes to the invoking user's database, so these run as desktop_user rather than
# as whoever the play connects as. XDG_RUNTIME_DIR points the module at that user's
# session bus, which is not set when Ansible escalates to a user it did not log in as.
- name: Configure GNOME idle timeouts
  when: desktop_environment == "gnome"
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  block:
    # community.general.dconf needs the dconf binary, which dconf.yml installs. It is
    # imported before this file, so `--tags idle` on its own only works on a host that
    # has already had a full desktop run.
    - name: Set the GNOME screen blank timeout
      community.general.dconf:
        key: /org/gnome/desktop/session/idle-delay
        value: "uint32 {{ desktop_screen_blank_seconds }}"
        state: present

    - name: Enable the GNOME lock screen
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-enabled
        value: "true"
        state: present

    - name: Set the GNOME screen lock delay
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-delay
        value: "uint32 {{ desktop_screen_lock_delay_seconds }}"
        state: present

    # gnome-settings-daemon owns idle suspend on GNOME, and keeps a separate action and
    # timeout per power source. All four keys come from the one variable, because none of
    # the mechanisms this role drives can tell mains from battery.
    #
    # Skipped entirely when desktop_suspend_inactive_minutes is unset, so that a GNOME host
    # that never opted in keeps whatever suspend policy the distribution shipped, rather
    # than having it silently disabled by the role's default.
    - name: Set the GNOME idle-suspend policy
      when: desktop_suspend_inactive_managed
      community.general.dconf:
        key: /org/gnome/settings-daemon/plugins/power/{{ item.key }}
        value: "{{ item.value }}"
        state: present
      loop:
        - key: sleep-inactive-ac-type
          value: "{{ desktop_suspend_inactive_action }}"
        - key: sleep-inactive-battery-type
          value: "{{ desktop_suspend_inactive_action }}"
        - key: sleep-inactive-ac-timeout
          value: uint32 {{ desktop_suspend_inactive_seconds }}
        - key: sleep-inactive-battery-timeout
          value: uint32 {{ desktop_suspend_inactive_seconds }}
      loop_control:
        label: "{{ item.key }}"

- name: Configure bspwm idle timeouts
  when: desktop_environment == "bspwm"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    # YAML resolves an unquoted 000000 to the integer 0, and any unquoted leading-zero
    # colour in 0-7 to octal (010203 becomes 4227). i3lock rejects the result and exits,
    # xss-lock's locker never comes up, and the session silently stops locking. Compare
    # the rendered string rather than trusting the host_vars author to have quoted it.
    - name: Validate the i3lock colour
      ansible.builtin.assert:
        that:
          - desktop_i3lock_color | string is match('^[0-9A-Fa-f]{6}$')
        fail_msg: >-
          desktop_i3lock_color must be six hex digits without a leading `#`, quoted so that
          YAML keeps it a string. Got "{{ desktop_i3lock_color | string }}".
        success_msg: "i3lock will fill the locked screen with #{{ desktop_i3lock_color }}"

    - name: Check the bspwm session script
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_bspwm_session_script }}"

    # CLEANUP (added 2026-07-10): remove once every bspwm desktop host has converged.
    #
    # gnome-screensaver, xautolock and xscreensaver are all purged by the bspwm role, so
    # dex would be left launching entries whose binaries are gone. Removing a path here
    # unlinks a dotfiles symlink rather than the file it points at, so the repository
    # copies must be deleted separately; this only cleans up hosts that carry the links.
    - name: Remove the superseded autostart entries
      ansible.builtin.file:
        path: "{{ desktop_user_home }}/.config/autostart/{{ item }}.desktop"
        state: absent
      loop:
        - gnome-screensaver
        - xautolock
        - xscreensaver

    # CLEANUP (added 2026-07-10): remove once every bspwm desktop host has converged.
    #
    # An earlier revision wrote its idle policy into this file with `create: true`.
    # xscreensaver is purged, so the file is inert, but a stale copy still names the
    # daemon that used to own the timeouts. Same symlink caveat as above.
    - name: Remove the superseded xscreensaver configuration
      ansible.builtin.file:
        path: "{{ desktop_user_home }}/.xscreensaver"
        state: absent

    # The session script is hand-written, so the role appends a managed block rather than
    # generating the file, and skips a host where the dotfiles repository is not applied
    # rather than creating the file in its place. An earlier revision of this role stripped
    # `xset` lines from the script; those lines are back, because xss-lock reads its idle
    # timing from the X screensaver extension that `xset s` programs.
    # No mode: the path is usually a symlink into the dotfiles repository, and Ansible
    # restores the target's mode after chmodding through a link, so a mode here would be
    # silently dropped on the hosts that matter and silently applied on the ones that
    # do not. The script's own permissions are the repository's business.
    # Skipping this task leaves the host with no blank, lock or DPMS policy at all: xss-lock
    # starts from its autostart entry but the X screensaver keeps the server's own defaults,
    # so nothing ever locks. That is worse than a hard failure would be on a first run, when
    # the dotfiles repository has legitimately not been applied yet, so say so loudly rather
    # than reporting ok and moving on.
    - name: Warn that the idle policy was not written
      when: not desktop_idle_dotfile_exists
      ansible.builtin.debug:
        msg: >-
          {{ desktop_bspwm_session_script }} does not exist, so the blank, lock and
          power-off timeouts were NOT written and this session will never lock. Apply the
          dotfiles repository on this host, then re-run with --tags idle.

    - name: Configure the X screensaver and DPMS timeouts
      when: desktop_idle_dotfile_exists
      ansible.builtin.blockinfile:
        path: "{{ desktop_bspwm_session_script }}"
        block: "{{ lookup('ansible.builtin.template', 'bspwm_idle.j2') }}"

    - name: Check the xss-lock autostart entry
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_xss_lock_autostart }}"

    - name: Create the autostart directory
      ansible.builtin.file: # noqa: risky-file-permissions
        path: "{{ desktop_xss_lock_autostart | dirname }}"
        state: directory

    - name: Configure the xss-lock autostart entry
      ansible.builtin.blockinfile:
        path: "{{ desktop_xss_lock_autostart }}"
        block: "{{ lookup('ansible.builtin.template', 'xss-lock.desktop.j2') }}"
        create: true
        mode: "0644"

- name: Configure niri idle timeouts
  when: desktop_environment == "niri"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    - name: Check the hypridle configuration
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_hypridle_conf }}"

    - name: Create the hypr configuration directory
      ansible.builtin.file: # noqa: risky-file-permissions
        path: "{{ desktop_hypridle_conf | dirname }}"
        state: directory

    # CLEANUP (added 2026-07-09): see the matching task under the bspwm block. Remove once
    # every niri desktop host has run this role at least once.
    - name: Empty the templated hypridle configuration
      when: desktop_idle_dotfile_exists
      ansible.builtin.replace:
        path: "{{ desktop_hypridle_conf }}"
        regexp: '\A(?!# BEGIN ANSIBLE MANAGED BLOCK)[\s\S]+\Z'
        replace: ''

    # eww closes all of its windows when the monitor it is on is powered off, so the
    # template reopens the bar on resume: https://github.com/elkowar/eww/issues/477
    - name: Configure hypridle
      ansible.builtin.blockinfile:
        path: "{{ desktop_hypridle_conf }}"
        block: "{{ lookup('ansible.builtin.template', 'hypridle.conf.j2') }}"
        create: true
        mode: "0644"
      notify: Restart hypridle

# Each desktop environment idle-suspends through whatever already knows the session is idle,
# because logind cannot work that out for itself: something has to call SetIdleHint.
#
#   gnome   gnome-settings-daemon, via the dconf keys set above
#   bspwm   logind's IdleAction, because xss-lock is what sets the idle hint
#   niri    a hypridle listener, because hypridle never sets the hint
#
# None of the three distinguishes mains from battery, so desktop_suspend_inactive_minutes
# applies to both. Leaving it unset writes nothing, so the host keeps the suspend policy it
# already had; 0 writes IdleAction=ignore.
- name: Configure idle suspend under bspwm
  when:
    - desktop_environment == "bspwm"
    - desktop_suspend_inactive_managed
  become: true
  block:
    - name: Create the logind drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/logind.conf.d
        state: directory
        mode: "0755"

    - name: Configure the logind idle action
      ansible.builtin.template:
        src: logind-idle.conf.j2
        dest: /etc/systemd/logind.conf.d/50-desktop-idle.conf
        mode: "0644"
      notify: Restart systemd-logind

# CLEANUP (added 2026-07-10): remove once every desktop host has converged.
#
# An earlier revision wrote this drop-in on every host that was not GNOME, so a niri host
# may carry one. logind still reads it, which would give that host a second suspend trigger
# alongside the hypridle listener, on a timeout the role no longer manages.
- name: Remove the superseded logind drop-in from non-bspwm hosts
  when: desktop_environment != "bspwm"
  ansible.builtin.file:
    path: /etc/systemd/logind.conf.d/50-desktop-idle.conf
    state: absent
  become: true
  notify: Restart systemd-logind
