---
# Screen blanking, session locking and monitor power-off. The policy is shared across
# every desktop environment (the desktop_screen_*_minutes variables); the mechanism is
# not. GNOME reads dconf, bspwm delegates to xscreensaver, and niri to hypridle.
#
# Only X11 separates blanking the screen from powering the monitor down, so only bspwm
# honours all three timeouts. niri has no blanking step and gets the lock and power-off
# timeouts; GNOME exposes no separate power-off delay and gets the blank and lock
# timeouts, powering the display down when it blanks.
#
# xscreensaver owns all three under bspwm. It takes over the X screensaver extension on
# startup, so `xset s` cannot coexist with it: whatever the session script sets, the daemon
# overrides. Driving DPMS from the same daemon keeps blanking, locking and power-off on one
# clock. This is why gnome-screensaver had to go rather than merely be reconfigured.
#
# hypridle.conf and the autostart entries are generated whole: the role owns every setting
# in them, so there is nothing to pattern-match. The bspwm session script is a hand-written
# shell script, so only its superseded xset lines are removed.
#
# Any of these files may be a symlink into a dotfiles repository, which rules out template
# and copy. When the content they would write already matches, their action plugin re-runs
# the file module against the resolved link target, and the file module expands environment
# variables in that path. A dotfiles repository whose tree lives under a directory named
# `$HOME` is corrupted by that expansion, so every no-op run fails. blockinfile, lineinfile
# and replace resolve the link themselves and write through it, leaving it in place.
#
# So the generated files are rendered into an ANSIBLE MANAGED BLOCK rather than templated.
# blockinfile appends, so replace empties any content the block does not already own.
#
# A dangling link is a separate problem that nothing can resolve, so idle_check_dotfile.yml
# classifies each path first and fails on one.

- name: Validate idle timeouts
  ansible.builtin.assert:
    that:
      - desktop_screen_lock_minutes | int >= desktop_screen_blank_minutes | int
      - desktop_screen_off_minutes | int >= desktop_screen_lock_minutes | int
    fail_msg: >-
      Idle timeouts must not decrease: desktop_screen_blank_minutes
      ({{ desktop_screen_blank_minutes }}) <= desktop_screen_lock_minutes
      ({{ desktop_screen_lock_minutes }}) <= desktop_screen_off_minutes
      ({{ desktop_screen_off_minutes }}).
    success_msg: >-
      Screen blanks after {{ desktop_screen_blank_minutes }}m, locks after
      {{ desktop_screen_lock_minutes }}m, monitor powers off after
      {{ desktop_screen_off_minutes }}m

# dconf writes to the invoking user's database, so these run as desktop_user rather than
# as whoever the play connects as. XDG_RUNTIME_DIR points the module at that user's
# session bus, which is not set when Ansible escalates to a user it did not log in as.
- name: Configure GNOME idle timeouts
  when: desktop_environment == "gnome"
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  block:
    # community.general.dconf needs the dconf binary, which dconf.yml installs. It is
    # imported before this file, so `--tags idle` on its own only works on a host that
    # has already had a full desktop run.
    - name: Set the GNOME screen blank timeout
      community.general.dconf:
        key: /org/gnome/desktop/session/idle-delay
        value: "uint32 {{ desktop_screen_blank_seconds }}"
        state: present

    - name: Enable the GNOME lock screen
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-enabled
        value: "true"
        state: present

    - name: Set the GNOME screen lock delay
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-delay
        value: "uint32 {{ desktop_screen_lock_delay_seconds }}"
        state: present

- name: Configure bspwm idle timeouts
  when: desktop_environment == "bspwm"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    - name: Check the bspwm session script
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_bspwm_session_script }}"

    # CLEANUP (added 2026-07-10): remove once every bspwm desktop host has converged.
    #
    # xscreensaver disables the X screensaver extension when it starts and programs DPMS
    # from its own resources, so these lines are dead at best. `xset s` is worse than dead:
    # a session that still runs it races the daemon at login. The regexps match any
    # argument form, so `xset s off` left by an older revision goes too.
    #
    # The script is hand-written, so it is edited rather than generated, and skipped when
    # absent rather than created in the dotfiles repository's place.
    - name: Remove the superseded xset lines from the bspwm session script
      when: desktop_idle_dotfile_exists
      ansible.builtin.lineinfile:
        path: "{{ desktop_bspwm_session_script }}"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '^xset[ \t]+s[ \t]'
        - '^xset[ \t]+\+dpms'
        - '^xset[ \t]+dpms[ \t]'

    # CLEANUP (added 2026-07-10): both programs are purged by the bspwm role, so dex would
    # be left launching entries whose binaries are gone. Removing a path here unlinks a
    # dotfiles symlink rather than the file it points at, so the repository copies were
    # deleted separately; this only cleans up hosts that still carry the links.
    - name: Remove the superseded autostart entries
      ansible.builtin.file:
        path: "{{ desktop_user_home }}/.config/autostart/{{ item }}.desktop"
        state: absent
      loop:
        - gnome-screensaver
        - xautolock

    - name: Check the xscreensaver configuration
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_xscreensaver_conf }}"

    # Unlike hypridle.conf, this file is not emptied before the block is written. The role
    # owns only the idle policy; xscreensaver-settings writes everything else a user might
    # have set here, and discarding that is not this role's business. The managed block is
    # appended last, so its resources win over any duplicate above it.
    #
    # No handler restarts the daemon: it reloads ~/.xscreensaver whenever the file changes.
    - name: Configure xscreensaver
      ansible.builtin.blockinfile:
        path: "{{ desktop_xscreensaver_conf }}"
        block: "{{ lookup('ansible.builtin.template', 'xscreensaver.conf.j2') }}"
        create: true
        mode: "0644"

    - name: Check the xscreensaver autostart entry
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_xscreensaver_autostart }}"

    - name: Create the autostart directory
      ansible.builtin.file: # noqa: risky-file-permissions
        path: "{{ desktop_xscreensaver_autostart | dirname }}"
        state: directory

    - name: Configure the xscreensaver autostart entry
      ansible.builtin.blockinfile:
        path: "{{ desktop_xscreensaver_autostart }}"
        block: "{{ lookup('ansible.builtin.template', 'xscreensaver.desktop.j2') }}"
        create: true
        mode: "0644"

- name: Configure niri idle timeouts
  when: desktop_environment == "niri"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    - name: Check the hypridle configuration
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_hypridle_conf }}"

    - name: Create the hypr configuration directory
      ansible.builtin.file: # noqa: risky-file-permissions
        path: "{{ desktop_hypridle_conf | dirname }}"
        state: directory

    # CLEANUP (added 2026-07-09): see the matching task under the bspwm block. Remove once
    # every niri desktop host has run this role at least once.
    - name: Empty the templated hypridle configuration
      when: desktop_idle_dotfile_exists
      ansible.builtin.replace:
        path: "{{ desktop_hypridle_conf }}"
        regexp: '\A(?!# BEGIN ANSIBLE MANAGED BLOCK)[\s\S]+\Z'
        replace: ''

    # eww closes all of its windows when the monitor it is on is powered off, so the
    # template reopens the bar on resume: https://github.com/elkowar/eww/issues/477
    - name: Configure hypridle
      ansible.builtin.blockinfile:
        path: "{{ desktop_hypridle_conf }}"
        block: "{{ lookup('ansible.builtin.template', 'hypridle.conf.j2') }}"
        create: true
        mode: "0644"
      notify: Restart hypridle
