---
# Screen blanking, session locking and monitor power-off. The policy
# (desktop_screen_*_minutes) is shared across desktop environments; the mechanism is not:
# GNOME uses dconf, bspwm xsecurelock, niri hypridle.
#
# Only X11 separates blanking from powering the monitor down, so bspwm honours all three
# timeouts; niri has no blank step (lock and power-off only); GNOME has no separate
# power-off delay (blank and lock, powering down when it blanks).
#
# Under bspwm the three timeouts are split across two clocks, both driven from the session
# script this writes: the X server blanks and powers down on `xset s`/`xset dpms`, and
# xss-lock starts xsecurelock one `xset s` cycle after the blank.
#
# The config files may be symlinks into a dotfiles repo, which rules out template/copy:
# their no-op path re-runs the file module against the resolved target, and a repo tree
# under a `$HOME`-named directory is corrupted when the file module expands that path.
# blockinfile, lineinfile and replace write through the link instead, so the role renders
# into managed blocks. A dangling link is unresolvable, so idle_check_dotfile.yml fails on
# one first. The session script and the saver are the role's own files under /usr/local, not
# dotfiles, so they are templated.

- name: Validate idle timeouts
  ansible.builtin.assert:
    that:
      # A zero blank timeout writes `timeout: 0:00:00` (xscreensaver off) or GNOME
      # idle-delay 0; either way the session never blanks and never locks.
      - desktop_screen_blank_minutes | int > 0
      - desktop_screen_lock_minutes | int >= desktop_screen_blank_minutes | int
      - desktop_screen_off_minutes | int >= desktop_screen_lock_minutes | int
    fail_msg: >-
      Idle timeouts must satisfy 0 < desktop_screen_blank_minutes
      ({{ desktop_screen_blank_minutes }}) <= desktop_screen_lock_minutes
      ({{ desktop_screen_lock_minutes }}) <= desktop_screen_off_minutes
      ({{ desktop_screen_off_minutes }}).
    success_msg: >-
      Screen blanks after {{ desktop_screen_blank_minutes }}m, locks after
      {{ desktop_screen_lock_minutes }}m, monitor powers off after
      {{ desktop_screen_off_minutes }}m

# dconf writes the invoking user's database, so run as desktop_user with XDG_RUNTIME_DIR
# pointing at that user's session bus.
- name: Configure GNOME idle timeouts
  when: desktop_environment == "gnome"
  become: true
  become_user: "{{ desktop_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
  block:
    # Needs the dconf binary from dconf.yml (imported earlier), so `--tags idle` alone only
    # works on a host that has had a full desktop run.
    - name: Set the GNOME screen blank timeout
      community.general.dconf:
        key: /org/gnome/desktop/session/idle-delay
        value: "uint32 {{ desktop_screen_blank_seconds }}"
        state: present

    - name: Enable the GNOME lock screen
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-enabled
        value: "true"
        state: present

    - name: Set the GNOME screen lock delay
      community.general.dconf:
        key: /org/gnome/desktop/screensaver/lock-delay
        value: "uint32 {{ desktop_screen_lock_delay_seconds }}"
        state: present

    # gnome-settings-daemon keeps a separate suspend action and timeout per power source; all
    # four keys take the one variable (the role can't tell mains from battery). Skipped when
    # desktop_suspend_inactive_minutes is unset, leaving the shipped policy alone.
    - name: Set the GNOME idle-suspend policy
      when: desktop_suspend_inactive_managed
      community.general.dconf:
        key: /org/gnome/settings-daemon/plugins/power/{{ item.key }}
        value: "{{ item.value }}"
        state: present
      loop:
        - key: sleep-inactive-ac-type
          value: "{{ desktop_suspend_inactive_action }}"
        - key: sleep-inactive-battery-type
          value: "{{ desktop_suspend_inactive_action }}"
        - key: sleep-inactive-ac-timeout
          value: uint32 {{ desktop_suspend_inactive_seconds }}
        - key: sleep-inactive-battery-timeout
          value: uint32 {{ desktop_suspend_inactive_seconds }}
      loop_control:
        label: "{{ item.key }}"

- name: Configure bspwm idle timeouts
  when: desktop_environment == "bspwm"
  block:
    # xsecurelock authenticates through PAM under the service name the Ubuntu package was
    # built with, and ships no PAM configuration of its own. Without the service file every
    # unlock attempt fails, so assert rather than trust, as the setuid xscreensaver-auth
    # helper this replaced was asserted.
    - name: Stat the xsecurelock PAM service
      ansible.builtin.stat:
        path: "{{ desktop_xsecurelock_pam_service }}"
      register: desktop_xsecurelock_pam

    - name: Assert that the xsecurelock PAM service exists
      ansible.builtin.assert:
        that: desktop_xsecurelock_pam.stat.exists
        fail_msg: >-
          {{ desktop_xsecurelock_pam_service }} is missing, and it is the PAM service
          xsecurelock authenticates against. The screen would lock and never unlock.
        success_msg: xsecurelock can authenticate against {{ desktop_xsecurelock_pam_service }}

    - name: Install the xsecurelock locked-screen indicator
      when: desktop_xsecurelock_show_locked_indicator
      ansible.builtin.template:
        src: xsecurelock-saver.j2
        dest: "{{ desktop_xsecurelock_saver }}"
        owner: root
        group: root
        mode: "0755"
      become: true

    # Owned by the role rather than written into the dotfiles: it carries per-host policy
    # (the timeouts), and the dotfiles repository is shared across hosts.
    - name: Install the xsecurelock session script
      ansible.builtin.template:
        src: xsecurelock-session.j2
        dest: "{{ desktop_xsecurelock_session }}"
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Configure the xss-lock autostart entry
      become: true
      become_user: "{{ desktop_user }}"
      block:
        - name: Check the xss-lock autostart entry
          ansible.builtin.include_tasks: idle_check_dotfile.yml
          vars:
            idle_dotfile_path: "{{ desktop_xss_lock_autostart }}"

        - name: Create the autostart directory
          ansible.builtin.file: # noqa: risky-file-permissions
            path: "{{ desktop_xss_lock_autostart | dirname }}"
            state: directory

        - name: Configure the xss-lock autostart entry
          ansible.builtin.blockinfile:
            path: "{{ desktop_xss_lock_autostart }}"
            block: "{{ lookup('ansible.builtin.template', 'xss-lock.desktop.j2') }}"
            create: true
            mode: "0644"

# CLEANUP (added 2026-07-14): remove once every bspwm host in the desktop group has run this
# role. Undoes the xscreensaver configuration that xsecurelock replaced. The preferences and
# the resource file are shared dotfiles, so only the managed blocks go; the autostart entry
# was written by the role, so the whole file goes and the daemon stops being started.
- name: Remove the xscreensaver configuration
  when: desktop_environment == "bspwm"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    - name: Stat the xscreensaver preferences
      ansible.builtin.stat:
        path: "{{ desktop_xscreensaver_conf }}"
      register: desktop_xscreensaver_conf_stat

    - name: Remove the xscreensaver preferences block
      when: desktop_xscreensaver_conf_stat.stat.exists
      ansible.builtin.blockinfile:
        path: "{{ desktop_xscreensaver_conf }}"
        state: absent

    - name: Stat the Xresources file
      ansible.builtin.stat:
        path: "{{ desktop_xresources }}"
      register: desktop_xresources_stat

    - name: Remove the xscreensaver unlock dialog block
      when: desktop_xresources_stat.stat.exists
      ansible.builtin.blockinfile:
        path: "{{ desktop_xresources }}"
        marker: "! {mark} ANSIBLE MANAGED BLOCK"
        state: absent

    - name: Remove the xscreensaver autostart entry
      ansible.builtin.file:
        path: "{{ desktop_xscreensaver_autostart }}"
        state: absent

- name: Configure niri idle timeouts
  when: desktop_environment == "niri"
  become: true
  become_user: "{{ desktop_user }}"
  block:
    - name: Check the hypridle configuration
      ansible.builtin.include_tasks: idle_check_dotfile.yml
      vars:
        idle_dotfile_path: "{{ desktop_hypridle_conf }}"

    - name: Create the hypr configuration directory
      ansible.builtin.file: # noqa: risky-file-permissions
        path: "{{ desktop_hypridle_conf | dirname }}"
        state: directory

    # CLEANUP (added 2026-07-09): remove once every niri desktop host has run this role.
    # Converts a fully-templated hypridle.conf (pre-managed-block) into managed-block form.
    - name: Empty the templated hypridle configuration
      when: desktop_idle_dotfile_exists
      ansible.builtin.replace:
        path: "{{ desktop_hypridle_conf }}"
        regexp: '\A(?!# BEGIN ANSIBLE MANAGED BLOCK)[\s\S]+\Z'
        replace: ''

    # eww closes all of its windows when the monitor it is on is powered off, so the
    # template reopens the bar on resume: https://github.com/elkowar/eww/issues/477
    - name: Configure hypridle
      ansible.builtin.blockinfile:
        path: "{{ desktop_hypridle_conf }}"
        block: "{{ lookup('ansible.builtin.template', 'hypridle.conf.j2') }}"
        create: true
        mode: "0644"
      notify: Restart hypridle

# Idle suspend needs something to call logind's SetIdleHint; logind can't detect idle itself.
#   gnome   gnome-settings-daemon, via the dconf keys above
#   niri    a hypridle listener that runs `systemctl suspend`
#   bspwm   nothing: xss-lock answers logind's Lock signal but never sets the idle hint, so
#           IdleAction can't fire
# So fail rather than write a drop-in that silently does nothing.
- name: Reject idle suspend under bspwm
  when:
    - desktop_environment == "bspwm"
    - desktop_suspend_inactive_managed
  ansible.builtin.fail:
    msg: >-
      desktop_suspend_inactive_minutes is set to
      "{{ desktop_suspend_inactive_minutes }}" on this bspwm host, and bspwm cannot
      idle-suspend: nothing in an xss-lock session tells logind that the session is
      idle, so logind's IdleAction would never fire. Unset the variable, or move the host
      to GNOME or niri.
