---
- name: Configure Insync repository
  block:
    - name: Download Insync apt signing key
      ansible.builtin.get_url:
        url: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xACCAF35C
        dest: /etc/apt/keyrings/insync.asc
        mode: "0644"
      become: true

    - name: Remove old Insync apt source files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/apt_insync_io_ubuntu.list
        - /etc/apt/sources.list.d/insync.list
      become: true

    - name: Add Insync apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/insync.asc]
          http://apt.insync.io/ubuntu {{ ansible_facts['distribution_release'] }} non-free contrib
        filename: insync
        update_cache: true
      become: true

- name: Install and configure Insync
  become: true
  block:
    - name: Install Insync package
      ansible.builtin.apt:
        name: insync
        state: latest
        install_recommends: false

    - name: Fix Wayland compatibility
      # Workaround error when starting insync in Wayland (niri window manager):
      # QSocketNotifier: Can only be used with threads started with QThread
      # /usr/lib/insync/insync: symbol lookup error: /opt/amdgpu/lib/x86_64-linux-gnu/libEGL_mesa.so.0:
      # undefined symbol: wl_display_create_queue_with_name
      ansible.builtin.file:
        path: /usr/lib/insync/libwayland-client.so.0
        state: absent

    - name: Write insync.desktop with Wayland compatibility fix
      ansible.builtin.copy:
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Insync
          GenericName=Insync
          Comment=Launch Insync
          Icon=insync
          Categories=Network;
          # https://forums.insynchq.com/t/insync-3-9-4-fails-to-load-on-ubuntu-24-04-2-lts-addressed/36032/5
          Exec=insync start --qt-qpa-platform=xcb
          TryExec=insync
          Terminal=false
        dest: /usr/share/applications/insync.desktop
        mode: "0644"
