---
# ITE IT8696E + IT8883 Super I/O driver for Gigabyte AM5 boards. The mainline
# it87 driver only supports IT8705F/871xF/872xF, so this out-of-tree fork is
# required to expose the fan pwm/hwmon that CoolerControl manages.
# https://github.com/frankcrawford/it87
- name: Install it87 fan control driver
  become: true
  block:
    - name: Install it87 DKMS build prerequisites
      ansible.builtin.apt:
        name:
          - build-essential
          - dkms
          - git
          - "linux-headers-{{ ansible_facts['kernel'] }}"
        state: present
        update_cache: true

    - name: Clone it87 driver source
      ansible.builtin.git:
        repo: "{{ desktop_it87_repo }}"
        dest: /usr/src/it87
        version: "{{ desktop_it87_version }}"
      register: desktop_it87_source

    - name: Check whether it87 is registered with DKMS for the running kernel
      ansible.builtin.command: dkms status it87 -k {{ ansible_facts['kernel'] }}
      register: desktop_it87_dkms
      changed_when: false

    # The Makefile "dkms" target copies the source to /usr/src/it87-<version>,
    # then runs dkms add/build/install for the running kernel.
    - name: Build and install it87 via DKMS
      ansible.builtin.command:
        cmd: make dkms
        chdir: /usr/src/it87
      when: desktop_it87_source.changed or "installed" not in desktop_it87_dkms.stdout
      changed_when: true

    - name: Configure it87 module options
      ansible.builtin.copy:
        dest: /etc/modprobe.d/it87.conf
        content: "options it87 force_id=0x8696,0x8883 ignore_resource_conflict=1\n"
        mode: "0644"

    # CLEANUP (added 2026-07-20): remove once the desktop hosts that ran the
    # modules-load.d version of this role have converged on the unit below.
    - name: Remove the modules-load.d entry superseded by it87.service
      ansible.builtin.file:
        path: /etc/modules-load.d/it87.conf
        state: absent

    # Probing the chip at systemd-modules-load time fails with ENODEV, so the
    # module is loaded later, before CoolerControl reads the hwmon, and retried.
    - name: Install the it87 load unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/it87.service
        content: |
          [Unit]
          Description=Load the it87 Super I/O driver
          After=sysinit.target
          Before=coolercontrold.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/sh -c 'for _ in 1 2 3 4 5 6; do modprobe it87 && exit 0; sleep 5; done; exit 1'

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Enable and start it87.service
      ansible.builtin.systemd_service:
        name: it87.service
        daemon_reload: true
        enabled: true
        state: started
