---
- name: Install LACT
  block:
    - name: Get releases of LACT
      ansible.builtin.uri:
        url: https://api.github.com/repos/ilya-zlobintsev/LACT/releases
        return_content: true
      register: desktop_lact_releases

    - name: Set LACT to latest stable release
      ansible.builtin.set_fact:
        desktop_lact_release: "{{ desktop_lact_releases.json | selectattr('prerelease', 'equalto', false) | selectattr('draft', 'equalto', false) | first }}"

    - name: Set LACT download URL fact
      ansible.builtin.set_fact:
        desktop_lact_download_url: >-
          {{ desktop_lact_release.assets
          | selectattr('name', 'match',
            'lact-.*.amd64.ubuntu-'
            + (ansible_facts['distribution_version'] | replace('.', ''))
            + '.deb')
          | map(attribute='browser_download_url') | first }}

    - name: Install LACT package
      ansible.builtin.apt:
        deb: "{{ desktop_lact_download_url }}"
        install_recommends: false
        update_cache: true
      become: true
