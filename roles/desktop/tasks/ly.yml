---
- name: Install and configure ly display manager
  block:
    - name: Prepare build environment
      block:
        - name: Install ly's build dependencies
          ansible.builtin.apt:
            name:
              - build-essential
              - libpam0g-dev
              - libxcb-xkb-dev
            state: latest
            install_recommends: false
            update_cache: true
          become: true

        - name: Set up zig compiler
          block:
            - name: Get zig versions
              ansible.builtin.uri:
                url: https://ziglang.org/download/index.json
                return_content: true
              register: desktop_zig_versions

            # ly requires zig v0.16.0+.
            - name: Set zig version fact
              ansible.builtin.set_fact:
                desktop_zig_version: >-
                  {{ desktop_zig_versions.json | dict2items
                     | selectattr('key', 'match', '^\d+\.\d+\.\d+$')
                     | map(attribute='key')
                     | community.general.version_sort
                     | last }}

            - name: Create a temporary directory for zig
              ansible.builtin.tempfile:
                state: directory
              register: desktop_zig_tmp

            # The ziglang.org origin serves this ~55MB tarball at ~50KB/s (~20 minutes), because its
            # bandwidth is donated. The Zig project publishes https://ziglang.org/download/community-mirrors.txt
            # and asks tooling to fetch from a mirror instead. Mirrors host the tarball under its basename.
            # Verify the origin's shasum, since mirrors are third parties.
            - name: Download zig compiler archive
              ansible.builtin.get_url:
                url: "{{ desktop_zig_mirror }}/{{ desktop_zig_versions.json[desktop_zig_version][desktop_zig_platform].tarball | basename }}"
                checksum: "sha256:{{ desktop_zig_versions.json[desktop_zig_version][desktop_zig_platform].shasum }}"
                dest: "{{ desktop_zig_tmp.path }}/zig.tar.xz"
                mode: "0644"
                timeout: 30

            - name: Create zig installation directory
              ansible.builtin.file:
                path: /opt/zig
                state: directory
                mode: "0755"
              become: true

            - name: Install zig compiler
              ansible.builtin.unarchive:
                src: "{{ desktop_zig_tmp.path }}/zig.tar.xz"
                dest: /opt/zig
                remote_src: true
                extra_opts:
                  - --strip-components
                  - 1
                  - --overwrite
              become: true
          always:
            - name: Remove the temporary directory for zig
              ansible.builtin.file:
                path: "{{ desktop_zig_tmp.path }}"
                state: absent
              when: desktop_zig_tmp.path is defined
              become: true

    - name: Install ly display manager
      block:
        - name: Create a temporary directory
          ansible.builtin.tempfile:
            state: directory
          register: desktop_ly_tmp

        - name: Get ly releases
          ansible.builtin.uri:
            url: https://codeberg.org/api/v1/repos/fairyglade/ly/releases
            return_content: true
          register: desktop_ly_releases

        - name: Set ly release fact
          ansible.builtin.set_fact:
            desktop_ly_release: "{{ desktop_ly_releases.json | selectattr('prerelease', 'equalto', false) | selectattr('draft', 'equalto', false) | first }}"

        - name: Download and unarchive ly
          ansible.builtin.unarchive:
            src: "{{ desktop_ly_release.tarball_url }}"
            dest: "{{ desktop_ly_tmp.path }}"
            remote_src: true
            extra_opts:
              - --strip-components
              - 1

        - name: Compile and install ly
          ansible.builtin.command:
            cmd: /opt/zig/zig build installnoconf
            chdir: "{{ desktop_ly_tmp.path }}"
          become: true
          changed_when: true
      always:
        # zig builds as root and creates root-owned zig-out and zig-pkg
        # directories, which the connecting user cannot unlink.
        - name: Remove the temporary directory
          ansible.builtin.file:
            path: "{{ desktop_ly_tmp.path }}"
            state: absent
          when: desktop_ly_tmp.path is defined
          become: true

    - name: Configure ly
      block:
        # "zig build installnoconf" writes config.ini.example but not config.ini,
        # so that upgrades leave an existing config alone. Seed it once, otherwise
        # the lineinfile tasks below have no file to edit on a fresh host.
        - name: Seed ly configuration from the example
          ansible.builtin.copy:
            src: /etc/ly/config.ini.example
            dest: /etc/ly/config.ini
            remote_src: true
            force: false
            mode: "0644"
          become: true

        - name: Look in /usr/share and /usr/local/share for wayland-sessions
          ansible.builtin.lineinfile:
            line: "waylandsessions = /usr/share/wayland-sessions:/usr/local/share/wayland-sessions"
            path: /etc/ly/config.ini
            regexp: '^waylandsessions *='
          become: true

        - name: Look in /usr/share and /usr/local/share for xsessions
          ansible.builtin.lineinfile:
            line: "xsessions = /usr/share/xsessions:/usr/local/share/xsessions"
            path: /etc/ly/config.ini
            regexp: '^xsessions *='
          become: true

        - name: Enable password field clearing
          ansible.builtin.lineinfile:
            line: "clear_password = true"
            path: /etc/ly/config.ini
            regexp: '^#?\s*clear_password\s*='
          become: true

        - name: Enable borderless mode
          ansible.builtin.lineinfile:
            path: /etc/ly/config.ini
            regexp: '^#?\s*hide_borders\s*='
            line: "hide_borders = true"
          become: true

        - name: Enable Gnome keyring authentication
          ansible.builtin.lineinfile:
            path: /etc/pam.d/login
            line: "auth       optional     pam_gnome_keyring.so"
            insertafter: "^auth.*pam_unix.so"
          become: true

        - name: Enable Gnome keyring password integration
          ansible.builtin.lineinfile:
            path: /etc/pam.d/ly
            line: "password   optional     pam_gnome_keyring.so"
            insertafter: "^password.*pam_unix.so"
          become: true

        - name: Enable Gnome keyring session management
          ansible.builtin.lineinfile:
            path: /etc/pam.d/login
            line: "session    optional     pam_gnome_keyring.so auto_start"
            insertafter: "^session.*pam_unix.so"
          become: true

    - name: Configure system integration
      block:
        # CLEANUP (added 2026-07-10): remove once every host that runs ly has converged.
        #
        # ly shipped a non-templated ly.service until late 2025, and some hosts also carry a
        # hand-written copy under /etc that shadows it. The current release installs only
        # ly@.service, but "zig build installnoconf" leaves the superseded unit behind. Both
        # copies hard-code tty2 and claim the display-manager.service alias, so on a host
        # that still has one, `systemctl restart ly` starts a second greeter on the tty that
        # ly@tty2.service already owns instead of failing as it does on a clean host.
        #
        # No daemon_reload here: the next task issues one before it touches any unit.
        - name: Find the superseded ly units
          ansible.builtin.stat:
            path: "{{ item }}"
          register: desktop_ly_superseded_units
          loop:
            - /etc/systemd/system/ly.service
            - /usr/lib/systemd/system/ly.service

        # Stop it while systemd can still see the unit. Once the files are gone a greeter
        # started from ly.service would keep running on tty2 with nothing left to manage it.
        #
        # masked: false because main.yml masks ly on a host where desktop_install_ly is
        # false, and a masked unit cannot be stopped. Masking writes the /dev/null symlink
        # that stat finds above, so a host flipped to ly arrives here with one in place. The
        # module applies masked before enabled before state, so one call unmasks then stops.
        - name: Stop the superseded ly unit
          ansible.builtin.systemd_service:
            name: ly.service
            state: stopped
            enabled: false
            masked: false
          become: true
          when: desktop_ly_superseded_units.results | selectattr('stat.exists') | list | length > 0

        - name: Remove the superseded ly units
          ansible.builtin.file:
            path: "{{ item.item }}"
            state: absent
          become: true
          loop: "{{ desktop_ly_superseded_units.results | selectattr('stat.exists') | list }}"
          loop_control:
            label: "{{ item.item }}"

        - name: Prevent TTY conflicts
          ansible.builtin.systemd_service:
            name: getty@tty2.service
            daemon_reload: true
            state: stopped
            enabled: false
          become: true

        - name: Enable ly display manager
          ansible.builtin.systemd_service:
            name: ly@tty2.service
            daemon_reload: true
            enabled: true
            masked: false
          become: true
