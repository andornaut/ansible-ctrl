---
- name: Install and configure ly display manager
  block:
    - name: Prepare build environment
      block:
        - name: Install ly's build dependencies
          ansible.builtin.apt:
            name:
              - build-essential
              - libpam0g-dev
              - libxcb-xkb-dev
              # Extracts the .zip source archive (see "Download and unarchive ly").
              - unzip
            state: latest
            install_recommends: false
            update_cache: true
          become: true

        - name: Set up zig compiler
          block:
            - name: Get zig versions
              ansible.builtin.uri:
                url: https://ziglang.org/download/index.json
                return_content: true
              register: desktop_zig_versions

            # ly requires zig v0.16.0+.
            - name: Set zig version fact
              ansible.builtin.set_fact:
                desktop_zig_version: >-
                  {{ desktop_zig_versions.json | dict2items
                     | selectattr('key', 'match', '^\d+\.\d+\.\d+$')
                     | map(attribute='key')
                     | community.general.version_sort
                     | last }}

            - name: Create a temporary directory for zig
              ansible.builtin.tempfile:
                state: directory
              register: desktop_zig_tmp

            # ziglang.org serves this tarball slowly (donated bandwidth) and asks tooling to use a
            # mirror from https://ziglang.org/download/community-mirrors.txt. Mirrors host it under
            # its basename; verify the origin's shasum since mirrors are third parties.
            - name: Download zig compiler archive
              ansible.builtin.get_url:
                url: "{{ desktop_zig_mirror }}/{{ desktop_zig_versions.json[desktop_zig_version][desktop_zig_platform].tarball | basename }}"
                checksum: "sha256:{{ desktop_zig_versions.json[desktop_zig_version][desktop_zig_platform].shasum }}"
                dest: "{{ desktop_zig_tmp.path }}/zig.tar.xz"
                mode: "0644"
                timeout: 30

            - name: Create zig installation directory
              ansible.builtin.file:
                path: /opt/zig
                state: directory
                mode: "0755"
              become: true

            - name: Install zig compiler
              ansible.builtin.unarchive:
                src: "{{ desktop_zig_tmp.path }}/zig.tar.xz"
                dest: /opt/zig
                remote_src: true
                extra_opts:
                  - --strip-components
                  - 1
                  - --overwrite
              become: true
          always:
            - name: Remove the temporary directory for zig
              ansible.builtin.file:
                path: "{{ desktop_zig_tmp.path }}"
                state: absent
              when: desktop_zig_tmp.path is defined
              become: true

    - name: Install ly display manager
      block:
        - name: Create a temporary directory
          ansible.builtin.tempfile:
            state: directory
          register: desktop_ly_tmp

        - name: Get ly releases
          ansible.builtin.uri:
            url: https://codeberg.org/api/v1/repos/fairyglade/ly/releases
            return_content: true
          register: desktop_ly_releases

        - name: Set ly release fact
          ansible.builtin.set_fact:
            desktop_ly_release: "{{ desktop_ly_releases.json | selectattr('prerelease', 'equalto', false) | selectattr('draft', 'equalto', false) | first }}"

        # Codeberg's generated .tar.gz archive (tarball_url) returns HTTP 500, so fetch the
        # .zip. unzip has no --strip-components, and the zip wraps its contents in a top-level
        # `ly/` directory, so the build below chdirs into that subdir rather than flattening.
        - name: Download and unarchive ly
          ansible.builtin.unarchive:
            src: "{{ desktop_ly_release.tarball_url | regex_replace('\\.tar\\.gz$', '.zip') }}"
            dest: "{{ desktop_ly_tmp.path }}"
            remote_src: true

        - name: Compile and install ly
          ansible.builtin.command:
            cmd: /opt/zig/zig build installnoconf
            chdir: "{{ desktop_ly_tmp.path }}/ly"
          become: true
          changed_when: true
      always:
        # zig builds as root and creates root-owned zig-out and zig-pkg
        # directories, which the connecting user cannot unlink.
        - name: Remove the temporary directory
          ansible.builtin.file:
            path: "{{ desktop_ly_tmp.path }}"
            state: absent
          when: desktop_ly_tmp.path is defined
          become: true

    - name: Configure ly
      block:
        # installnoconf writes config.ini.example but not config.ini, so seed it once or the
        # lineinfile tasks below have nothing to edit on a fresh host.
        - name: Seed ly configuration from the example
          ansible.builtin.copy:
            src: /etc/ly/config.ini.example
            dest: /etc/ly/config.ini
            remote_src: true
            force: false
            mode: "0644"
          become: true

        - name: Look in /usr/share and /usr/local/share for wayland-sessions
          ansible.builtin.lineinfile:
            line: "waylandsessions = /usr/share/wayland-sessions:/usr/local/share/wayland-sessions"
            path: /etc/ly/config.ini
            regexp: '^waylandsessions *='
          become: true

        - name: Look in /usr/share and /usr/local/share for xsessions
          ansible.builtin.lineinfile:
            line: "xsessions = /usr/share/xsessions:/usr/local/share/xsessions"
            path: /etc/ly/config.ini
            regexp: '^xsessions *='
          become: true

        - name: Enable password field clearing
          ansible.builtin.lineinfile:
            line: "clear_password = true"
            path: /etc/ly/config.ini
            regexp: '^#?\s*clear_password\s*='
          become: true

        - name: Enable borderless mode
          ansible.builtin.lineinfile:
            path: /etc/ly/config.ini
            regexp: '^#?\s*hide_borders\s*='
            line: "hide_borders = true"
          become: true

        # CLEANUP (added 2026-07-10): delete once every desktop_install_ly host has re-run
        # this role. ly's own /etc/pam.d/ly already ships pam_gnome_keyring auth, password
        # and session lines, so the earlier additions to /etc/pam.d/login (reached via ly's
        # `auth/session include login`) and the stray /etc/pam.d/ly password line were
        # redundant. The duplicated session auto_start unlocks the keyring on the first call,
        # then logs a spurious "couldn't unlock the login keyring" on the second, already
        # unlocked call. Stripping them leaves ly's native integration to auto-unlock cleanly.
        - name: Remove redundant Gnome keyring auth line from login PAM
          ansible.builtin.lineinfile:
            path: /etc/pam.d/login
            regexp: '^auth\s+optional\s+pam_gnome_keyring\.so\s*$'
            state: absent
          become: true

        - name: Remove redundant Gnome keyring password line from ly PAM
          ansible.builtin.lineinfile:
            path: /etc/pam.d/ly
            regexp: '^password\s+optional\s+pam_gnome_keyring\.so\s*$'
            state: absent
          become: true

        - name: Remove redundant Gnome keyring session line from login PAM
          ansible.builtin.lineinfile:
            path: /etc/pam.d/login
            regexp: '^session\s+optional\s+pam_gnome_keyring\.so\s+auto_start\s*$'
            state: absent
          become: true

    - name: Enable ly display manager
      ansible.builtin.systemd_service:
        name: ly@tty2.service
        daemon_reload: true
        enabled: true
        masked: false
      become: true
