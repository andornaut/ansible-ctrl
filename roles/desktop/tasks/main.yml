---
- name: Resolve home directory for {{ desktop_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ desktop_user }}"
  tags: always

- name: Validate desktop environment
  ansible.builtin.assert:
    that:
      - desktop_environment is defined and desktop_environment in ["gnome", "niri", "bspwm"]
    fail_msg: >-
      desktop_environment must be set (no default) to "gnome", "niri", or "bspwm".
      Set it in host_vars for this host.
    success_msg: Desktop environment "{{ desktop_environment }}" is valid

# Fail here rather than in default_browser.yml, which resolves the value through a dict
# lookup in vars/main.yml and so would raise an opaque templating error, and only after
# chrome.yml, flatpak.yml and firefox.yml have already purged and pinned packages.
- name: Validate default browser
  ansible.builtin.assert:
    that:
      - desktop_default_browser in ["firefox", "google-chrome"]
      - not (desktop_default_browser == "firefox" and not desktop_install_firefox)
    fail_msg: >-
      desktop_default_browser must be "firefox" or "google-chrome", and cannot be
      "firefox" when desktop_install_firefox is false.
    success_msg: Default browser "{{ desktop_default_browser }}" is valid
  # Tagged to match default_browser.yml (and firefox.yml's removal): a `--tags firefox`
  # or `--tags chrome` run that reconfigures or removes a browser must still validate the
  # pairing first, otherwise default_browser.yml fails opaquely on a removed Firefox.
  tags:
    - chrome
    - default-browser
    - firefox

- name: Install common system packages
  ansible.builtin.import_tasks: apt.yml

- name: Install GNOME desktop
  ansible.builtin.import_tasks: gnome.yml
  tags: gnome
  when: desktop_environment == "gnome"

- name: Configure display manager
  tags: display-manager
  when: desktop_environment != "gnome"
  block:
    - name: Validate display manager configuration
      ansible.builtin.assert:
        that:
          - (desktop_install_ly | int) + (desktop_install_lemurs | int) <= 1
        fail_msg: >-
          Only one display manager can be installed at a time.
          Please enable only one of: desktop_install_ly, desktop_install_lemurs
        success_msg: Display manager configuration is valid

    - name: Set display manager services to disable
      ansible.builtin.set_fact:
        desktop_display_managers_to_disable:
          - gdm3
          - lightdm
          - "{{ 'lemurs' if not desktop_install_lemurs else '' }}"
          - "{{ 'ly' if not desktop_install_ly else '' }}"

    - name: Disable other display manager services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        daemon_reload: true
        enabled: false
        masked: true
      failed_when: false
      loop: "{{ desktop_display_managers_to_disable | reject('equalto', '') | list }}"
      become: true

    - name: Remove display-manager.service symlink
      ansible.builtin.file:
        path: /etc/systemd/system/display-manager.service
        state: absent
      become: true

    # Both ly (ly@tty2) and lemurs run their greeter on tty2, so free it before either
    # enables its unit. Shared here rather than duplicated in each DM's task file.
    - name: Prevent TTY conflicts
      ansible.builtin.systemd_service:
        name: getty@tty2.service
        daemon_reload: true
        state: stopped
        enabled: false
      become: true

    - name: Install and configure lemurs display manager
      ansible.builtin.import_tasks: lemurs.yml
      when: desktop_install_lemurs

    - name: Install and configure ly display manager
      ansible.builtin.import_tasks: ly.yml
      when: desktop_install_ly

- name: Configure common applications
  block:
    - name: Configure Alacritty
      ansible.builtin.import_tasks: alacritty.yml
      tags: alacritty

    - name: Configure Google Chrome
      ansible.builtin.import_tasks: chrome.yml
      tags: chrome

    - name: Configure CoolerControl
      ansible.builtin.import_tasks: coolercontrol.yml
      tags: coolercontrol

    - name: Install it87 fan control driver
      ansible.builtin.import_tasks: it87.yml
      tags: it87
      when: desktop_install_it87

    - name: Install nct6687d fan control driver
      ansible.builtin.import_tasks: nct6687d.yml
      tags: nct6687d
      when: desktop_install_nct6687d

    - name: Configure dconf
      ansible.builtin.import_tasks: dconf.yml
      tags: dconf

    - name: Configure file-roller archive associations
      ansible.builtin.import_tasks: file_roller.yml
      tags: file-roller

    # After dconf.yml, which installs the dconf-cli that the GNOME timeouts are set with.
    - name: Configure screen blanking and locking
      ansible.builtin.import_tasks: idle.yml
      tags: idle

    # flatpak.yml must run before firefox.yml: it installs the flatpak package
    # and adds the flathub remote, which the Firefox flatpak install depends on.
    - name: Configure flatpak
      ansible.builtin.import_tasks: flatpak.yml
      tags: flatpak

    - name: Configure Firefox
      ansible.builtin.import_tasks: firefox.yml
      tags: firefox

    # After chrome.yml and firefox.yml, which install the .desktop files it selects
    # between. Tagged with both of them as well as itself, so that `--tags firefox`
    # still repoints the default browser after switching install methods.
    - name: Configure the default browser
      ansible.builtin.import_tasks: default_browser.yml
      tags:
        - chrome
        - default-browser
        - firefox

    - name: Configure fonts
      ansible.builtin.import_tasks: fonts.yml
      tags: fonts

    - name: Configure GRUB
      ansible.builtin.import_tasks: grub.yml
      tags: grub

    - name: Configure Insync
      ansible.builtin.import_tasks: insync.yml
      tags: insync
      when: desktop_install_insync

    - name: Configure LACT
      ansible.builtin.import_tasks: lact.yml
      tags: lact

    - name: Configure parental controls
      ansible.builtin.import_tasks: parental_controls.yml
      tags: parental-controls
      when: desktop_install_parental_controls

- name: Configure tiling window manager applications
  when: desktop_environment != "gnome"
  block:
    - name: Install tiling window manager system packages
      ansible.builtin.import_tasks: apt_tiling.yml

    - name: Configure dunst
      ansible.builtin.import_tasks: dunst.yml
      tags: dunst

    - name: Configure eww
      ansible.builtin.import_tasks: eww.yml
      tags: eww

    - name: Configure pavolume
      ansible.builtin.import_tasks: pavolume.yml
      tags: pavolume

    - name: Configure rofi
      ansible.builtin.import_tasks: rofi.yml
      tags: rofi
