---
- name: Install malcontent
  ansible.builtin.apt:
    name: "{{ ['malcontent', 'malcontent-gui'] + (['libnss-malcontent'] if desktop_parental_controls_web_filter_enabled else []) }}"
    state: latest
    install_recommends: false
  become: true

# CLEANUP (added 2026-07-09): remove once malcontent's postinst creates its own users,
# then reconverge every host that sets desktop_install_parental_controls.
#
# Works around an Ubuntu packaging bug in malcontent 0.14.0-0ubuntu1.1. The package ships
# /usr/lib/sysusers.d/malcontent-{webd,timerd,timer-extension-agent}.conf but its postinst
# has no dh_installsysusers block, so the users are never created; compare colord, whose
# postinst runs `systemd-sysusers colord-sysusers.conf`. The postinst then starts all five
# units, and each daemon dies with 217/USER "Unknown user". The boot-time fallback does not
# save it either: systemd-sysusers.service is gated on ConditionNeedsUpdate=|/etc, which
# stays false because installing a package does not bump /usr's own mtime.
#
# systemd-sysusers reads those declarations and is idempotent; getent exits non-zero if any
# of the users is absent, so a converged host runs nothing.
- name: Check whether the malcontent service users exist
  ansible.builtin.command: getent passwd {{ desktop_malcontent_users | join(' ') }}
  register: desktop_malcontent_getent
  changed_when: false
  failed_when: false

- name: Create the missing malcontent service users # noqa: command-instead-of-module
  ansible.builtin.command: systemd-sysusers
  when: desktop_malcontent_getent.rc != 0
  changed_when: true
  become: true

# Each daemon claims a D-Bus name its policy grants to one of those users, and dbus
# resolves policy users when it loads its configuration. A dbus that started before the
# users existed rejects the claim, and the daemon exits 72/OSFILE with "Lost D-Bus name".
- name: Reload dbus so its policies resolve the new users
  ansible.builtin.systemd_service:
    name: dbus.service
    state: reloaded
  when: desktop_malcontent_getent.rc != 0
  become: true

- name: Start the malcontent daemons now that their users exist
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: restarted
  loop:
    - malcontent-timerd.service
    - malcontent-webd.service
  when: desktop_malcontent_getent.rc != 0
  become: true

# Part of the same packaging bug: the postinst starts malcontent-webd-update alongside the
# daemons, so on a host whose service users did not exist yet it died 217/USER. Restarting
# the daemons does not clear it, and its own timer only fires weekly, so the unit sits
# failed until then.
#
# This is not gated on the getent check above, because a host that reached that state
# before this task existed now has its users and skips the whole workaround. The unit is a
# oneshot with RemainAfterExit=yes and is enabled WantedBy=multi-user.target, so it is
# active on any host where it has already succeeded, and starting it is a no-op there.
#
# The unit is only a D-Bus client: it calls UpdateFilters on org.freedesktop.MalcontentWeb1
# and exits, which is why it can run under PrivateNetwork. malcontent-webd does the fetching
# and writes /var/lib/malcontent-webd/filter-lists, one per user who has a web filter set by
# `malcontent-client set-web-filter`. Failures land in /var/lib/malcontent-webd/update-error.
- name: Compile the malcontent web filter lists
  ansible.builtin.systemd_service:
    name: malcontent-webd-update.service
    state: started
  become: true

- name: Configure the malcontent OARS app filter for {{ desktop_user }}
  when: desktop_parental_controls_oars | length > 0
  become: true
  block:
    - name: Read the current OARS app filter for {{ desktop_user }}
      ansible.builtin.command: malcontent-client get-app-filter --no-interactive {{ desktop_user }}
      register: desktop_app_filter_before
      changed_when: false

    # set-app-filter overwrites the whole filter, so it is safe to run every time and reports
    # nothing useful about whether anything moved. Reading the filter either side of it is what
    # decides, the same shape as the web filter below. The alternative, comparing the OARS dict
    # against the command's prose output, would mean parsing it.
    - name: Set the OARS app filter for {{ desktop_user }}
      ansible.builtin.command: >-
        malcontent-client set-app-filter --no-interactive {{ desktop_user }}
        {{ desktop_parental_controls_oars.items() | map('join', '=') | join(' ') }}
      changed_when: false

    - name: Report whether the OARS app filter moved
      ansible.builtin.command: malcontent-client get-app-filter --no-interactive {{ desktop_user }}
      register: desktop_app_filter_after
      changed_when: desktop_app_filter_after.stdout != desktop_app_filter_before.stdout

- name: Deploy Chrome family policy
  ansible.builtin.copy:
    content: "{{ desktop_chrome_family_policies | to_nice_json }}\n"
    dest: /etc/opt/chrome/policies/managed/family.json
    mode: "0644"
  become: true

# Web filtering. malcontent enforces it in the name service switch rather than in the
# browser: nss-malcontent sinkholes a blocked hostname for the users that have a compiled
# filter list, and defers to the next module for everyone else. So the nsswitch edit is
# system-wide while the policy stays per-user.
- name: Configure malcontent web filtering for {{ desktop_user }}
  when: desktop_parental_controls_web_filter_enabled
  become: true
  block:
    # The module has to see a name before the resolvers that would answer it, so it goes
    # directly after `files`. The negative lookahead makes a second run match nothing,
    # which is what keeps this idempotent; `replace` would otherwise insert on every run.
    - name: Insert the malcontent NSS module into the hosts lookup chain
      ansible.builtin.replace:
        path: /etc/nsswitch.conf
        regexp: '^(hosts:\s+files)(?!\s+malcontent\b)(\s.*)$'
        replace: '\1 malcontent\2'

    # A hosts line that does not begin with `files` matches nothing above, and `replace`
    # reports no change rather than failing. Left alone that silently disables filtering,
    # so read the line back instead of trusting the substitution.
    - name: Read back the hosts lookup chain
      ansible.builtin.slurp:
        src: /etc/nsswitch.conf
      register: desktop_nsswitch

    - name: Assert that the malcontent NSS module is in the hosts lookup chain
      ansible.builtin.assert:
        that:
          - desktop_nsswitch.content | b64decode is search('^hosts:\s+files\s+malcontent\s', multiline=True)
        fail_msg: >-
          The hosts line in /etc/nsswitch.conf does not start with `files malcontent`.
          nss-malcontent must precede the resolvers that would answer a blocked name.
        success_msg: nss-malcontent precedes the resolvers in the hosts lookup chain

    - name: Read the current web filter for {{ desktop_user }}
      ansible.builtin.command: malcontent-client get-web-filter --no-interactive {{ desktop_user }}
      register: desktop_web_filter_before
      changed_when: false

    # set-web-filter overwrites the whole filter, so it is safe to run every time and
    # reports nothing useful about whether anything moved. The re-read below is what
    # decides, because recompiling means downloading every filter list again.
    - name: Set the web filter for {{ desktop_user }}
      ansible.builtin.command: >-
        malcontent-client set-web-filter --no-interactive
        --filter-type {{ desktop_parental_controls_web_filter_type }}
        {{ '--force-safe-search' if desktop_parental_controls_web_force_safe_search else '' }}
        {{ desktop_user }} {{ desktop_parental_controls_web_filter_args | join(' ') }}
      changed_when: false

    - name: Recompile the filter lists if the web filter moved
      ansible.builtin.command: malcontent-client get-web-filter --no-interactive {{ desktop_user }}
      register: desktop_web_filter_after
      changed_when: desktop_web_filter_after.stdout != desktop_web_filter_before.stdout
      notify: Recompile the malcontent web filter lists

# Leaving an enforced filter behind after the flag is turned off would be worse than never
# having set one, because nothing on the host would say why a domain fails to resolve. The
# nsswitch entry is left in place: with no compiled list the module defers on every lookup.
- name: Disable malcontent web filtering for {{ desktop_user }}
  when: not desktop_parental_controls_web_filter_enabled
  become: true
  block:
    - name: Read the current web filter for {{ desktop_user }}
      ansible.builtin.command: malcontent-client get-web-filter --no-interactive {{ desktop_user }}
      register: desktop_web_filter_current
      changed_when: false

    - name: Clear the web filter for {{ desktop_user }}
      ansible.builtin.command: >-
        malcontent-client set-web-filter --no-interactive --filter-type none {{ desktop_user }}
      changed_when: true
      notify: Recompile the malcontent web filter lists
      when: "'not enabled' not in desktop_web_filter_current.stdout"
