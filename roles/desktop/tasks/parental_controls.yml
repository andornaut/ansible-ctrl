---
# Runs whether or not the controls are installed: turning desktop_install_parental_controls off
# has to lift what an earlier run enforced, else nothing would say why an app is hidden or a
# domain fails to resolve. See the README.
- name: Validate the parental controls configuration
  ansible.builtin.assert:
    that:
      - desktop_parental_controls_web_filter_type in ["none", "block-list", "allow-list"]
      - desktop_install_parental_controls or desktop_parental_controls_oars | length == 0
      - desktop_install_parental_controls or desktop_parental_controls_web_filter_type == "none"
    fail_msg: >-
      desktop_parental_controls_web_filter_type must be "none", "block-list" or "allow-list".
      With desktop_install_parental_controls false this role lifts the filters an earlier run
      set, so desktop_parental_controls_oars must be empty and the filter type "none": remove
      the host's desktop_parental_controls_* settings rather than leave them describing a
      policy that nothing enforces.
    success_msg: Parental controls configuration is valid

# Both fail silently: an empty block list enforces nothing while reporting filtering is on, and
# an empty allow list sinkholes every hostname the user looks up.
- name: Validate the web filter entries
  ansible.builtin.assert:
    that:
      - desktop_parental_controls_web_filter_type != "block-list"
        or (desktop_parental_controls_web_block_lists | length)
        + (desktop_parental_controls_web_blocked_hosts | length) > 0
      - desktop_parental_controls_web_filter_type != "allow-list"
        or (desktop_parental_controls_web_allow_lists | length)
        + (desktop_parental_controls_web_allowed_hosts | length) > 0
    fail_msg: >-
      A "{{ desktop_parental_controls_web_filter_type }}" web filter with no filter lists and
      no hostnames of its own enforces nothing if it blocks by default, and sinkholes every
      hostname {{ desktop_user }} looks up if it allows by default. Populate
      desktop_parental_controls_web_block_lists or _blocked_hosts (or the allow-list
      equivalents), or set the filter type to "none".
    success_msg: The web filter entries are valid
  when: desktop_parental_controls_web_filter_enabled

- name: Install parental controls
  when: desktop_install_parental_controls
  become: true
  block:
    - name: Install malcontent
      ansible.builtin.apt:
        name: "{{ ['malcontent', 'malcontent-gui'] + (['libnss-malcontent'] if desktop_parental_controls_web_filter_enabled else []) }}"
        state: latest
        install_recommends: false

    # CLEANUP (added 2026-07-09): remove this task and the three below, along with the web filter
    # compilation that follows, once malcontent's postinst creates its own users, then reconverge
    # every host that sets desktop_install_parental_controls.
    #
    # Works around an Ubuntu packaging bug: malcontent ships the sysusers.d declarations but its
    # postinst never runs systemd-sysusers, so the daemons it starts die 217/USER "Unknown user".
    # systemd-sysusers is idempotent; getent exits non-zero if any user is absent, so a converged
    # host runs nothing. check_mode: false because the tasks below branch on its rc.
    - name: Check whether the malcontent service users exist
      ansible.builtin.command: getent passwd {{ desktop_malcontent_users | join(' ') }}
      register: desktop_malcontent_getent
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Create the missing malcontent service users # noqa: command-instead-of-module
      ansible.builtin.command: systemd-sysusers
      when: desktop_malcontent_getent.rc != 0
      changed_when: true

    # Each daemon claims a D-Bus name its policy grants to one of those users, and dbus
    # resolves policy users when it loads its configuration. A dbus that started before the
    # users existed rejects the claim, and the daemon exits 72/OSFILE with "Lost D-Bus name".
    - name: Reload dbus so its policies resolve the new users
      ansible.builtin.systemd_service:
        name: dbus.service
        state: reloaded
      when: desktop_malcontent_getent.rc != 0

    - name: Start the malcontent daemons now that their users exist
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: restarted
      loop:
        - malcontent-timerd.service
        - malcontent-webd.service
      when: desktop_malcontent_getent.rc != 0

    # Same packaging bug: the postinst starts this oneshot before the users exist, so it dies
    # 217/USER and, with its timer firing weekly, sits failed until then. Not gated on the getent
    # check: it is a oneshot with RemainAfterExit, so starting it is a no-op where it already
    # succeeded. It only calls UpdateFilters over D-Bus; malcontent-webd does the fetching and
    # writes /var/lib/malcontent-webd/filter-lists (failures land in .../update-error).
    - name: Compile the malcontent web filter lists
      ansible.builtin.systemd_service:
        name: malcontent-webd-update.service
        state: started

    - name: Deploy Chrome family policy
      ansible.builtin.copy:
        content: "{{ desktop_chrome_family_policies | to_nice_json }}\n"
        dest: "{{ desktop_chrome_family_policy_path }}"
        mode: "0644"

    # nss-malcontent sinkholes a blocked hostname for users with a compiled filter list and
    # defers for everyone else, so the nsswitch edit is system-wide while the policy stays
    # per-user. Left in place when the filter is lifted: with no compiled list it defers on every
    # lookup.
    - name: Insert the malcontent NSS module into the hosts lookup chain
      when: desktop_parental_controls_web_filter_enabled
      block:
        # Goes directly after `files` so the module sees a name before the resolvers that would
        # answer it. The negative lookahead keeps it idempotent (replace would insert every run).
        - name: Add malcontent to the hosts lookup chain
          ansible.builtin.replace:
            path: /etc/nsswitch.conf
            regexp: '^(hosts:\s+files)(?!\s+malcontent\b)(\s.*)$'
            replace: '\1 malcontent\2'

        # A hosts line not beginning with `files` matches nothing, and replace reports no change
        # rather than failing, silently disabling filtering. Read the line back to catch it.
        - name: Read back the hosts lookup chain
          ansible.builtin.slurp:
            src: /etc/nsswitch.conf
          register: desktop_nsswitch

        - name: Assert that the malcontent NSS module is in the hosts lookup chain
          ansible.builtin.assert:
            that:
              - desktop_nsswitch.content | b64decode is search('^hosts:\s+files\s+malcontent\s', multiline=True)
            fail_msg: >-
              The hosts line in /etc/nsswitch.conf does not start with `files malcontent`.
              nss-malcontent must precede the resolvers that would answer a blocked name.
            success_msg: nss-malcontent precedes the resolvers in the hosts lookup chain

# Chrome merges every file in the managed policy directory, later name winning, so a
# family.json.bak beside family.json is a second policy that outranks the original. The role
# owns the directory: anything it did not deploy is swept, which is also how the policy is lifted
# (with controls off it deploys nothing). The malcontent packages are left installed: without a
# filter they enforce nothing, and libnss-malcontent must outlive the nsswitch entry above.
# find reports no files rather than failing on a host where chrome.yml has not created the dir.
- name: Find Chrome managed policies the role did not deploy
  ansible.builtin.find:
    paths: "{{ desktop_chrome_policies_dir }}"
    excludes: "{{ ['family.json'] if desktop_install_parental_controls else [] }}"
  register: desktop_chrome_policies_found

- name: Remove Chrome managed policies the role did not deploy
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ desktop_chrome_policies_found.files }}"
  loop_control:
    label: "{{ item.path }}"
  become: true

# The filters are daemon state, not files, so enforcing and lifting are one operation:
# set-app-filter/set-web-filter overwrite the whole filter, and an empty filter clears it. Both
# argument lists come from vars/main.yml, so these tasks need no branch. Guarded on the client
# being installed: a host that never enabled the controls has nothing to clear.
- name: Check whether the malcontent client is installed
  ansible.builtin.stat:
    path: "{{ desktop_malcontent_client }}"
  register: desktop_malcontent_client_stat

- name: Apply the malcontent filters for {{ desktop_user }}
  when: desktop_malcontent_client_stat.stat.exists
  become: true
  block:
    - name: Read the current app filter for {{ desktop_user }}
      ansible.builtin.command: malcontent-client get-app-filter --no-interactive {{ desktop_user }}
      register: desktop_app_filter_before
      changed_when: false

    # set-app-filter reports nothing about whether anything moved, so read the filter either side
    # of it to decide (same shape as the web filter below).
    - name: Set the app filter for {{ desktop_user }}
      ansible.builtin.command: >-
        malcontent-client set-app-filter --no-interactive
        {{ desktop_parental_controls_app_filter_args | join(' ') }}
      changed_when: false

    - name: Report whether the app filter moved
      ansible.builtin.command: malcontent-client get-app-filter --no-interactive {{ desktop_user }}
      register: desktop_app_filter_after
      changed_when: desktop_app_filter_after.stdout != desktop_app_filter_before.stdout

    - name: Read the current web filter for {{ desktop_user }}
      ansible.builtin.command: malcontent-client get-web-filter --no-interactive {{ desktop_user }}
      register: desktop_web_filter_before
      changed_when: false

    - name: Set the web filter for {{ desktop_user }}
      ansible.builtin.command: >-
        malcontent-client set-web-filter --no-interactive
        {{ desktop_parental_controls_web_filter_args | join(' ') }}
      changed_when: false

    # The re-read decides, because recompiling means re-downloading every filter list. Clearing
    # the filter fires the handler too: it is what drops the compiled list.
    - name: Recompile the filter lists if the web filter moved
      ansible.builtin.command: malcontent-client get-web-filter --no-interactive {{ desktop_user }}
      register: desktop_web_filter_after
      changed_when: desktop_web_filter_after.stdout != desktop_web_filter_before.stdout
      notify: Recompile the malcontent web filter lists
