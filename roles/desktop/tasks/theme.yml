---
- name: Validate GTK theme
  ansible.builtin.assert:
    that:
      - desktop_gtk_theme in desktop_gtk_themes
    fail_msg: >-
      desktop_gtk_theme ("{{ desktop_gtk_theme }}") must be one of desktop_gtk_themes,
      which are the only themes this role installs and copies where flatpak applications
      can find them.
    success_msg: GTK theme "{{ desktop_gtk_theme }}" is valid

- name: Install GTK theme packages
  ansible.builtin.apt:
    name: "{{ desktop_gtk_theme_packages }}"
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# GTK 3 and GTK 4 read settings.ini from each XDG_CONFIG_DIRS entry (/etc/xdg) before
# XDG_CONFIG_HOME, so this sets the host-wide default while leaving ~/.config free to
# override it. /etc/gtk-3.0/settings.ini is read earlier still, but it is a dpkg conffile of
# libgtk-3-0t64, and editing it would prompt on every upgrade of that package.
#
# GNOME ignores both files: gnome-settings-daemon publishes the same settings over XSettings,
# which outranks any settings.ini. The dconf keys below are what it reads. bspwm and niri run
# no settings daemon, so for them these files are the only host-side mechanism.
- name: Configure the system GTK theme
  become: true
  block:
    - name: Create the system GTK configuration directories
      ansible.builtin.file:
        path: /etc/xdg/gtk-{{ item }}
        state: directory
        mode: "0755"
      loop:
        - "3.0"
        - "4.0"

    - name: Set the system GTK theme
      ansible.builtin.copy:
        content: |
          [Settings]
          gtk-theme-name = {{ desktop_gtk_theme }}
          gtk-application-prefer-dark-theme = {{ desktop_gtk_theme_prefer_dark | ternary(1, 0) }}
        dest: /etc/xdg/gtk-{{ item }}/settings.ini
        mode: "0644"
      loop:
        - "3.0"
        - "4.0"

- name: Configure the GTK theme for the target user
  become: true
  become_user: "{{ desktop_user }}"
  block:
    # Set on every desktop, not just GNOME: xdg-desktop-portal-gtk serves these keys to
    # applications that ask the settings portal for the system appearance, which is how
    # sandboxed and Electron applications (browsers included) decide whether to render dark.
    # dconf writes to the invoking user's database, so this runs as desktop_user, and
    # XDG_RUNTIME_DIR points the module at that user's session bus, which is not set when
    # Ansible escalates to a user it did not log in as.
    - name: Configure the GNOME appearance
      community.general.dconf:
        key: "{{ item.key }}"
        value: "'{{ item.value }}'"
        state: present
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
      loop:
        - key: /org/gnome/desktop/interface/gtk-theme
          value: "{{ desktop_gtk_theme }}"
        - key: /org/gnome/desktop/interface/color-scheme
          value: "{{ desktop_gtk_theme_color_scheme }}"

    - name: Create the flatpak theme directory
      ansible.builtin.file:
        path: "{{ desktop_gtk_themes_dir }}"
        state: directory
        mode: "0755"

    # Copied rather than symlinked: a symlink into /usr/share/themes resolves inside the
    # sandbox, where /usr is the flatpak runtime and the theme is not there.
    - name: Copy the GTK themes where flatpak applications can find them
      ansible.builtin.copy:
        src: /usr/share/themes/{{ item }}
        dest: "{{ desktop_gtk_themes_dir }}/"
        remote_src: true
        mode: preserve
      loop: "{{ desktop_gtk_themes }}"

    # A global override (no application argument) covers every flatpak this user runs,
    # including the ones the games role installs, so neither role has to know the other's
    # application list.
    #
    # GTK_THEME is set rather than left to the settings portal because the portal only
    # carries the theme *name*: a sandbox handed a name it cannot resolve falls back to
    # Adwaita (light) and drops the application's dark preference along with it. Naming the
    # theme that is mounted at ~/.themes keeps that from depending on what the host session
    # happens to publish, which under bspwm and niri is nothing at all.
    #
    # `flatpak override` rewrites the override file unconditionally and reports nothing, so
    # compare `--show` output either side of it to report changes honestly.
    - name: Apply the flatpak theme override
      ansible.builtin.shell:
        cmd: |
          before="$(flatpak override --user --show)"
          flatpak override --user \
            --filesystem={{ desktop_gtk_themes_dir | quote }}:ro \
            --env=GTK_THEME={{ desktop_gtk_theme | quote }}
          after="$(flatpak override --user --show)"
          [ "${before}" = "${after}" ] || echo CHANGED
        executable: /bin/bash
      register: desktop_flatpak_theme_override
      changed_when: "'CHANGED' in desktop_flatpak_theme_override.stdout"
