---
- name: Validate GTK theme
  ansible.builtin.assert:
    that:
      - desktop_gtk_theme in desktop_gtk_themes
    fail_msg: >-
      desktop_gtk_theme ("{{ desktop_gtk_theme }}") must be one of desktop_gtk_themes, the
      only themes this role installs.
    success_msg: GTK theme "{{ desktop_gtk_theme }}" is valid

- name: Install GTK theme packages
  ansible.builtin.apt:
    name: "{{ desktop_gtk_theme_packages }}"
    state: latest
    install_recommends: false
    update_cache: true
  become: true

# /etc/xdg rather than /etc/gtk-3.0, which GTK reads first but which is a dpkg conffile of
# libgtk-3-0t64. Only bspwm and niri read these: GNOME takes the dconf keys below instead,
# served over XSettings, which outranks any settings.ini.
- name: Configure the system GTK theme
  become: true
  block:
    - name: Create the system GTK configuration directories
      ansible.builtin.file:
        path: /etc/xdg/gtk-{{ item }}
        state: directory
        mode: "0755"
      loop:
        - "3.0"
        - "4.0"

    - name: Set the system GTK theme
      ansible.builtin.copy:
        content: |
          [Settings]
          gtk-theme-name = {{ desktop_gtk_theme }}
          gtk-application-prefer-dark-theme = {{ desktop_gtk_theme_prefer_dark | ternary(1, 0) }}
        dest: /etc/xdg/gtk-{{ item }}/settings.ini
        mode: "0644"
      loop:
        - "3.0"
        - "4.0"

- name: Configure the GTK theme for the target user
  become: true
  become_user: "{{ desktop_user }}"
  block:
    # Set on every desktop, not just GNOME: xdg-desktop-portal-gtk serves these keys as the
    # system appearance, which is how browsers and Electron apps decide whether to render
    # dark. XDG_RUNTIME_DIR points dconf at desktop_user's session bus, which is not set when
    # Ansible escalates to a user it did not log in as.
    - name: Configure the GNOME appearance
      community.general.dconf:
        key: "{{ item.key }}"
        value: "'{{ item.value }}'"
        state: present
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ desktop_user_uid }}"
      loop:
        - key: /org/gnome/desktop/interface/gtk-theme
          value: "{{ desktop_gtk_theme }}"
        - key: /org/gnome/desktop/interface/color-scheme
          value: "{{ desktop_gtk_theme_color_scheme }}"

    - name: Create the flatpak theme directory
      ansible.builtin.file:
        path: "{{ desktop_gtk_themes_dir }}"
        state: directory
        mode: "0755"

    # Copied, not symlinked: inside the sandbox a link into /usr/share/themes resolves against
    # the flatpak runtime, which does not have the theme.
    - name: Copy the GTK themes where flatpak applications can find them
      ansible.builtin.copy:
        src: /usr/share/themes/{{ item }}
        dest: "{{ desktop_gtk_themes_dir }}/"
        remote_src: true
        mode: preserve
      loop: "{{ desktop_gtk_themes }}"

    # Global (no application argument), so it also covers the flatpaks the games role
    # installs, which neither role has to know about.
    #
    # GTK_THEME rather than the settings portal, which carries only the theme name: handed a
    # name it cannot resolve, GTK falls back to Adwaita (light) and drops the application's
    # dark preference with it. Naming the theme mounted at ~/.themes cannot miss.
    #
    # `flatpak override` rewrites the file unconditionally and reports nothing, so compare
    # `--show` either side of it to report changes honestly.
    - name: Apply the flatpak theme override
      ansible.builtin.shell:
        cmd: |
          before="$(flatpak override --user --show)"
          flatpak override --user \
            --filesystem={{ desktop_gtk_themes_dir | quote }}:ro \
            --env=GTK_THEME={{ desktop_gtk_theme | quote }}
          after="$(flatpak override --user --show)"
          [ "${before}" = "${after}" ] || echo CHANGED
        executable: /bin/bash
      register: desktop_flatpak_theme_override
      changed_when: "'CHANGED' in desktop_flatpak_theme_override.stdout"
