---
# Values derived from defaults/main.yml, not operator knobs. They live here rather than
# in defaults/ so that role vars outrank host_vars and a host cannot desync a derived
# value from the variable it is derived from.

# Home directory of desktop_user, resolved from the passwd database (a getent
# lookup runs in tasks/main.yml). Used only where a task needs the literal home
# path (e.g. locating per-user flatpak exports when setting the default browser).
desktop_user_home: "{{ ansible_facts['getent_passwd'][desktop_user][4] }}"
# UID of desktop_user, from the same getent lookup. `systemctl --user` locates the
# target user's bus through XDG_RUNTIME_DIR=/run/user/<uid>, which is not set when
# Ansible escalates to a user it did not log in as.
desktop_user_uid: "{{ ansible_facts['getent_passwd'][desktop_user][1] }}"

# System users malcontent's daemons run as, declared by the package in
# /usr/lib/sysusers.d. The names are not all derivable from the unit names: the timer
# extension agent's unit is malcontent-timer-extension-agent but its user is
# malcontent-timer-ext-agent.
desktop_malcontent_users:
  - malcontent-timer-ext-agent
  - malcontent-timerd
  - malcontent-webd

# Whether any web filtering is configured for desktop_user. "none" is malcontent's own
# spelling for the disabled filter type, so it doubles as the feature flag.
desktop_parental_controls_web_filter_enabled: "{{ desktop_parental_controls_web_filter_type != 'none' }}"
# Positional arguments to `malcontent-client set-web-filter`. Lists are `id=uri` pairs and
# individual hostnames are bare; a `~` prefix moves either onto the allow list. Order does
# not matter to malcontent, and idempotency is decided by diffing `get-web-filter` output
# rather than by comparing this string.
desktop_parental_controls_web_filter_args: >-
  {{ (desktop_parental_controls_web_block_lists.items() | map('join', '=') | list)
     + (desktop_parental_controls_web_allow_lists.items() | map('join', '=')
        | map('regex_replace', '^', '~') | list)
     + (desktop_parental_controls_web_blocked_hosts | list)
     + (desktop_parental_controls_web_allowed_hosts | map('regex_replace', '^', '~') | list) }}

# Idle timeouts in the units each daemon expects. hypridle, dconf and xset take seconds.
desktop_screen_blank_seconds: "{{ desktop_screen_blank_minutes | int * 60 }}"
desktop_screen_lock_seconds: "{{ desktop_screen_lock_minutes | int * 60 }}"
desktop_screen_off_seconds: "{{ desktop_screen_off_minutes | int * 60 }}"
# GNOME's screensaver lock-delay counts from the moment the screen blanks, not from the
# moment the session went idle, so it is the gap between the two timeouts rather than the
# lock timeout itself. The X screensaver's cycle is the same quantity under bspwm: it is how
# long after blanking that xss-lock starts the locker.
desktop_screen_lock_delay_seconds: >-
  {{ (desktop_screen_lock_minutes | int - desktop_screen_blank_minutes | int) * 60 }}
# Idle-suspend timeout, applied to mains and battery alike: none of the three mechanisms
# (logind's IdleActionSec, GNOME's sleep-inactive-{ac,battery}-timeout, hypridle's listener)
# distinguishes the power source. An unset desktop_suspend_inactive_minutes leaves the
# host's existing suspend policy alone; 0 disables idle suspend; N suspends after N minutes.
desktop_suspend_inactive_managed: "{{ desktop_suspend_inactive_minutes is not none }}"
desktop_suspend_inactive_seconds: "{{ desktop_suspend_inactive_minutes | default(0, true) | int * 60 }}"
desktop_suspend_inactive_action: >-
  {{ (desktop_suspend_inactive_seconds | int > 0) | ternary("'suspend'", "'nothing'") }}

# Session configuration files that idle.yml writes. Each may be a symlink into a dotfiles
# repository, so only modules that resolve the link themselves (blockinfile, lineinfile,
# replace) may write them.
desktop_bspwm_session_script: "{{ desktop_user_home }}/.config/bspwm/desktop"
desktop_hypridle_conf: "{{ desktop_user_home }}/.config/hypr/hypridle.conf"
desktop_xss_lock_autostart: "{{ desktop_user_home }}/.config/autostart/xss-lock.desktop"

# Platform key into https://ziglang.org/download/index.json. Zig spells these with
# the kernel architecture names that Ansible reports, so no mapping is needed here
# (unlike dev_arch/docker_arch, which translate to the Debian names apt expects).
desktop_zig_platform: "{{ ansible_facts['architecture'] }}-linux"

# The packages flatpak.yml purges and then pins, so apt cannot bring them back. Snap is
# not among them: the base role purges and pins snapd on every host, not just desktops.
# Override desktop_flatpak_replacements instead.
desktop_flatpak_pinned_packages: "{{ desktop_flatpak_replacements.keys() | list }}"

# The .desktop id that identifies desktop_default_browser to xdg-settings. Firefox
# exports a different id depending on which install method firefox.yml took.
desktop_default_browser_desktop_id: >-
  {{ {'google-chrome': 'google-chrome.desktop',
      'firefox': 'firefox.desktop' if desktop_install_firefox_apt else 'org.mozilla.firefox.desktop'}[desktop_default_browser] }}
