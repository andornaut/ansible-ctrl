---
# Account that user-scoped tasks act on. Defaults to primary_user; override per host.
dev_user: "{{ primary_user }}"

# Secure Boot refuses to load the DKMS modules unless the machine owner key is
# enrolled, so enable this only on hosts meant to run VMs.
dev_install_virtualbox: false
# Oracle publishes one apt package per minor series (virtualbox-7.2).
dev_virtualbox_version: "7.2"

# ai-maintainer cron job (see README).
dev_ai_maintainer_src_base_dir: "{{ dev_user_home }}/src/github.com/andornaut/ai-maintainer"
dev_ai_maintainer_agent_command: "claude"
dev_ai_maintainer_agent_flags: "--dangerously-skip-permissions"

# Schedule: weekly, Sunday 03:00.
dev_ai_maintainer_cron_minute: "0"
dev_ai_maintainer_cron_hour: "3"
dev_ai_maintainer_cron_day: "*"
dev_ai_maintainer_cron_weekday: "0"

dev_ai_maintainer_dependency_min_age_days: 30
dev_ai_maintainer_exclude_repositories: []
dev_ai_maintainer_script_args: "--quiet"
dev_ai_maintainer_script_path: "{{ dev_user_home }}/.local/bin/ai-maintainer"

# When this project checkout exists, the role symlinks the script to it instead
# of downloading from GitHub.
dev_ai_maintainer_project_script_path: "{{ dev_ai_maintainer_src_base_dir }}/ai-maintainer"
