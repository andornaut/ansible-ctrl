---
- name: Reload AppArmor
  ansible.builtin.systemd_service:
    name: apparmor
    state: reloaded
  become: true

- name: Restart docker
  ansible.builtin.systemd_service:
    name: docker
    daemon_reload: true
    state: restarted
  become: true

- name: Update initramfs
  ansible.builtin.command: update-initramfs -u
  changed_when: true
  become: true
