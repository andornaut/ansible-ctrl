---
- name: Configure Google Antigravity Repository
  become: true
  block:
    - name: Download Google Antigravity GPG key
      ansible.builtin.get_url:
        url: https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg
        dest: /etc/apt/keyrings/antigravity-repo-key.asc
        mode: "0644"

    - name: Add Google Antigravity repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={% if ansible_facts['architecture'] == 'x86_64' %}amd64{% else %}{{ ansible_facts['architecture'] }}{% endif %}
          signed-by=/etc/apt/keyrings/antigravity-repo-key.asc]
          https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/
          antigravity-debian main
        state: present
        update_cache: true

- name: Install Google Antigravity IDE
  ansible.builtin.apt:
    name:
      - antigravity
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Install Antigravity CLI (agy) # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://antigravity.google/cli/install.sh | bash
    creates: ~/.local/bin/agy
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"
