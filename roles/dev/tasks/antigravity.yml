---
- name: Configure Google Antigravity Repository
  become: true
  block:
    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Remove old Antigravity GPG key if exists
      ansible.builtin.file:
        path: /etc/apt/keyrings/antigravity-repo-key.gpg
        state: absent

    - name: Download and install Google Antigravity GPG key
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail &&
          curl -fsSL https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg |
          gpg --dearmor --yes -o /etc/apt/keyrings/antigravity-repo-key.gpg
        creates: /etc/apt/keyrings/antigravity-repo-key.gpg
        executable: /bin/bash

    - name: Add Google Antigravity repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={% if ansible_facts['architecture'] == 'x86_64' %}amd64{% else %}{{ ansible_facts['architecture'] }}{% endif %}
          signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg]
          https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/
          antigravity-debian main
        state: present
        update_cache: true

- name: Install Google Antigravity
  ansible.builtin.apt:
    name:
      - antigravity
    state: present
    install_recommends: false
    update_cache: true
  become: true
