---
- name: Install system packages
  ansible.builtin.apt:
    name:
      - gh
      - git
      - golang
      - jq
      - libmysqlclient-dev
      - libxml2-dev
      - libxslt-dev
      - meld
      - mercurial
      - mysql-client
      - postgresql-client
      - xserver-xephyr
    state: latest
    install_recommends: false
    update_cache: true
  become: true
