---
- name: Install Claude Code using native installer # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    creates: ~/.local/bin/claude
    executable: /bin/bash
  environment:
    HOME: "{{ ansible_env.HOME }}"

- name: Install claude-code-router globally for current user
  community.general.npm:
    name: '@musistudio/claude-code-router'
    global: true
    state: present
