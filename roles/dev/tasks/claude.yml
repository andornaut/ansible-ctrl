---
- name: Install Claude Code CLI
  ansible.builtin.include_tasks: install_user_cli.yml
  vars:
    dev_cli_name: Claude Code CLI
    dev_cli_bin: claude
    dev_cli_url: https://claude.ai/install.sh

- name: Check for VS Code
  ansible.builtin.command:
    cmd: command -v code
  register: dev_claude_vscode_bin
  changed_when: false
  failed_when: false

- name: Install Claude Code VS Code extension
  ansible.builtin.command:
    cmd: code --install-extension anthropic.claude-code
  register: dev_claude_vscode_ext
  changed_when: "'successfully installed' in dev_claude_vscode_ext.stdout"
  when: dev_claude_vscode_bin.rc == 0

- name: Install Claude Desktop (Cowork)
  become: true
  block:
    - name: Download Claude Desktop GPG key
      ansible.builtin.get_url:
        url: https://pkg.claude-desktop-debian.dev/KEY.gpg
        dest: /etc/apt/keyrings/claude-desktop.asc
        mode: "0644"

    - name: Add Claude Desktop repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ dev_arch }}
          signed-by=/etc/apt/keyrings/claude-desktop.asc]
          https://pkg.claude-desktop-debian.dev stable main
        state: present
        update_cache: true

    # bubblewrap is Cowork's sandbox backend on Linux; without it Cowork runs
    # with no isolation.
    - name: Install Claude Desktop (Cowork) and sandbox backend
      ansible.builtin.apt:
        name:
          - bubblewrap
          - claude-desktop
        state: latest
        install_recommends: false
        update_cache: true
