---
- name: Get latest Cursor AppImage download URL
  ansible.builtin.uri:
    url: "https://www.cursor.com/api/download?platform=linux-x64&releaseTrack=stable"
    return_content: true
  register: dev_cursor_api_response

- name: Download Cursor
  ansible.builtin.get_url:
    url: "{{ dev_cursor_api_response.json.downloadUrl }}"
    dest: /usr/local/bin/cursor
    mode: "0755"
  become: true

# CLEANUP (added 2026-07-09): remove once every host in dev has run this role at
# least once. Superseded by the per-binary AppArmor profile created below.
- name: Remove global AppArmor user namespace restriction disablement workaround
  ansible.builtin.file:
    path: /etc/sysctl.d/20-apparmor-donotrestrict.conf
    state: absent
  become: true

- name: Create AppArmor profile for Cursor
  ansible.builtin.copy:
    dest: /etc/apparmor.d/usr.local.bin.cursor
    mode: "0644"
    content: |
      # This profile allows the Cursor AppImage to use unprivileged user namespaces
      # without disabling the restriction globally.
      abi <abi/4.0>,
      include <tunables/global>

      profile cursor /usr/local/bin/cursor flags=(unconfined) {
        userns,
      }
  become: true
  notify: Reload AppArmor

- name: Download Cursor icon
  ansible.builtin.get_url:
    url: "https://www.cursor.so/brand/icon.svg"
    dest: "/usr/share/icons/cursor.svg"
    mode: "0644"
  become: true

- name: Create cursor.desktop
  ansible.builtin.blockinfile:
    append_newline: true
    block: |
      [Desktop Entry]
      Name=Cursor
      Exec=/usr/local/bin/cursor --ozone-platform-hint=auto
      Terminal=false
      Type=Application
      Icon=/usr/share/icons/cursor.svg
      StartupWMClass=Cursor
      X-AppImage-Version=latest
      Comment=Cursor is an AI-first coding environment.
      MimeType=x-scheme-handler/cursor;
      Categories=Utility;Development
    create: true
    path: /usr/share/applications/cursor.desktop
    mode: "0644"
  become: true
