---
- name: Get latest Delta release
  ansible.builtin.include_tasks: get_latest_github_release.yml
  vars:
    github_release_repo: dandavison/delta
    github_release_fact: dev_delta_release

- name: Set delta download URL fact
  ansible.builtin.set_fact:
    dev_delta_download_url: >-
      {{ dev_delta_release.assets
      | selectattr('name', 'match', 'git-delta_.*_amd64.deb')
      | map(attribute='browser_download_url') | first }}

- name: Install Delta package
  ansible.builtin.apt:
    deb: "{{ dev_delta_download_url }}"
    install_recommends: false
  become: true
