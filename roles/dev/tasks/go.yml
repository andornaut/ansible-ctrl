---
- name: Get latest Go version
  ansible.builtin.uri:
    url: https://go.dev/dl/?mode=json
    return_content: true
  register: dev_go_releases

- name: Set Go version fact
  ansible.builtin.set_fact:
    dev_go_version: "{{ dev_go_releases.json[0].version }}"

# unarchive can't compare versions before extracting, so the installed version
# (from `go version`) gates the download and extract instead.
- name: Get installed Go version
  ansible.builtin.command:
    cmd: /usr/local/go/bin/go version
  register: dev_go_installed
  changed_when: false
  failed_when: false

- name: Remove Go packages from apt
  ansible.builtin.apt:
    name:
      - golang
      - golang-go
      - golang-doc
      - gccgo-go
    state: absent
    purge: true
    autoremove: true
  become: true

- name: Install Go
  when: dev_go_version not in dev_go_installed.stdout
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: dev_go_tmp

    - name: Download Go tarball
      ansible.builtin.get_url:
        url: "https://go.dev/dl/{{ dev_go_version }}.linux-{{ dev_arch }}.tar.gz"
        dest: "{{ dev_go_tmp.path }}/go.tar.gz"
        mode: "0644"

    # unarchive merges into an existing "go" directory rather than replacing it,
    # so remove the old tree first.
    - name: Remove old Go installation
      ansible.builtin.file:
        path: /usr/local/go
        state: absent
      become: true

    - name: Extract Go tarball to /usr/local
      ansible.builtin.unarchive:
        src: "{{ dev_go_tmp.path }}/go.tar.gz"
        dest: /usr/local
        remote_src: true
      become: true
  always:
    - name: Remove the temporary directory
      ansible.builtin.file:
        path: "{{ dev_go_tmp.path }}"
        state: absent
      when: dev_go_tmp.path is defined
      become: true
