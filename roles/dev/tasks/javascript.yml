---
# Install system-wide nodejs/npm for use by all users or for Ansible tasks, where nvm may not be sourced.
- name: Install system nodejs and npm
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: latest
    update_cache: true
  become: true

# Install nvm for user-specific nodejs/npm management
- name: Get latest nvm release
  ansible.builtin.include_tasks: get_latest_github_release.yml
  vars:
    github_release_repo: nvm-sh/nvm
    github_release_fact: dev_nvm_release

- name: Set nvm version fact
  ansible.builtin.set_fact:
    dev_nvm_version: "{{ dev_nvm_release.tag_name }}"

- name: Install nvm # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: >
      set -o pipefail &&
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ dev_nvm_version }}/install.sh | bash
    executable: /bin/bash
    creates: "{{ dev_user_home }}/.nvm/nvm.sh"
