---
# dev_user must not resolve to root, or user-scoped tasks write to /root. See README.
# tags: always so a --tags run cannot skip the backstop.
- name: Validate dev_user
  ansible.builtin.assert:
    that:
      - dev_user != "root"
    fail_msg: >-
      dev_user resolved to "root". Set primary_user in the inventory
      (or dev_user in host_vars) to the target account.
    success_msg: 'dev_user "{{ dev_user }}" is valid'
  tags: always

- name: Resolve home directory for {{ dev_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ dev_user }}"
  tags: always

- name: Import apt tasks
  ansible.builtin.import_tasks: apt.yml

# Programming languages must be installed before tools that depend on them
- name: Import go tasks
  ansible.builtin.import_tasks: go.yml
  tags: go

- name: Import javascript tasks
  ansible.builtin.import_tasks: javascript.yml
  tags: javascript

- name: Import python tasks
  ansible.builtin.import_tasks: python.yml
  tags: python

- name: Import ruby tasks
  ansible.builtin.import_tasks: ruby.yml
  tags: ruby

- name: Import rust tasks
  ansible.builtin.import_tasks: rust.yml
  tags: rust

# Tools
- name: Import antigravity tasks
  ansible.builtin.import_tasks: antigravity.yml
  tags: antigravity

# vscode must run before claude and kilocode (they install VS Code extensions)
- name: Import vscode tasks
  ansible.builtin.import_tasks: vscode.yml
  tags: vscode

- name: Import claude tasks
  ansible.builtin.import_tasks: claude.yml
  tags: claude

- name: Import codex tasks
  ansible.builtin.import_tasks: codex.yml
  tags: codex

- name: Import cursor tasks
  ansible.builtin.import_tasks: cursor.yml
  tags: cursor

- name: Import kilocode tasks
  ansible.builtin.import_tasks: kilocode.yml
  tags: kilocode

- name: Import opencode tasks
  ansible.builtin.import_tasks: opencode.yml
  tags: opencode

- name: Import virtualbox tasks
  ansible.builtin.import_tasks: virtualbox.yml
  tags: virtualbox
  when: dev_install_virtualbox | bool

# ai-maintainer installs a cron job; only on hosts in the ai_maintainer group
- name: Import ai-maintainer tasks
  ansible.builtin.import_tasks: ai_maintainer.yml
  tags: ai_maintainer
  when: "'ai_maintainer' in group_names"
