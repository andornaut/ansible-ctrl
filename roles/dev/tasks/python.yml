---
- name: Install Python system packages
  ansible.builtin.apt:
    name:
      # Avoid error: fatal error: ffi.h: No such file or directory
      - libffi-dev
      - pipenv
      - python3-dev
      - python3-pip
      - python3-venv
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Link python to python3
  community.general.alternatives:
    name: python
    path: /usr/bin/python3
    link: /usr/bin/python
    priority: 0
  become: true

- name: Install uv CLI
  ansible.builtin.include_tasks: install_user_cli.yml
  vars:
    dev_cli_name: uv CLI
    dev_cli_bin: uv
    dev_cli_url: https://astral.sh/uv/install.sh
    dev_cli_shell: sh
