---
- name: Install Rust system packages
  ansible.builtin.apt:
    name:
      - rustup
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Install Rust toolchain
  ansible.builtin.command: rustup default stable
  become: false
  args:
    creates: "{{ dev_user_home }}/.cargo/bin/rustc"
