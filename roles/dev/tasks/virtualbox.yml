---
- name: Accept virtualbox-ext-pack license
  ansible.builtin.debconf:
    name: virtualbox-ext-pack
    question: virtualbox-ext-pack/license
    value: "true"
    vtype: select
  become: true

- name: Accept virtualbox-ext-pack license seen
  ansible.builtin.debconf:
    name: virtualbox-ext-pack
    question: virtualbox-ext-pack/license
    value: "true"
    vtype: seen
  become: true

- name: Install Virtualbox packages
  ansible.builtin.apt:
    name:
      # virtualbox-dkms only declares Depends: dkms, so the headers it builds
      # against have to be requested explicitly.
      - "linux-headers-{{ ansible_facts['kernel'] }}"
      - virtualbox
      - virtualbox-dkms
      - virtualbox-ext-pack
      - virtualbox-guest-additions-iso
    state: latest
    install_recommends: false
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive
  become: true

- name: Blacklist KVM modules to prevent conflict with VirtualBox
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-kvm.conf
    content: |
      blacklist kvm_amd
      blacklist kvm
    mode: "0644"
  become: true
  notify: Update initramfs

# The virtualbox-dkms postinst builds vboxdrv once and never retries. A kernel
# upgrade that lands before its headers leaves the module unregistered, and the
# service then fails with "No suitable module for running kernel found" until
# DKMS is driven by hand. Reconcile that state on every run instead.
- name: Reconcile the virtualbox DKMS module
  become: true
  block:
    - name: Find the virtualbox DKMS source tree
      ansible.builtin.find:
        paths: /usr/src
        patterns: virtualbox-*
        file_type: directory
      register: dev_virtualbox_dkms_source

    - name: Assert that the virtualbox DKMS source tree exists
      ansible.builtin.assert:
        that: dev_virtualbox_dkms_source.matched > 0
        fail_msg: virtualbox-dkms is installed but /usr/src/virtualbox-* is missing

    - name: Resolve the virtualbox DKMS version
      ansible.builtin.set_fact:
        dev_virtualbox_dkms_version: >-
          {{ dev_virtualbox_dkms_source.files
             | map(attribute='path') | map('basename')
             | map('regex_replace', '^virtualbox-', '')
             | community.general.version_sort | last }}

    - name: Check whether virtualbox is registered with DKMS for the running kernel
      ansible.builtin.command: dkms status virtualbox/{{ dev_virtualbox_dkms_version }} -k {{ ansible_facts['kernel'] }}
      register: dev_virtualbox_dkms
      changed_when: false

    - name: Add the virtualbox module to the DKMS tree
      ansible.builtin.command:
        cmd: dkms add -m virtualbox -v {{ dev_virtualbox_dkms_version }}
      register: dev_virtualbox_dkms_add
      # rc 3 means the module is already in the tree, but not yet built.
      changed_when: dev_virtualbox_dkms_add.rc == 0
      failed_when: dev_virtualbox_dkms_add.rc not in [0, 3]
      when: "'installed' not in dev_virtualbox_dkms.stdout"

    - name: Build and install virtualbox via DKMS
      ansible.builtin.command:
        cmd: dkms install -m virtualbox -v {{ dev_virtualbox_dkms_version }} -k {{ ansible_facts['kernel'] }}
      when: "'installed' not in dev_virtualbox_dkms.stdout"
      changed_when: true

    # Secure Boot rejects a DKMS module signed with a MOK the firmware does not
    # trust. Enrolling one needs an interactive reboot, so report that case
    # instead of aborting. Every other modprobe error is still fatal. Asking
    # modprobe is authoritative; probing mokutil would guess, and would treat a
    # missing mokutil as "Secure Boot off".
    - name: Load the virtualbox kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - vboxdrv
        - vboxnetflt
        - vboxnetadp
      register: dev_virtualbox_modprobe
      failed_when: >-
        dev_virtualbox_modprobe.rc | default(0) != 0
        and 'Key was rejected by service' not in dev_virtualbox_modprobe.stderr | default('')
        and 'Required key not available' not in dev_virtualbox_modprobe.stderr | default('')

    - name: Determine whether the virtualbox kernel modules loaded
      ansible.builtin.set_fact:
        dev_virtualbox_modules_loaded: >-
          {{ dev_virtualbox_modprobe.results
             | map(attribute='stderr', default='')
             | select('search', 'Key was rejected by service|Required key not available')
             | list | length == 0 }}

    - name: Report that Secure Boot is blocking the virtualbox kernel modules
      ansible.builtin.debug:
        msg: >-
          Secure Boot rejected the virtualbox kernel modules, so VirtualBox will not
          run. Enroll the DKMS signing key with `sudo mokutil --import
          /var/lib/shim-signed/mok/MOK.der`, then reboot and complete the enrollment
          from the MOK Manager screen.
      when: not dev_virtualbox_modules_loaded | bool

    - name: Ensure virtualbox.service is enabled and running
      ansible.builtin.systemd_service:
        name: virtualbox
        state: started
        enabled: true
      when: dev_virtualbox_modules_loaded | bool
