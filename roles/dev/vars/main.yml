---
# Derived values, not operator knobs. In vars/ (not defaults/) so role vars outrank
# host_vars and a host cannot desync a derived value from its source.

# Debian arch for apt repositories, mapped from the kernel name Ansible reports.
dev_arch: >-
  {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}

# dev_user home from passwd (getent runs in tasks/main.yml).
dev_user_home: "{{ ansible_facts['getent_passwd'][dev_user][4] }}"

# System PATH plus the script's directory, so cron can find the ai-maintainer wrapper.
dev_ai_maintainer_cron_path: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ dev_ai_maintainer_script_path | dirname }}"
