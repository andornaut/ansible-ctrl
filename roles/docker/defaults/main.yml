---
# User added to the "docker" group so that the docker CLI works without sudo.
# Defaults to primary_user from the inventory; override per host.
docker_user: "{{ primary_user }}"

docker_install_kubernetes: false
# Docker Registry binds host port 5000, which is also the port Frigate publishes by
# default (homeautomation_frigate_port_http_unauthenticated). Setting this back to false
# stops the role installing and starting the registry, but does not uninstall an existing
# one: purging it would destroy /var/lib/docker-registry. Remove it by hand instead.
docker_install_registry: false
