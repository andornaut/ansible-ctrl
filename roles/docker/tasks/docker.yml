---
- name: Configure Docker Repository
  become: true
  block:
    - name: Uninstall incompatible packages
      ansible.builtin.apt:
        name:
          # Old versions: https://docs.docker.com/engine/install/ubuntu/
          - containerd
          - docker-compose
          - docker-compose-v2
          - docker-doc
          - docker.io
          - podman-docker
          - runc
        state: absent
        purge: true
        autoremove: true

    - name: Install Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        # Without this, the key is never refreshed if Docker rotates it.
        force: true

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present
        update_cache: true

- name: Install Docker Packages
  become: true
  block:
    - name: Install Docker system packages
      ansible.builtin.apt:
        name:
          - python3-docker
          # New versions: https://docs.docker.com/engine/install/ubuntu/#install-using-the-repository
          - containerd.io
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: latest
        install_recommends: false
        update_cache: true

    - name: Install Docker Registry
      ansible.builtin.apt:
        name: docker-registry
        state: latest
        install_recommends: false
      when: docker_install_registry

- name: Configure Docker Services
  become: true
  block:
    - name: Start and enable Docker service
      ansible.builtin.systemd_service:
        name: docker
        state: started
        enabled: true

    - name: Start and enable Docker Registry service
      ansible.builtin.systemd_service:
        name: docker-registry
        state: started
        enabled: true
      when: docker_install_registry

# The docker group is created by the docker-ce package.
- name: Grant docker group membership to {{ docker_user }}
  ansible.builtin.user:
    name: "{{ docker_user }}"
    groups: docker
    append: true
  become: true
