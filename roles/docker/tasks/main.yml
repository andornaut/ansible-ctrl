---
# docker_user names the account user-scoped tasks act on; "root" would write state to /root.
# Must not derive from a fact describing who ansible runs as (root under the cert-renewal cron).
# tags: always so a --tags run cannot skip the backstop.
- name: Validate docker_user
  ansible.builtin.assert:
    that:
      - docker_user != "root"
    fail_msg: >-
      docker_user resolved to "root", which would write user-scoped state to /root.
      Set primary_user in the inventory (or docker_user in host_vars) to the target account.
    success_msg: 'docker_user "{{ docker_user }}" is valid'
  tags: always

- name: Install and configure Docker
  ansible.builtin.import_tasks: docker.yml
  tags: docker

- name: Install Kubernetes tools
  ansible.builtin.import_tasks: kubernetes.yml
  when: docker_install_kubernetes
  tags: kubernetes
