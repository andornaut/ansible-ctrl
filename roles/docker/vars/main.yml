---
# Derived values, not operator knobs. Here rather than defaults/ so role vars outrank
# host_vars and a host cannot desync a derived value from its source.

# Debian architecture name for the apt repo and Kubernetes binary downloads. Maps the
# kernel names ansible reports (x86_64, aarch64) to the Debian names (amd64, arm64) that
# Debian, helm, kubectl, and minikube use.
docker_arch: >-
  {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}
