---
# Values derived from defaults/main.yml, not operator knobs. They live here rather than
# in defaults/ so that role vars outrank host_vars and a host cannot desync a derived
# value from the variable it is derived from.

# Debian architecture name, used by the apt repository and the Kubernetes binary downloads.
# Ansible reports the kernel names (x86_64, aarch64), which Debian, helm, kubectl, and
# minikube all spell differently (amd64, arm64).
docker_arch: >-
  {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}
