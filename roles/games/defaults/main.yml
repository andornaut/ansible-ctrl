---
# Target games user account. Defaults to primary_user from the inventory;
# override per host. Flatpak apps install to this user via become_user
# (method: user, never root). Not a blanket privilege-escalation setting.
games_user: "{{ primary_user }}"

# Flatpak applications installed and configured for games_user.
games_flatpak_apps:
  - com.heroicgameslauncher.hgl
  - com.mojang.Minecraft
  - com.valvesoftware.Steam
  - net.davidotek.pupgui2
  - net.lutris.Lutris
  - org.libretro.RetroArch
  - org.openjkdf2.OpenJKDF2

# The org.freedesktop.Platform version that every game runtime here accepts.
# Verify after a runtime bump with:
#   flatpak remote-info flathub com.valvesoftware.Steam | grep Runtime
# Note that community.general.flatpak matches on application ID only, so changing
# the branch will not replace an extension already installed on an older one;
# uninstall it first.
games_flatpak_runtime_branch: "25.08"

# Base directory for Heroic's game installs and wine prefixes. Kept under a
# per-launcher subdir of ~/.local/games so Heroic, Lutris and Steam installs do
# not collide. The Heroic flatpak is granted access to exactly this path in
# games_flatpak_overrides, and the same path is written into Heroic's config.json
# by tasks/heroic.yml. Games installed outside a granted path show as "not
# available" ("game folder appears to have moved") because the sandbox, which can
# only stat paths it is granted, cannot see them.
games_heroic_dir: "{{ games_user_home }}/.local/games/Heroic"

# Base directory for Lutris's game installs, kept under its own ~/.local/games subdir
# like Heroic (see games_heroic_dir). Written into Lutris's system.yml as
# system.game_path by tasks/lutris.yml. No flatpak override is needed here: the Lutris
# flatpak already ships `home` filesystem access (Heroic does not, hence its grant).
games_lutris_dir: "{{ games_user_home }}/.local/games/Lutris"

# How often the token-refresh --user timer (in tasks/heroic.yml) exercises the Epic
# (legendary) and GOG (gogdl) OAuth refresh tokens so the Heroic store logins do not
# lapse while Heroic is closed. A systemd OnUnitActiveSec value (validated with
# systemd-analyze). Kept under the hosts' 4h idle-suspend threshold so a refresh
# lands before the machine suspends.
games_heroic_token_refresh_interval: "3h"

# Cursor theme for the flatpak applications this role installs, which cannot see the host's
# and otherwise draw the pointer at the wrong size. Duplicates desktop_cursor_theme, since
# games installs its own flatpaks and depends on no other role.
# https://www.reddit.com/r/linux/comments/ihsyf7/if_you_have_problems_with_mouse_pointer_size_in/
games_cursor_theme: Adwaita

# `flatpak override --user` arguments, keyed by application ID. The "default" key
# applies to every app in games_flatpak_apps; a per-application key is merged on top.
games_flatpak_overrides:
  default:
    - --env=XCURSOR_THEME={{ games_cursor_theme }}
  com.heroicgameslauncher.hgl:
    # Grant the sandbox access to the game install + wine-prefix location. Without
    # this Heroic cannot stat installed games and reports them as not available.
    - "--filesystem={{ games_heroic_dir }}"
  com.valvesoftware.Steam:
    # Read-write access to the PipeWire socket for microphone input.
    - --filesystem=xdg-run/pipewire-0
    # Make closing the window quit Steam instead of hiding it in the system tray.
    # Steam exposes no setting for this on Linux (ValveSoftware/steam-for-linux#3083,
    # #4843); this undocumented env var is the only lever, and is what Linux Mint ships
    # in its steam.desktop. Best-effort: some clients ignore it (#5307).
    - --env=STEAM_FRAME_FORCE_CLOSE=1
