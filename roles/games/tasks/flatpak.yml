---
- name: Install steam-devices apt package
  ansible.builtin.apt:
    name:
      # Configures udev rules to support gamepads, etc.
      - steam-devices
    state: latest
    install_recommends: false
    update_cache: true
  become: true

- name: Install and configure flatpak applications for the target user
  become: true
  become_user: "{{ games_flatpak_user }}"
  block:
    - name: Install flatpak packages
      community.general.flatpak:
        name: "{{ games_flatpak_apps }}"
        method: user

    - name: Override cursor theme for flatpak GUI applications
      # https://www.reddit.com/r/linux/comments/ihsyf7/if_you_have_problems_with_mouse_pointer_size_in/
      ansible.builtin.command:
        cmd: flatpak override --user --env=XCURSOR_THEME=Adwaita {{ item }}
      loop: "{{ games_flatpak_apps }}"
      changed_when: false
