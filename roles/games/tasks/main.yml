---
# Backstop against games_user resolving to root, which would write user-scoped state to /root.
# It defaults to primary_user (inventory data) rather than to a fact describing whoever ansible
# runs as. tags: always so a --tags run cannot skip it.
- name: Validate games_user
  ansible.builtin.assert:
    that:
      - games_user != "root"
    fail_msg: >-
      games_user resolved to "root", which would write user-scoped state to /root.
      Set primary_user in the inventory (or games_user in host_vars) to the target
      account. If ansible was run as root and a stale fact cache is to blame, clear
      .ansible/fact_cache/.
    success_msg: 'games_user "{{ games_user }}" is valid'
  tags: always

# The ROM library path is site data, so it has no default and host_vars/ must set it. Asserted
# rather than left to fail on its own: the first thing to dereference it is a flatpak override
# argument, whose undefined-variable error names neither the role nor the fix. tags: always so a
# --tags run cannot skip it.
- name: Validate games_retroarch_library_dir
  ansible.builtin.assert:
    that:
      - games_retroarch_library_dir is defined
      - games_retroarch_library_dir | length > 0
    fail_msg: >-
      games_retroarch_library_dir is not set. It is the path this host mounts the ROM
      library at, which is site-specific, so the role has no default for it. Set it in
      host_vars/ for this host.
    success_msg: 'games_retroarch_library_dir "{{ games_retroarch_library_dir | default("") }}" is set'
  tags: always

# Populates ansible_facts['getent_passwd'][games_user] so games_user_home (and the
# paths derived from it) resolve. tags: always so it still runs under --tags
# flatpak/heroic, both of which depend on games_user_home.
- name: Look up games_user home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ games_user }}"
  tags: always

- name: Import apt tasks
  ansible.builtin.import_tasks: apt.yml
  tags: apt

- name: Import flatpak tasks
  ansible.builtin.import_tasks: flatpak.yml
  tags: flatpak

- name: Configure Heroic Games Launcher
  ansible.builtin.import_tasks: heroic.yml
  become: true
  become_user: "{{ games_user }}"
  tags: heroic

- name: Configure Lutris
  ansible.builtin.import_tasks: lutris.yml
  become: true
  become_user: "{{ games_user }}"
  tags: lutris

- name: Configure RetroArch
  ansible.builtin.import_tasks: retroarch.yml
  become: true
  become_user: "{{ games_user }}"
  tags: retroarch
