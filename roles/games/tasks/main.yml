---
- name: Install system packages
  ansible.builtin.apt:
    name:
      # - 2048-qt
      # - bsdgames

      # Performance and overlay tools. gamemode adjusts CPU governor and
      # process priority during play (flatpak games call gamemoderun, which
      # talks to the host daemon over D-Bus). mangohud is the performance
      # overlay for native games; flatpak games use the MangoHud Vulkan layer
      # extension installed in flatpak.yml.
      - gamemode
      - mangohud
      # For `chdman` to create .chd archives
      - mame-tools
    install_recommends: false
    state: latest
    update_cache: true
  become: true

# gamescope wraps games in a micro-compositor for scaling and framerate
# control. It is only packaged on Ubuntu >= 26.04.
- name: Install gamescope
  ansible.builtin.apt:
    name: gamescope
    install_recommends: false
    state: latest
    update_cache: true
  become: true
  when: ansible_facts['distribution_version'] is version('26.04', '>=')

- name: Import flatpak tasks
  ansible.builtin.import_tasks: flatpak.yml
