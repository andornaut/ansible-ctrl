---
# Values derived from defaults/main.yml, not operator knobs. They live here rather than
# in defaults/ so that role vars outrank host_vars and a host cannot desync a derived
# value from the variable it is derived from.

# gamescope wraps games in a micro-compositor for scaling and framerate control.
# This is a platform probe, not a preference: the apt package only exists on
# Ubuntu >= 26.04, and forcing it true on an older release just fails the install.
# Flatpak games use the Vulkan layer extension in games_flatpak_extensions regardless.
games_gamescope_apt_available: "{{ ansible_facts['distribution_version'] is version('26.04', '>=') }}"

# Home directory and uid of games_user, from the passwd database (the getent lookup
# runs first in tasks/main.yml). The home builds absolute paths for the flatpak
# grant and Heroic's config.json; the uid locates the user systemd manager runtime
# dir (/run/user/<uid>) for the token-refresh --user timer.
games_user_home: "{{ ansible_facts['getent_passwd'][games_user][4] }}"
games_user_uid: "{{ ansible_facts['getent_passwd'][games_user][1] }}"

# Heroic Games Launcher flatpak application id, and its per-user config file.
# tasks/heroic.yml enforces the install + wine-prefix paths inside config.json so
# they cannot drift from games_heroic_dir and the flatpak grant; the token-refresh
# template also derives its config dir from config_file.
games_heroic_app_id: com.heroicgameslauncher.hgl
games_heroic_config_file: "{{ games_user_home }}/.var/app/{{ games_heroic_app_id }}/config/heroic/config.json"

# Lutris flatpak application id and the two candidate config directories under its
# per-user data. Lutris (settings.py) uses XDG_CONFIG_HOME/lutris (config/lutris) but
# falls back to XDG_DATA_HOME/lutris (data/lutris) when the former does not exist:
#   if not os.path.exists(CONFIG_DIR): CONFIG_DIR = DATA_DIR
# config/lutris is the deprecated location; a fresh flatpak install uses data/lutris.
# tasks/lutris.yml mirrors this to find where system.yml (holding system.game_path) lives.
games_lutris_app_id: net.lutris.Lutris
games_lutris_config_dir: "{{ games_user_home }}/.var/app/{{ games_lutris_app_id }}/config/lutris"
games_lutris_data_dir: "{{ games_user_home }}/.var/app/{{ games_lutris_app_id }}/data/lutris"
