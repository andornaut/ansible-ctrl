---
- name: Ensure script directory exists
  ansible.builtin.file:
    path: "{{ github_maintainer_script_path | dirname }}"
    state: directory
    mode: "0755"

- name: Download github-maintainer script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/andornaut/github-maintainer/main/github-maintainer
    dest: "{{ github_maintainer_script_path }}"
    mode: "0755"
    force: true

- name: Remove old cron entry from user crontab
  ansible.builtin.cron:
    name: "Automated GitHub repository maintenance"
    state: absent

- name: Create cron file for automated repo maintenance
  ansible.builtin.template:
    src: cron.j2
    dest: /etc/cron.d/ansible-role-github-maintainer
    mode: "0644"
    owner: root
    group: root
  become: true

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "Repository maintenance configured:"
      - "  Base directory: {{ github_maintainer_base_dir }}"
      - "  Agent: {{ github_maintainer_agent_command }} {{ github_maintainer_agent_flags }}"
      - "  Script: {{ github_maintainer_script_path }}"
      - "  Schedule: {{ github_maintainer_cron_hour }}:{{ github_maintainer_cron_minute }} daily"
      - "  Dry run: {{ github_maintainer_dry_run }}"
      - ""
      - "Run manually:"
      - "  {{ github_maintainer_script_path }}"
      - "  {{ github_maintainer_script_path }} --dry-run --verbose"
