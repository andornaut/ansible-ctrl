---
# Debian architecture name, used to select the ExpressLRS release asset. Ansible reports
# the kernel names (x86_64, aarch64), which Debian spells differently (amd64, arm64).
hobbies_arch: >-
  {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}

# Target hobbies user account. Defaults to the remote user running the play;
# override per host. Used to run per-user flatpak installs (OrcaSlicer) via
# become_user (method: user, never root) and to derive hobbies_user_home. Not a
# blanket privilege-escalation setting.
hobbies_user: "{{ ansible_facts['user_id'] }}"
# Home directory of hobbies_user, resolved from the passwd database (a getent
# lookup runs in tasks/main.yml). Used where a task needs the literal home path
# (e.g. the KiCad plugin install location).
hobbies_user_home: "{{ ansible_facts['getent_passwd'][hobbies_user][4] }}"

# KiCad major version. Selects the release PPA (ppa:kicad/kicad-{version}-releases)
# and the per-user plugin directory (~/.local/share/kicad/{version}/scripting/plugins).
hobbies_kicad_version: "10.0"
