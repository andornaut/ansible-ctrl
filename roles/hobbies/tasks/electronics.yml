---
- name: Install Kicad
  tags: kicad
  become: true
  block:
    - name: Install Kicad 10.0 apt repository
      ansible.builtin.apt_repository:
        repo: ppa:kicad/kicad-10.0-releases
        update_cache: true

    - name: Install Kicad package
      ansible.builtin.apt:
        name:
          - kicad
        state: latest
        install_recommends: false
        update_cache: true
      # splinter-keyboard's `npm run fab-jlcpcb` uses the bundled kicad-cli;
      # `npm run panelize` also needs KiKit (dedicated venv below).

# Optional convenience for browsing the JLCPCB catalog and looking up LCSC part
# numbers (not used by the fab pipeline). Per-user plugin, so no become. Pinned to
# the latest release tag; update: true re-checks it out on re-run so it advances.
- name: Install kicad-jlcpcb-tools plugin (optional, for LCSC lookup)
  tags: kicad
  block:
    - name: Get kicad-jlcpcb-tools latest release
      ansible.builtin.uri:
        url: https://api.github.com/repos/Bouni/kicad-jlcpcb-tools/releases/latest
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_jlcpcb_release

    - name: Clone kicad-jlcpcb-tools plugin at the latest release tag
      ansible.builtin.git:
        repo: https://github.com/Bouni/kicad-jlcpcb-tools.git
        dest: "{{ ansible_facts['env']['HOME'] }}/.local/share/kicad/10.0/scripting/plugins/kicad-jlcpcb-tools"
        version: "{{ hobbies_jlcpcb_release.json.tag_name }}"
        update: true

# PCB panelizer for splinter-keyboard's `npm run panelize`. KiCad 10 support is only
# in KiKit + pcbnewTransition git master (no PyPI release has it yet). Dedicated venv
# isolates the unstable git-master pin; --system-site-packages exposes KiCad's pcbnew
# (a C extension from the kicad apt package, not pip-installable). The consumer
# (panelize.sh) runs with PYTHONNOUSERSITE=1 so a stale ~/.local copy cannot shadow it.
- name: Install KiKit panelizer (git master, KiCad 10) into a dedicated venv
  tags: kicad
  become: true
  block:
    - name: Ensure python3-venv is available
      ansible.builtin.apt:
        name: python3-venv
        state: present

    - name: Install KiKit + pcbnewTransition (git master) into /opt/kikit
      # state: latest tracks master HEAD. Switch to plain 'kikit' once upstream
      # ships a KiCad 10 PyPI release.
      #
      # --ignore-installed makes the venv install its own copies of every pip
      # dependency (shapely, numpy, ...) instead of borrowing system site-packages;
      # only pcbnew (not a pip package) is borrowed. Keeps the venv self-contained.
      # (pip's resolver warnings about unrelated system packages are harmless.)
      ansible.builtin.pip:
        name:
          - git+https://github.com/yaqwsx/pcbnewTransition.git
          - git+https://github.com/yaqwsx/KiKit.git
        state: latest
        extra_args: --ignore-installed
        virtualenv: /opt/kikit
        virtualenv_command: python3 -m venv
        virtualenv_site_packages: true

# Upstream ships a self-contained jpackage app-image (bundled JRE) as a linux-x64
# zip; the bin/freerouting launcher runs in-place, so no system Java is needed.
- name: Install Freerouting
  tags: freerouting
  block:
    - name: Get Freerouting releases
      ansible.builtin.uri:
        url: https://api.github.com/repos/freerouting/freerouting/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_freerouting_releases

    # Pick the most recent linux-x64.zip across all stable releases rather than
    # betting the newest stable release has the asset (freerouting cuts releases
    # frequently and a fresh tag may briefly lack built assets). Match on the
    # plain 'linux-x64' substring (unique to the zip asset) to avoid regex-escape
    # differences across Jinja versions.
    - name: Find latest Linux x64 zip asset
      ansible.builtin.set_fact:
        hobbies_freerouting_download_url: >-
          {{ hobbies_freerouting_releases.json
          | rejectattr('prerelease') | rejectattr('draft')
          | map(attribute='assets') | flatten
          | selectattr('name', 'search', 'linux-x64')
          | map(attribute='browser_download_url') | first }}

    - name: Derive Freerouting install directory name
      ansible.builtin.set_fact:
        hobbies_freerouting_dir: "{{ hobbies_freerouting_download_url | basename | regex_replace('\\.zip$', '') }}"

    - name: Create Freerouting directory
      ansible.builtin.file:
        path: /opt/freerouting
        state: directory
        mode: "0755"
      become: true

    - name: "Download and extract Freerouting ({{ hobbies_freerouting_dir }})"
      ansible.builtin.unarchive:
        src: "{{ hobbies_freerouting_download_url }}"
        dest: /opt/freerouting
        remote_src: true
        creates: "/opt/freerouting/{{ hobbies_freerouting_dir }}"
      become: true

    - name: Symlink stable Freerouting path to the installed version
      ansible.builtin.file:
        src: "/opt/freerouting/{{ hobbies_freerouting_dir }}"
        dest: /opt/freerouting/current
        state: link
        force: true
      become: true

    # Wrapper (not a symlink) so we can default -da to opt out of upstream's
    # analytics phone-home; callers can still pass routing args, e.g.
    # freerouting -de board.dsn -do board.ses -mp 100
    - name: Install freerouting launcher wrapper onto PATH
      ansible.builtin.copy:
        dest: /usr/local/bin/freerouting
        mode: "0755"
        follow: false
        content: |
          #!/bin/bash
          exec /opt/freerouting/current/bin/freerouting -da "$@"
      become: true

    - name: Install Freerouting desktop file
      ansible.builtin.copy:
        dest: /usr/share/applications/freerouting.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Freerouting
          Comment=Advanced PCB autorouter
          Exec=/opt/freerouting/current/bin/freerouting -da
          Icon=/opt/freerouting/current/lib/freerouting.png
          Terminal=false
          Type=Application
          Categories=Development;Electronics
      become: true
