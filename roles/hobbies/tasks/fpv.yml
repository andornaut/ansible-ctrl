---
# Recent Betaflight releases are PWA-only (https://app.betaflight.com).
# This installs the latest release with a Linux portable build (10.10.0).
# The portable zip requires a wrapper script to set LD_LIBRARY_PATH.
- name: Install Betaflight Configurator
  tags: betaflight
  block:
    - name: Get Betaflight Configurator releases
      ansible.builtin.uri:
        url: https://api.github.com/repos/betaflight/betaflight-configurator/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_betaflight_releases

    - name: Find latest release with Linux build
      ansible.builtin.set_fact:
        hobbies_betaflight_release: "{{ item }}"
      loop: "{{ hobbies_betaflight_releases.json | rejectattr('prerelease') | rejectattr('draft') }}"
      when:
        - hobbies_betaflight_release is not defined
        - item.assets | selectattr('name', 'search', 'linux64-portable') | list | length > 0
      loop_control:
        label: "{{ item.tag_name }}"

    # Use a [.] character class rather than an escaped \. : this is a folded block
    # scalar, so YAML passes backslashes through untouched and Jinja does not treat
    # \\ as an escape, which leaves the regex matching a literal backslash and
    # selecting nothing. Same reason the freerouting asset match avoids escapes.
    - name: Find Linux portable asset
      ansible.builtin.set_fact:
        hobbies_betaflight_download_url: >-
          {{ hobbies_betaflight_release.assets
          | selectattr('name', 'search', 'linux64-portable[.]zip$')
          | map(attribute='browser_download_url') | first }}

    # The zip's top-level directory is literally "Betaflight Configurator", space
    # included. Extract each release into its own tag-stamped directory and expose
    # it as /opt/betaflight/current, so the space never reaches a launcher path.
    - name: Derive Betaflight install paths
      ansible.builtin.set_fact:
        hobbies_betaflight_release_dir: "/opt/betaflight/{{ hobbies_betaflight_release.tag_name }}"
        hobbies_betaflight_app_dir: "/opt/betaflight/{{ hobbies_betaflight_release.tag_name }}/Betaflight Configurator"

    - name: Create Betaflight release directory
      ansible.builtin.file:
        path: "{{ hobbies_betaflight_release_dir }}"
        state: directory
        mode: "0755"
      become: true

    # creates is evaluated by the action plugin, so an already-installed release
    # skips the download entirely rather than refetching the zip every play.
    - name: Download and extract Betaflight Configurator
      ansible.builtin.unarchive:
        src: "{{ hobbies_betaflight_download_url }}"
        dest: "{{ hobbies_betaflight_release_dir }}"
        remote_src: true
        creates: "{{ hobbies_betaflight_app_dir }}"
      become: true
      register: hobbies_betaflight_unarchive

    # The zip ships some files as 0600 (including the two binaries at 0700), which
    # leaves them unreadable by the non-root user who launches the app. The capital
    # X grants execute only where it is already set, so libraries land at 0644 and
    # the binaries at 0755.
    #
    # Not a handler: the symlink below must point at a tree whose permissions are
    # already fixed, and handlers do not flush until the end of the play.
    - name: Set Betaflight Configurator permissions # noqa: no-handler
      ansible.builtin.file:
        path: "{{ hobbies_betaflight_app_dir }}"
        state: directory
        mode: u=rwX,go=rX
        recurse: true
      become: true
      when: hobbies_betaflight_unarchive is changed

    - name: Symlink stable Betaflight path to the installed version
      ansible.builtin.file:
        src: "{{ hobbies_betaflight_app_dir }}"
        dest: /opt/betaflight/current
        state: link
        force: true
      become: true

    # Wrapper (not a symlink) so the app runs with its bundled libraries on
    # LD_LIBRARY_PATH and with its own directory as the working directory.
    - name: Install Betaflight Configurator launcher wrapper onto PATH
      ansible.builtin.copy:
        dest: /usr/local/bin/betaflight-configurator
        mode: "0755"
        follow: false
        content: |
          #!/bin/bash
          cd /opt/betaflight/current
          LD_LIBRARY_PATH=/opt/betaflight/current/lib exec ./betaflight-configurator "$@"
      become: true

    - name: Install Betaflight Configurator desktop file
      ansible.builtin.copy:
        dest: /usr/share/applications/betaflight-configurator.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Betaflight Configurator
          Comment=Crossplatform configuration tool for the Betaflight flight control system
          Exec=/usr/local/bin/betaflight-configurator
          Icon=/opt/betaflight/current/icon/bf_icon_128.png
          Terminal=false
          Type=Application
          Categories=Utility
      become: true

    # CLEANUP (added 2026-07-09): remove once every host in hobbies has run this role
    # at least once.
    #
    # Pre-versioned layout: the extract landed in "Betaflight Configurator" and a
    # separate task renamed it to betaflight-configurator. The rename was guarded by
    # creates, so after the first run it never fired again and both directories sat
    # on disk. Superseded by the tag-stamped directory and the current symlink.
    - name: Remove legacy Betaflight directories
      ansible.builtin.file:
        path: "/opt/betaflight/{{ item }}"
        state: absent
      loop:
        - Betaflight Configurator
        - betaflight-configurator
      become: true

- name: Install ExpressLRS Configurator
  tags: expresslrs
  block:
    - name: Get releases of ExpressLRS Configurator
      ansible.builtin.uri:
        url: https://api.github.com/repos/ExpressLRS/ExpressLRS-Configurator/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_expresslrs_releases

    - name: Set ExpressLRS Configurator to latest stable release
      ansible.builtin.set_fact:
        hobbies_expresslrs_release: "{{ hobbies_expresslrs_releases.json | rejectattr('prerelease') | rejectattr('draft') | first }}"

    # [.] rather than \. for the same reason as the Betaflight asset match above.
    - name: Find Linux deb asset
      ansible.builtin.set_fact:
        hobbies_expresslrs_download_url: >-
          {{ hobbies_expresslrs_release.assets
          | selectattr('name', 'search', '_' ~ hobbies_arch ~ '[.]deb$')
          | map(attribute='browser_download_url') | first }}

    - name: Install ExpressLRS Configurator
      ansible.builtin.apt:
        deb: "{{ hobbies_expresslrs_download_url }}"
      become: true
