---
- name: Install KiCad
  tags: kicad
  become: true
  block:
    - name: Add the KiCad releases apt repository
      ansible.builtin.apt_repository:
        repo: "ppa:kicad/kicad-{{ hobbies_kicad_version }}-releases"
        update_cache: true

    - name: Install KiCad package
      ansible.builtin.apt:
        name:
          - kicad
        state: latest
        install_recommends: false
        update_cache: true

# JLCPCB catalog / LCSC part lookup. Per-user plugin, so no become. Pinned to the latest
# release tag; update: true re-checks it out on re-run so it advances.
- name: Install kicad-jlcpcb-tools plugin
  tags: kicad
  block:
    - name: Get latest kicad-jlcpcb-tools release
      ansible.builtin.uri:
        url: https://api.github.com/repos/Bouni/kicad-jlcpcb-tools/releases/latest
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_jlcpcb_release

    - name: Clone kicad-jlcpcb-tools plugin at the latest release tag
      ansible.builtin.git:
        repo: https://github.com/Bouni/kicad-jlcpcb-tools.git
        dest: "{{ hobbies_user_home }}/.local/share/kicad/{{ hobbies_kicad_version }}/scripting/plugins/kicad-jlcpcb-tools"
        version: "{{ hobbies_jlcpcb_release.json.tag_name }}"
        update: true

# PCB panelizer. KiCad 10 support is only in KiKit + pcbnewTransition git master (no PyPI
# release yet). Dedicated venv isolates the git-master pin; --system-site-packages exposes
# KiCad's pcbnew (a C extension from the kicad apt package, not pip-installable).
- name: Install KiKit panelizer into a dedicated venv
  tags: kicad
  become: true
  block:
    - name: Install python3-venv
      ansible.builtin.apt:
        name: python3-venv
        state: present

    - name: Install KiKit and pcbnewTransition into /opt/kikit
      # state: latest tracks master HEAD; switch to plain 'kikit' once upstream ships a KiCad
      # 10 PyPI release. --ignore-installed makes the venv build its own copies of every pip
      # dependency instead of borrowing system site-packages; only pcbnew is borrowed.
      ansible.builtin.pip:
        name:
          - git+https://github.com/yaqwsx/pcbnewTransition.git
          - git+https://github.com/yaqwsx/KiKit.git
        state: latest
        extra_args: --ignore-installed
        virtualenv: /opt/kikit
        virtualenv_command: python3 -m venv
        virtualenv_site_packages: true

# Upstream ships a self-contained jpackage app-image (bundled JRE) as a linux-x64
# zip; the bin/freerouting launcher runs in-place, so no system Java is needed.
- name: Install Freerouting
  tags: freerouting
  block:
    - name: Get Freerouting releases
      ansible.builtin.uri:
        url: https://api.github.com/repos/freerouting/freerouting/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_freerouting_releases

    # Newest linux-x64.zip across all stable releases: a fresh tag may briefly lack built
    # assets. Match the 'linux-x64' substring to avoid regex-escape differences across Jinja.
    - name: Set Freerouting download URL fact
      ansible.builtin.set_fact:
        hobbies_freerouting_download_url: >-
          {{ hobbies_freerouting_releases.json
          | rejectattr('prerelease') | rejectattr('draft')
          | map(attribute='assets') | flatten
          | selectattr('name', 'search', 'linux-x64')
          | map(attribute='browser_download_url') | first }}

    - name: Set Freerouting install directory fact
      ansible.builtin.set_fact:
        hobbies_freerouting_dir: "{{ hobbies_freerouting_download_url | basename | regex_replace('\\.zip$', '') }}"

    - name: Create Freerouting directory
      ansible.builtin.file:
        path: /opt/freerouting
        state: directory
        mode: "0755"
      become: true

    - name: Download and extract Freerouting
      ansible.builtin.unarchive:
        src: "{{ hobbies_freerouting_download_url }}"
        dest: /opt/freerouting
        remote_src: true
        creates: "/opt/freerouting/{{ hobbies_freerouting_dir }}"
      become: true

    - name: Symlink stable Freerouting path to the installed version
      ansible.builtin.file:
        src: "/opt/freerouting/{{ hobbies_freerouting_dir }}"
        dest: /opt/freerouting/current
        state: link
        force: true
      become: true

    # Wrapper (not a symlink) to default -da, opting out of upstream's analytics phone-home;
    # callers can still pass routing args, e.g. freerouting -de board.dsn -do board.ses -mp 100
    - name: Install freerouting launcher wrapper onto PATH
      ansible.builtin.copy:
        dest: /usr/local/bin/freerouting
        mode: "0755"
        follow: false
        content: |
          #!/bin/bash
          exec /opt/freerouting/current/bin/freerouting -da "$@"
      become: true

    - name: Install Freerouting desktop file
      ansible.builtin.copy:
        dest: /usr/share/applications/freerouting.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Freerouting
          Comment=Advanced PCB autorouter
          Exec=/opt/freerouting/current/bin/freerouting -da
          Icon=/opt/freerouting/current/lib/freerouting.png
          Terminal=false
          Type=Application
          Categories=Development;Electronics
      become: true
