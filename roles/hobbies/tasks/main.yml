---
- name: Install Kicad
  tags: kicad
  become: true
  block:
    - name: Install Kicad 9.0 apt repository
      ansible.builtin.apt_repository:
        repo: ppa:kicad/kicad-9.0-releases
        update_cache: true

    - name: Install Kicad package
      ansible.builtin.apt:
        name:
          - kicad
        state: present
        install_recommends: false
        update_cache: true

    - name: Install kikit from PyPI
      ansible.builtin.pip:
        name:
          - kikit
        extra_args: "--break-system-packages"

# Flatpak Devices tab crashes/freezes: https://github.com/OrcaSlicer/OrcaSlicer/issues/12919
# Re-enable once the upstream issue is fixed. Install manually via AppImage until then.
# - name: Install OrcaSlicer
#   tags: orcaslicer
#   community.general.flatpak:
#     name: com.orcaslicer.OrcaSlicer
#     method: user

- name: Install OrcaSlicer
  tags: orcaslicer
  block:
    - name: Get releases of OrcaSlicer
      ansible.builtin.uri:
        url: https://api.github.com/repos/OrcaSlicer/OrcaSlicer/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_orcaslicer_releases

    - name: Set OrcaSlicer to latest stable release
      ansible.builtin.set_fact:
        hobbies_orcaslicer_release: >-
          {{ hobbies_orcaslicer_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first }}

    - name: Find Linux AppImage asset
      ansible.builtin.set_fact:
        hobbies_orcaslicer_download_url: >-
          {{ (hobbies_orcaslicer_release.assets
          | selectattr('name', 'match', 'OrcaSlicer.*Linux.*AppImage$')
          | list | first).browser_download_url }}

    - name: Download OrcaSlicer
      ansible.builtin.get_url:
        url: "{{ hobbies_orcaslicer_download_url }}"
        dest: "/usr/local/bin/OrcaSlicer"
        force: true
        mode: "0755"
      become: true

# Recent Betaflight releases are PWA-only (https://app.betaflight.com).
# This installs the latest release with a Linux portable build (10.10.0).
# The portable zip requires a wrapper script to set LD_LIBRARY_PATH.
- name: Install Betaflight Configurator
  tags: betaflight
  block:
    - name: Get Betaflight Configurator releases
      ansible.builtin.uri:
        url: https://api.github.com/repos/betaflight/betaflight-configurator/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_betaflight_releases

    - name: Find latest release with Linux build
      ansible.builtin.set_fact:
        hobbies_betaflight_release: "{{ item }}"
      loop: "{{ hobbies_betaflight_releases.json | rejectattr('prerelease') }}"
      when:
        - hobbies_betaflight_release is not defined
        - item.assets | selectattr('name', 'search', 'linux64-portable') | list | length > 0
      loop_control:
        label: "{{ item.tag_name }}"

    - name: Find Linux portable asset
      ansible.builtin.set_fact:
        hobbies_betaflight_download_url: >-
          {{ hobbies_betaflight_release.assets
          | selectattr('name', 'search', 'linux64-portable\\.zip$')
          | map(attribute='browser_download_url')
          | first }}

    - name: Create Betaflight directory
      ansible.builtin.file:
        path: /opt/betaflight
        state: directory
        mode: "0755"
      become: true

    - name: "Download and extract Betaflight Configurator {{ hobbies_betaflight_release.tag_name }}"
      ansible.builtin.unarchive:
        src: "{{ hobbies_betaflight_download_url }}"
        dest: /opt/betaflight
        remote_src: true
      become: true

    - name: Rename Betaflight directory to match desktop file paths
      ansible.builtin.command: mv "/opt/betaflight/Betaflight Configurator" /opt/betaflight/betaflight-configurator
      args:
        creates: /opt/betaflight/betaflight-configurator
        removes: "/opt/betaflight/Betaflight Configurator"
      become: true

    - name: Set Betaflight Configurator permissions
      ansible.builtin.shell: |
        find /opt/betaflight/betaflight-configurator -type d -exec chmod a+rx {} \;
        find /opt/betaflight/betaflight-configurator -type f -exec chmod a+r {} \;
        chmod 755 /opt/betaflight/betaflight-configurator/betaflight-configurator
        chmod 755 /opt/betaflight/betaflight-configurator/chrome_crashpad_handler
      changed_when: true
      become: true

    - name: Create Betaflight Configurator wrapper script
      ansible.builtin.copy:
        dest: /opt/betaflight/betaflight-configurator/betaflight-configurator.sh
        mode: "0755"
        content: |
          #!/bin/bash
          cd /opt/betaflight/betaflight-configurator
          LD_LIBRARY_PATH=/opt/betaflight/betaflight-configurator/lib exec ./betaflight-configurator "$@"
      become: true

    - name: Install Betaflight Configurator desktop file
      ansible.builtin.copy:
        dest: /usr/share/applications/betaflight-configurator.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Name=Betaflight Configurator
          Comment=Crossplatform configuration tool for the Betaflight flight control system
          Exec=/opt/betaflight/betaflight-configurator/betaflight-configurator.sh
          Icon=/opt/betaflight/betaflight-configurator/icon/bf_icon_128.png
          Terminal=false
          Type=Application
          Categories=Utility
      become: true

- name: Install ExpressLRS Configurator
  tags: expresslrs
  block:
    - name: Get releases of ExpressLRS Configurator
      ansible.builtin.uri:
        url: https://api.github.com/repos/ExpressLRS/ExpressLRS-Configurator/releases
        return_content: true
        headers:
          Accept: "application/vnd.github.v3+json"
        validate_certs: true
      register: hobbies_expresslrs_releases

    - name: Set ExpressLRS Configurator to latest stable release
      ansible.builtin.set_fact:
        hobbies_expresslrs_release: >-
          {{ hobbies_expresslrs_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first }}

    - name: Find Linux deb asset
      ansible.builtin.set_fact:
        hobbies_expresslrs_download_url: >-
          {{ (hobbies_expresslrs_release.assets
          | selectattr('name', 'match', '.*_amd64\\.deb$')
          | list | first).browser_download_url }}

    - name: Install ExpressLRS Configurator
      ansible.builtin.apt:
        deb: "{{ hobbies_expresslrs_download_url }}"
        state: present
      become: true
