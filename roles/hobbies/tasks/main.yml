---
# hobbies_user must not be root: user-scoped tasks would write to /root. It defaults to
# primary_user (inventory data), not the account ansible runs as, so a root run (cert-renewal
# cron) cannot redirect them. Backstop assert; tags: always so a --tags run cannot skip it.
- name: Validate hobbies_user
  ansible.builtin.assert:
    that:
      - hobbies_user != "root"
    fail_msg: >-
      hobbies_user resolved to "root", which would write user-scoped state to /root.
      Set primary_user in the inventory (or hobbies_user in host_vars) to the target account.
    success_msg: 'hobbies_user "{{ hobbies_user }}" is valid'
  tags: always

- name: Resolve home directory for {{ hobbies_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ hobbies_user }}"
  tags: always

- name: Import FPV tasks
  ansible.builtin.import_tasks: fpv.yml
  tags: fpv

- name: Import KiCad tasks
  ansible.builtin.import_tasks: kicad.yml
  tags: kicad

- name: Import OrcaSlicer tasks
  ansible.builtin.import_tasks: orcaslicer.yml
  tags: orcaslicer
