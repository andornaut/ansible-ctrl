---
# Derived from defaults/main.yml. In vars/ (not defaults/) so role vars outrank host_vars:
# a host cannot desync a derived value from its source.

# Debian architecture (amd64/arm64) from the kernel name; selects the ExpressLRS release asset.
hobbies_arch: >-
  {{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}

# Home directory of hobbies_user from the passwd database (getent runs in tasks/main.yml).
hobbies_user_home: "{{ ansible_facts['getent_passwd'][hobbies_user][4] }}"
