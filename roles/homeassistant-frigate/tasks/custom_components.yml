---
- name: Create custom_components/ directory
  file:
    path: "{{ homeassistantfrigate_homeassistant_required_volumes.config }}/custom_components/"
    state: directory
    owner: root
    group: root
  become: true

- name: Install BambuLab custom component
  block:
    - name: Create a temporary directory for BambuLab
      ansible.builtin.tempfile:
        state: directory
      register: bambulab_tmp

    - name: Get releases of BambuLab
      ansible.builtin.uri:
        url: https://api.github.com/repos/greghesp/ha-bambulab/releases
        return_content: true
      register: bambulab_releases

    - name: Set BambuLab version to latest stable release
      ansible.builtin.set_fact:
        bambulab_version: "{{ (bambulab_releases.json | selectattr('prerelease', 'equalto', false) | selectattr('draft', 'equalto', false) | list | first).tag_name }}"

    - name: Download and unarchive BambuLab {{ bambulab_version }}
      ansible.builtin.unarchive:
        src: "https://github.com/greghesp/ha-bambulab/archive/refs/tags/{{ bambulab_version }}.tar.gz"
        dest: "{{ bambulab_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Install BambuLab custom component
      copy:
        src: "{{ bambulab_tmp.path }}/custom_components/bambu_lab"
        dest: "{{ homeassistantfrigate_homeassistant_required_volumes.config }}/custom_components/"
        remote_src: true
      become: true

