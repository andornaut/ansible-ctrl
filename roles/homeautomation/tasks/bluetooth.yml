---
- name: Install Bluetooth system packages
  ansible.builtin.apt:
    name:
      - bluez
      - dbus-broker
    state: present
    install_recommends: false
    update_cache: true
  become: true

- name: Enable and start dbus-broker service
  ansible.builtin.systemd_service:
    name: dbus-broker
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Copy docker-ble-policy
  ansible.builtin.copy:
    src: homeassistant/docker-ble-policy
    dest: /etc/apparmor.d/
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Load docker-ble-policy
