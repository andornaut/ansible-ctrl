---
- name: Create custom_components/ directory
  ansible.builtin.file:
    path: "{{ homeautomation_homeassistant_required_volumes.config }}/custom_components/"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install BambuLab custom component
  block:
    - name: Create a temporary directory for BambuLab
      ansible.builtin.tempfile:
        state: directory
      register: homeautomation_bambulab_tmp

    - name: Get releases of BambuLab
      ansible.builtin.uri:
        url: https://api.github.com/repos/greghesp/ha-bambulab/releases
        return_content: true
      register: homeautomation_bambulab_releases

    - name: Set BambuLab version to latest stable release
      ansible.builtin.set_fact:
        homeautomation_bambulab_version: >-
          {{ (homeautomation_bambulab_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first).tag_name }}

    - name: Download and unarchive BambuLab
      ansible.builtin.unarchive:
        src: "https://github.com/greghesp/ha-bambulab/archive/refs/tags/{{ homeautomation_bambulab_version }}.tar.gz"
        dest: "{{ homeautomation_bambulab_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Install BambuLab custom component files
      ansible.builtin.copy:
        src: "{{ homeautomation_bambulab_tmp.path }}/custom_components/bambu_lab"
        dest: "{{ homeautomation_homeassistant_required_volumes.config }}/custom_components/"
        remote_src: true
        mode: "0644"
      become: true

