---
- name: Remove ESPHome container if it exists
  ansible.builtin.include_tasks: remove_docker_containers.yml
  vars:
    container_names:
      - esphome

- name: Start ESPHome Docker container
  vars:
    esphome_base_volumes:
      - "{{ homeautomation_esphome_required_volumes.config }}:/config"
    esphome_volumes: "{{ homeautomation_common_volumes + esphome_base_volumes }}"

  community.docker.docker_compose_v2:
    project_name: homeautomation-esphome
    pull: always
    remove_orphans: true
    definition:
      networks: "{{ homeautomation_external_network }}"
      services:
        esphome:
          # http://esphome.internal:6052
          container_name: esphome
          environment:
            - ESPHOME_DASHBOARD_USE_PING=true
          image: "{{ homeautomation_esphome_docker_image }}"
          logging: "{{ homeautomation_default_logging }}"
          # Host networking required for mDNS-based ESP device discovery on the LAN.
          # Avahi (which could provide mDNS to bridge networks) is disabled when Matter is enabled.
          network_mode: host
          # ports:
          #   - "6052:6052"
          restart: unless-stopped
          volumes: "{{ esphome_volumes }}"
  notify:
    - Restart homeassistant
    - Update /etc/hosts
