---
- name: Remove Frigate container if it exists
  community.docker.docker_container:
    name: frigate
    state: absent
  failed_when: false

- name: Start Frigate Docker container
  vars:
    frigate_base_volumes:
      - "{{ homeautomation_frigate_required_volumes.config }}:/config"
      - "{{ homeautomation_frigate_required_volumes.media }}:/media/frigate"
    frigate_volumes: >-
      {{ homeautomation_common_volumes + frigate_base_volumes + homeautomation_frigate_extra_volumes }}

    frigate_tmpfs_volume:
      type: tmpfs  # Optional ram-drive to reduce storage wear
      target: /tmp/cache
      tmpfs:
        size: "{{ homeautomation_frigate_tmpfs_size_mb * 1024 * 1024 }}"
    frigate_env: >-
      {{ homeautomation_frigate_env | default({}) | combine({'TZ': homeautomation_tz}) }}

  community.docker.docker_compose_v2:
    project_name: homeautomation-frigate
    pull: always
    remove_orphans: true
    definition:
      networks: "{{ homeautomation_external_network }}"
      services:
        frigate:
          # http://frigate:5000
          container_name: frigate
          image: "{{ homeautomation_frigate_docker_image }}"
          devices: "{{ homeautomation_frigate_devices }}"
          environment: "{{ frigate_env }}"
          group_add:
            - "{{ ansible_facts.getent_group.render[1] }}"
            - "{{ ansible_facts.getent_group.video[1] }}"
          logging: "{{ homeautomation_default_logging }}"
          mem_limit: "{{ homeautomation_frigate_memory }}"
          # Docs:
          # https://docs.docker.com/reference/compose-file/services/#memswap_limit
          # > If memswap_limit is set to the same value as memory, and memory
          # > is set to a positive integer, the container does not have
          # > access to swap.
          memswap_limit: >-
            {{ homeautomation_frigate_memory_swap | default(homeautomation_frigate_memory) }}
          ports:
            - "{{ homeautomation_frigate_port_http_authenticated }}:8971"
            - "{{ homeautomation_frigate_port_http_unauthenticated }}:5000"
            # RTSP restream https://docs.frigate.video/configuration/restream/
            - "{{ homeautomation_frigate_port_rtsp }}:8554"
            # WebRTC
            - "{{ homeautomation_frigate_port_webrtc }}:8555/tcp"
            - "{{ homeautomation_frigate_port_webrtc }}:8555/udp"

          # Required for memryx
          privileged: "{{ homeautomation_install_memryx }}"
          restart: unless-stopped
          # https://docs.docker.com/reference/cli/docker/container/run/#security-opt
          # https://docs.docker.com/engine/security/seccomp/#run-without-the-default-seccomp-profile
          security_opt:
            - seccomp=unconfined
          shm_size: "{{ homeautomation_frigate_shm_size }}"
          volumes: >-
            {{ frigate_volumes + ([frigate_tmpfs_volume] if homeautomation_frigate_tmpfs_size_mb > 0 else []) }}
  notify:
    - Restart homeassistant
    - Update /etc/hosts
