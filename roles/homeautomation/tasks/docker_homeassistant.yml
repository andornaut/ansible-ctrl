---
- name: Resolve Home Assistant device paths
  ansible.builtin.import_tasks: resolve_device.yml
  vars:
    device_paths: "{{ homeautomation_homeassistant_devices }}"
    resolved_var_name: homeautomation_homeassistant_devices_resolved

- name: Create Govee2MQTT data directory with correct ownership
  ansible.builtin.file:
    path: "{{ homeautomation_govee2mqtt_required_volumes.data }}"
    state: directory
    owner: "{{ homeautomation_govee2mqtt_uid }}"
    group: "{{ homeautomation_govee2mqtt_gid }}"
    mode: "0755"
  become: true
  when: homeautomation_install_govee2mqtt

- name: Remove Home Assistant, Govee2MQTT, and Mosquitto containers if they exist
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop:
    - govee2mqtt
    - homeassistant
    - mosquitto
  failed_when: false

- name: Start Home Assistant, Govee2MQTT, and Mosquitto Docker containers
  vars:
    homeassistant_base_volumes:
      - /etc/hosts:/etc/hosts:ro
      - "{{ homeautomation_homeassistant_required_volumes.config }}:/config"
      - "{{ homeautomation_homeassistant_required_volumes.dbus }}:/run/dbus:ro"
      - "{{ homeautomation_homeassistant_required_volumes.udev }}:/run/udev:ro"
    homeassistant_volumes: >-
      {{ homeautomation_common_volumes + homeassistant_base_volumes + homeautomation_homeassistant_extra_volumes }}

    mosquitto_base_volumes:
      - "{{ homeautomation_mosquitto_required_volumes.config }}:/mosquitto/config:ro"
      - "{{ homeautomation_mosquitto_required_volumes.data }}:/mosquitto/data"
      - "{{ homeautomation_mosquitto_required_volumes.log }}:/mosquitto/log"
    mosquitto_volumes: "{{ homeautomation_common_volumes + mosquitto_base_volumes }}"

    govee2mqtt_base_volumes:
      - "{{ homeautomation_govee2mqtt_required_volumes.data }}:/data"
    govee2mqtt_volumes: "{{ homeautomation_common_volumes + govee2mqtt_base_volumes }}"

    govee2mqtt_base_environment:
      GOVEE_MQTT_HOST: "{{ homeautomation_mosquitto_host }}"
      GOVEE_MQTT_PORT: "{{ homeautomation_mosquitto_port }}"
      GOVEE_TEMPERATURE_SCALE: C
      RUST_LOG_STYLE: always
      TZ: "{{ homeautomation_tz }}"
    govee2mqtt_environment: >-
      {{ govee2mqtt_base_environment | combine(homeautomation_govee2mqtt_env | default({})) }}

    govee2mqtt_service:
      govee2mqtt:
        # http://localhost:8056
        container_name: govee2mqtt
        hostname: govee2mqtt-{{ ansible_facts['hostname'] }}
        image: "{{ homeautomation_govee2mqtt_docker_image }}"
        depends_on:
          - homeassistant
          - mosquitto
        environment: "{{ govee2mqtt_environment }}"
        logging: "{{ homeautomation_default_logging }}"
        # Host networking required for UDP broadcast-based Govee LAN device discovery
        network_mode: host
        restart: unless-stopped
        volumes: "{{ govee2mqtt_volumes }}"

    required_services:
      homeassistant:
        # http://localhost:8123
        container_name: homeassistant
        image: "{{ homeautomation_homeassistant_docker_image }}"
        cap_add:
          - NET_ADMIN
          - NET_RAW
        depends_on:
          - mosquitto
        devices: "{{ homeautomation_homeassistant_devices_resolved }}"
        # Restart the container if the web server becomes unresponsive
        healthcheck:
          test: ["CMD", "curl", "-sf", "http://localhost:8123/manifest.json"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 120s
        logging: "{{ homeautomation_default_logging }}"
        # Host networking required for mDNS device discovery (Google Cast, Bluetooth),
        # and direct LAN access. Cannot use bridge networking for these protocols.
        network_mode: host
        restart: unless-stopped
        security_opt:
          - "apparmor=docker-ble-policy"
        volumes: "{{ homeassistant_volumes }}"

      mosquitto:
        # http://mosquitto.internal:1883
        container_name: mosquitto
        image: "{{ homeautomation_mosquitto_docker_image }}"
        logging: "{{ homeautomation_default_logging }}"
        ports:
          - "{{ homeautomation_mosquitto_port }}:1883"
        restart: unless-stopped
        volumes: "{{ mosquitto_volumes }}"

  community.docker.docker_compose_v2:
    project_name: homeautomation
    pull: always
    remove_orphans: true
    definition:
      networks:
        default:
          driver: bridge
          enable_ipv6: "{{ homeautomation_ipv6_enabled }}"
          driver_opts:
            com.docker.network.bridge.name: br-ha
      services: >-
        {{
          required_services | combine(govee2mqtt_service if homeautomation_install_govee2mqtt else {})
        }}
  notify: Update /etc/hosts
