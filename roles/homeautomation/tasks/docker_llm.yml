---
- name: Remove Llama.cpp and OpenWebUI containers if they exist
  ansible.builtin.include_tasks: remove_docker_containers.yml
  vars:
    container_names:
      - openwebui
      - llamacpp

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ homeautomation_llamacpp_required_volumes.models }}"
    - "{{ homeautomation_openwebui_required_volumes.data }}"
  become: true

- name: Check which llama.cpp models already exist
  ansible.builtin.stat:
    path: "{{ homeautomation_llamacpp_required_volumes.models }}/{{ item | basename }}"
  loop: "{{ homeautomation_llamacpp_models }}"
  register: homeautomation_llamacpp_model_stats
  when: (homeautomation_llamacpp_models | length) > 0

- name: Download llama.cpp models
  ansible.builtin.get_url:
    url: "{{ item.item }}"
    dest: "{{ homeautomation_llamacpp_required_volumes.models }}/{{ item.item | basename }}"
    mode: "0644"
  become: true
  loop: "{{ homeautomation_llamacpp_model_stats.results }}"
  when:
    - (homeautomation_llamacpp_models | length) > 0
    - not item.stat.exists

- name: Start LLM Docker containers
  vars:
    openwebui_base_volumes:
      - "{{ homeautomation_openwebui_required_volumes.data }}:/app/backend/data"
    openwebui_volumes: "{{ homeautomation_common_volumes + openwebui_base_volumes }}"

    llamacpp_base_volumes:
      - "{{ homeautomation_llamacpp_required_volumes.models }}:/models"
    llamacpp_volumes: "{{ homeautomation_common_volumes + llamacpp_base_volumes }}"

  community.docker.docker_compose_v2:
    project_name: homeautomation-llm
    pull: always
    remove_orphans: true
    definition:
      networks: "{{ homeautomation_external_network }}"
      services:
        llamacpp:
          # http://llamacpp.internal:8080
          container_name: llamacpp
          image: "{{ homeautomation_llamacpp_docker_image }}"
          # Use --models-dir to enable "router mode"
          command: "--host 0.0.0.0 --port 8080 --models-dir /models"
          devices: "{{ homeautomation_llamacpp_devices }}"
          group_add:
            - "{{ ansible_facts.getent_group.render[1] }}"
            - "{{ ansible_facts.getent_group.video[1] }}"
          logging: "{{ homeautomation_default_logging }}"
          # ports:
          #   - "8080:8080"
          restart: unless-stopped
          volumes: "{{ llamacpp_volumes }}"

        openwebui:
          # http://openwebui.internal:8080
          container_name: openwebui
          environment: "{{ homeautomation_openwebui_env }}"
          image: "{{ homeautomation_openwebui_docker_image }}"
          logging: "{{ homeautomation_default_logging }}"
          ports:
            - "3000:8080"
          restart: unless-stopped
          volumes: "{{ openwebui_volumes }}"
          depends_on:
            - llamacpp
  notify:
    - Restart homeassistant
    - Update /etc/hosts
