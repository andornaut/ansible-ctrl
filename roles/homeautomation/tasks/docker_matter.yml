---
- name: Resolve OTBR device path
  ansible.builtin.import_tasks: resolve_device.yml
  vars:
    device_paths: >-
      {{ [homeautomation_otbr_device] if homeautomation_otbr_device.startswith('/') else [] }}
    resolved_var_name: homeautomation_otbr_devices_resolved

- name: Create Matter data directory with correct ownership
  ansible.builtin.file:
    path: "{{ homeautomation_matter_required_volumes.data }}"
    state: directory
    owner: "{{ homeautomation_matter_uid }}"
    group: "{{ homeautomation_matter_gid }}"
    mode: "0755"
  become: true

- name: Remove Matter and OTBR containers if they exist
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop:
    - matter
    - otbr
  failed_when: false

- name: Start Matter and Open Thread Border Router (OTBR) Docker containers
  vars:
    matter_base_volumes:
      - /run/dbus:/run/dbus:ro
      - "{{ homeautomation_matter_required_volumes.data }}:/data"
    matter_volumes: "{{ homeautomation_common_volumes + matter_base_volumes }}"

    otbr_base_volumes:
      - "{{ homeautomation_otbr_required_volumes.data }}:/data"
    otbr_volumes: "{{ homeautomation_common_volumes + otbr_base_volumes }}"

    # Build device list: always include /dev/net/tun, add physical device if present
    otbr_devices: "{{ ['/dev/net/tun'] + homeautomation_otbr_devices_resolved }}"

    otbr_base_env:
      - AUTOFLASH_FIRMWARE=0
      - BACKBONE_IF={{ homeautomation_otbr_backbone_if }}
      - BAUDRATE=460800
      # For network sockets: Use /tmp/ttyOTBR (pseudo-TTY created by socat service)
      # For physical devices: Use the resolved device path (e.g., /dev/ttyUSB0)
      - >-
        DEVICE={{ homeautomation_otbr_devices_resolved[0]
        if homeautomation_otbr_devices_resolved else '/tmp/ttyOTBR' }}
      - FIREWALL=1
      - FLOW_CONTROL=1
      - NAT64=1
      - OTBR_REST_PORT={{ homeautomation_otbr_rest_port }}
      - OTBR_WEB_PORT={{ homeautomation_otbr_web_port }}
    # Network socket configuration: NETWORK_DEVICE triggers socat to bridge TCP socket to /tmp/ttyOTBR
    otbr_network_env:
      - NETWORK_DEVICE={{ homeautomation_otbr_device }}
    otbr_env: >-
      {{ otbr_base_env + (otbr_network_env if not homeautomation_otbr_devices_resolved else []) }}

  community.docker.docker_compose_v2:
    project_name: homeautomation-matter
    pull: always
    remove_orphans: true
    definition:
      networks: "{{ homeautomation_external_network }}"
      services:
        matter:
          # http://matter.internal:5580
          container_name: matter
          hostname: matter-{{ ansible_facts['hostname'] }}
          image: "{{ homeautomation_matter_docker_image }}"
          cap_add:
            - NET_ADMIN
            - NET_RAW
          depends_on:
            - otbr
          logging: "{{ homeautomation_default_logging }}"
          ports:
            - "{{ homeautomation_matter_port }}:5580"
          restart: unless-stopped
          security_opt:
            # Needed for Bluetooth via dbus
            - apparmor=unconfined
          volumes: "{{ matter_volumes }}"

        otbr:
          # http://localhost:8080
          container_name: otbr
          hostname: otbr-{{ ansible_facts['hostname'] }}
          image: "{{ homeautomation_otbr_docker_image }}"
          cap_add:
            - NET_ADMIN
            - NET_RAW
          devices: "{{ otbr_devices }}"
          environment: "{{ otbr_env }}"
          logging: "{{ homeautomation_default_logging }}"
          # Required for mDNS and physical interface access to work correctly
          network_mode: host
          restart: unless-stopped
          volumes: "{{ otbr_volumes }}"
  notify: Update /etc/hosts
