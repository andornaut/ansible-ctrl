---
- name: Remove Piper and Whisper containers if they exist
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
  loop:
    - piper
    - whisper
  ignore_errors: true

- name: Start Voice Docker containers
  vars:
    #microwakeword_volumes: "{{ common_volumes }}"
    #
    #openwakeword_base_volumes:
    #  - "{{ homeautomation_openwakeword_required_volumes.data }}:/custom"
    #openwakeword_volumes: "{{ common_volumes + openwakeword_base_volumes }}"

    piper_base_volumes:
      - "{{ homeautomation_piper_required_volumes.data }}:/data"
    piper_volumes: "{{ common_volumes + piper_base_volumes }}"

    whisper_base_volumes:
      - "{{ homeautomation_whisper_required_volumes.data }}:/data"
    whisper_volumes: "{{ common_volumes + whisper_base_volumes }}"

  community.docker.docker_compose_v2:
    project_name: homeautomation-voice
    pull: always
    remove_orphans: true
    definition:
      networks: "{{ external_network }}"
      services:
        # Voice Preview (hardware) uses microWakeWord, not openWakeWord
        #openwakeword:
        #  http://openwakeword.internal:11434
        #  container_name: openwakeword
        #  image: "{{ homeautomation_openwakeword_docker_image }}"
        #  command: --custom-model-dir /custom --preload-model 'ok_nabu'
        #  logging: "{{ default_logging }}"
        #  restart: unless-stopped
        #  volumes: "{{ openwakeword_volumes }}"

        # Used by Voice Preview (hardware)
        #microwakeword:
        #  http://microwakeword.internal:11434
        #  container_name: microwakeword
        #  image: "{{ homeautomation_microwakeword_docker_image }}"
        #  logging: "{{ default_logging }}"
        #  restart: unless-stopped
        #  volumes: "{{ microwakeword_volumes }}"

        piper:
          # http://piper.internal:10200
          container_name: piper
          image: "{{ homeautomation_piper_docker_image }}"
          command: "{{ homeautomation_piper_command }}"
          logging: "{{ default_logging }}"
          ports:
            - "{{ homeautomation_piper_port }}:10200"
          restart: unless-stopped
          volumes: "{{ piper_volumes }}"

        whisper:
          # http://whisper.internal:10300
          container_name: whisper
          image: "{{ homeautomation_whisper_docker_image }}"
          command: "{{ homeautomation_whisper_command }}"
          logging: "{{ default_logging }}"
          ports:
            - "{{ homeautomation_whisper_port }}:10300"
          restart: unless-stopped
          volumes: "{{ whisper_volumes }}"
  notify:
    - restart homeassistant
    - update /etc/hosts
