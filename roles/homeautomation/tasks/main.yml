---
- name: Validate mDNS configuration
  block:
    - name: Check for mDNS service conflicts
      assert:
        that:
          - not (homeautomation_install_avahi and homeautomation_install_matter)
        fail_msg: |
          ERROR: Cannot install both Avahi (homeautomation_install_avahi) and Matter/Thread (homeautomation_install_matter)
          as they both provide mDNS services and will conflict when using network_mode: host.
        success_msg: "mDNS configuration validated successfully"

    - name: mDNS advisory message
      debug:
        msg: |
          {% if homeautomation_install_matter %}
          Provisioning Matter/Thread, so Avahi will be disabled
          {% elif homeautomation_install_avahi %}
          Provisioning Avahi, so Matter/Thread will not be provisioned
          {% endif %}
      when: homeautomation_install_matter or homeautomation_install_avahi

    - import_tasks: avahi.yml
      when: homeautomation_install_avahi

    - name: Disable host Avahi daemon when not needed
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      loop:
        - avahi-daemon.socket # Stop the socket first, b/c it can spawn the service
        - avahi-daemon.service
      ignore_errors: true
      when: not homeautomation_install_avahi
  tags:
    - avahi
    - docker

- import_tasks: bluetooth.yml
- import_tasks: mosquitto.yml

- import_tasks: memryx.yml
  tags: memryx
  when: homeautomation_install_memryx

- import_tasks: otbr.yml
  when: homeautomation_install_matter

- name: Install customizations
  block:
    - import_tasks: custom_components.yml
    - import_tasks: themes.yml
    - import_tasks: www.yml
  tags: customizations

- name: Configure Docker containers
  block:
    - import_tasks: docker_prerequisites.yml
      tags:
        - esphome
        - frigate
        - govee2mqtt
        - hamcp
        - homeassistant
        - llm
        - matter
        - mosquitto
        - voice

    # Must come first, because it creates the shared bridge network
    - import_tasks: docker_homeassistant.yml
      tags: homeassistant

    # Must come before docker_frigate, b/c Frigate may depend on Llama.cpp
    - import_tasks: docker_llm.yml
      tags: llm
      when: homeautomation_install_llm

    - import_tasks: docker_frigate.yml
      tags: frigate
      when: homeautomation_install_frigate

    - import_tasks: docker_esphome.yml
      tags: esphome
      when: homeautomation_install_esphome

    - import_tasks: docker_matter.yml
      tags: matter
      when: homeautomation_install_matter

    - import_tasks: docker_hamcp.yml
      tags: hamcp
      when: homeautomation_install_hamcp

    - import_tasks: docker_voice.yml
      tags: voice
      when: homeautomation_install_voice

  tags: docker
