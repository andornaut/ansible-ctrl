---
- name: Validate mDNS configuration
  tags:
    - avahi
    - docker
    - matter
  block:
    # OTBR and the host-networked Matter server each run a host mDNS responder;
    # Avahi is a third. Multiple responders on UDP 5353 conflict, so Avahi and
    # Matter/Thread cannot both run.
    - name: Check for mDNS service conflicts
      ansible.builtin.assert:
        that:
          - not (homeautomation_install_avahi and (homeautomation_install_matterjs or homeautomation_install_legacy_pythonmatterserver))
          - not (homeautomation_install_matterjs and homeautomation_install_legacy_pythonmatterserver)
        fail_msg: >-
          Cannot enable Avahi alongside Matter/Thread (both run a host mDNS
          responder, which conflict), nor both Matter servers at once.
        success_msg: "mDNS configuration validated"

    - name: Show the mDNS provisioning plan
      ansible.builtin.debug:
        msg: |
          {% if homeautomation_install_matterjs or homeautomation_install_legacy_pythonmatterserver %}
          Provisioning Matter/Thread (OTBR host mDNS), so Avahi will be disabled
          {% elif homeautomation_install_avahi %}
          Provisioning Avahi, so Matter/Thread (OTBR) will not be provisioned
          {% endif %}
      when: homeautomation_install_matterjs or homeautomation_install_legacy_pythonmatterserver or homeautomation_install_avahi

    - name: Import Avahi tasks
      ansible.builtin.import_tasks: avahi.yml
      when: homeautomation_install_avahi

    - name: Disable host Avahi daemon when not needed
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      become: true
      loop:
        # Stop the socket first, b/c it can spawn the service
        - avahi-daemon.socket
        - avahi-daemon.service
      when: not homeautomation_install_avahi

- name: Import Bluetooth tasks
  ansible.builtin.import_tasks: bluetooth.yml
- name: Import Mosquitto tasks
  ansible.builtin.import_tasks: mosquitto.yml

- name: Import MemryX tasks
  ansible.builtin.import_tasks: memryx.yml
  tags: memryx
  when: homeautomation_install_memryx

- name: Import OTBR tasks
  ansible.builtin.import_tasks: otbr.yml
  when: homeautomation_install_matterjs or homeautomation_install_legacy_pythonmatterserver

- name: Install customizations
  tags: customizations
  block:
    - name: Import custom components tasks
      ansible.builtin.import_tasks: custom_components.yml
    - name: Import themes tasks
      ansible.builtin.import_tasks: themes.yml
    - name: Import www tasks
      ansible.builtin.import_tasks: www.yml

- name: Configure Docker containers
  tags: docker
  block:
    - name: Import Docker prerequisites tasks
      ansible.builtin.import_tasks: docker_prerequisites.yml
      tags:
        - esphome
        - frigate
        - govee2mqtt
        - hamcp
        - homeassistant
        - llm
        - matter
        - mosquitto
        - voice

    # Must come first, because it creates the shared bridge network
    - name: Import Home Assistant Docker tasks
      ansible.builtin.import_tasks: docker_homeassistant.yml
      tags: homeassistant

    - name: Work around aioruckus HEAD/aiohttp 3.14 incompatibility
      ansible.builtin.import_tasks: patch_aioruckus_head.yml
      tags: homeassistant
      when: homeautomation_homeassistant_patch_aioruckus_head

    # Must come before docker_frigate, b/c Frigate may depend on Llama.cpp
    - name: Import LLM Docker tasks
      ansible.builtin.import_tasks: docker_llm.yml
      tags: llm
      when: homeautomation_install_llm

    # OTBR must come before the matter server containers
    - name: Import OTBR Docker tasks
      ansible.builtin.import_tasks: docker_otbr.yml
      tags: matter
      when: homeautomation_install_matterjs or homeautomation_install_legacy_pythonmatterserver

    - name: Import Matter.js Docker tasks
      ansible.builtin.import_tasks: docker_matterjs.yml
      tags: matter
      when: homeautomation_install_matterjs

    - name: Import Python Matter Server Docker tasks
      ansible.builtin.import_tasks: docker_pythonmatterserver.yml
      tags: matter
      when: homeautomation_install_legacy_pythonmatterserver

    # The remaining do not have a required ordering
    - name: Import ESPHome Docker tasks
      ansible.builtin.import_tasks: docker_esphome.yml
      tags: esphome
      when: homeautomation_install_esphome

    - name: Import Frigate Docker tasks
      ansible.builtin.import_tasks: docker_frigate.yml
      tags: frigate
      when: homeautomation_install_frigate

    - name: Import ha-mcp Docker tasks
      ansible.builtin.import_tasks: docker_hamcp.yml
      tags: hamcp
      when: homeautomation_install_hamcp

    - name: Import Voice Docker tasks
      ansible.builtin.import_tasks: docker_voice.yml
      tags: voice
      when: homeautomation_install_voice
