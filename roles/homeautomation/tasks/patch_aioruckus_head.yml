---
# Workaround: aioruckus 0.42 (the ruckus_unleashed dependency) issues HTTP HEAD
# requests during login, but the Ruckus Unleashed controller returns a body on
# HEAD responses. aiohttp 3.14+ (bundled llhttp 9.4.1) rejects that as a fatal
# parse error, so the integration fails to set up. Patching HEAD to GET avoids
# it (identical status/headers/Location; the small body is harmless).
#
# Home Assistant reinstalls aioruckus into the container whenever the container
# is recreated, so this must reapply after each recreate. Remove once fixed
# upstream: https://github.com/ms264556/aioruckus/issues/14
- name: Wait for aioruckus to be installed in the Home Assistant container
  community.docker.docker_container_exec:
    container: homeassistant
    argv:
      - python3
      - -c
      - "import aioruckus, inspect, os; print(os.path.join(os.path.dirname(inspect.getfile(aioruckus)), 'ajaxsession.py'))"
  register: homeautomation_aioruckus
  changed_when: false
  failed_when: false
  retries: 30
  delay: 10
  until: homeautomation_aioruckus.rc == 0

- name: Patch aioruckus to use GET instead of HEAD
  community.docker.docker_container_exec:
    container: homeassistant
    argv:
      - sh
      - -c
      - >-
        f='{{ homeautomation_aioruckus.stdout | trim }}';
        grep -q 'self.websession.head(' "$f" || exit 0;
        sed -i 's/self\.websession\.head(/self.websession.get(/g' "$f";
        echo patched
  register: homeautomation_aioruckus_patch
  changed_when: "'patched' in homeautomation_aioruckus_patch.stdout"
  when: homeautomation_aioruckus.rc == 0
  notify: Restart homeassistant
