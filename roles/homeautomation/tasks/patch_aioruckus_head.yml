---
# aioruckus (ruckus_unleashed's dependency) sends HTTP HEAD during login, but the
# Ruckus Unleashed controller returns a body on HEAD, which aiohttp 3.14+ rejects
# as a fatal parse error, so the integration fails to set up. Patching HEAD to GET
# avoids it (identical status/headers/Location; the small body is harmless). Home
# Assistant reinstalls aioruckus on every container recreate, so this reapplies
# each time. Remove once fixed: https://github.com/ms264556/aioruckus/issues/14
- name: Wait for aioruckus to be installed in the Home Assistant container
  community.docker.docker_container_exec:
    container: homeassistant
    argv:
      - python3
      - -c
      - "import aioruckus, inspect, os; print(os.path.join(os.path.dirname(inspect.getfile(aioruckus)), 'ajaxsession.py'))"
  register: homeautomation_aioruckus
  changed_when: false
  failed_when: false
  retries: 30
  delay: 10
  until: homeautomation_aioruckus.rc == 0

- name: Patch aioruckus to use GET instead of HEAD
  community.docker.docker_container_exec:
    container: homeassistant
    argv:
      - sh
      - -c
      - >-
        f='{{ homeautomation_aioruckus.stdout | trim }}';
        grep -q 'self.websession.head(' "$f" || exit 0;
        sed -i 's/self\.websession\.head(/self.websession.get(/g' "$f";
        echo patched
  register: homeautomation_aioruckus_patch
  changed_when: "'patched' in homeautomation_aioruckus_patch.stdout"
  when: homeautomation_aioruckus.rc == 0
  notify: Restart homeassistant
