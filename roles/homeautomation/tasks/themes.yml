---
- name: Create themes/ directory
  file:
    path: "{{ homeautomation_homeassistant_required_volumes.config }}/themes/"
    state: directory
    owner: root
    group: root
  become: true

- name: Install IBM1970 theme
  get_url:
    url: https://raw.githubusercontent.com/andornaut/homeassistant-ibm1970-theme/main/themes/ibm1970.yaml
    dest: "{{ homeautomation_homeassistant_required_volumes.config }}/themes/"
  become: true
