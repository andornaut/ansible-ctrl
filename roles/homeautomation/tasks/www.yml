---
- name: Create www/ directory
  file:
    path: "{{ homeautomation_homeassistant_required_volumes.config }}/www/"
    state: directory
    owner: root
    group: root
  become: true

- name: Install advanced-camera-card
  block:
    - name: Download advanced-camera-card
      get_url:
        url: https://github.com/dermotduffy/advanced-camera-card/releases/latest/download/advanced-camera-card.zip
        dest: /tmp/advanced-camera-card.zip

    - name: Create advanced-camera-card directory
      ansible.builtin.file:
        path: "{{ homeautomation_homeassistant_required_volumes.config }}/www/advanced-camera-card"
        state: directory
        mode: "0755"
      become: true

    - name: Install advanced-camera-card
      ansible.builtin.unarchive:
        src: /tmp/advanced-camera-card.zip
        dest: "{{ homeautomation_homeassistant_required_volumes.config }}/www/advanced-camera-card"
        remote_src: true
        # Drop the ./dist directory
        # -j junk  paths. The  archive's directory structure is not recreated;
        # all files are deposited in the extraction directory (by default, the current one).
        extra_opts: "-j"
      become: true

- name: Install Card Mod
  block:
    - name: Create a temporary directory for Card Mod
      ansible.builtin.tempfile:
        state: directory
      register: card_mod_tmp

    - name: Get releases of Card Mod
      ansible.builtin.uri:
        url: https://api.github.com/repos/thomasloven/lovelace-card-mod/releases
        return_content: true
      register: card_mod_releases

    - name: Set Card Mod version to latest stable release
      ansible.builtin.set_fact:
        card_mod_version: "{{ (card_mod_releases.json | selectattr('prerelease', 'equalto', false) | selectattr('draft', 'equalto', false) | list | first).tag_name }}"

    - name: Download and unarchive Card Mod {{ card_mod_version }}
      ansible.builtin.unarchive:
        src: "https://github.com/thomasloven/lovelace-card-mod/archive/refs/tags/{{ card_mod_version }}.tar.gz"
        dest: "{{ card_mod_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Install Card Mod
      copy:
        src: "{{ card_mod_tmp.path }}/card-mod.js"
        dest: "{{ homeautomation_homeassistant_required_volumes.config }}/www/"
        remote_src: true
      become: true

