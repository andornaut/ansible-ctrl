---
# Values derived from defaults/main.yml, not operator knobs. They live here rather than
# in defaults/ so that role vars outrank host_vars and a host cannot desync a derived
# value from the variable it is derived from.

homeautomation_common_volumes:
  - "{{ homeautomation_homeassistant_required_volumes.localtime }}:/etc/localtime:ro"

homeautomation_default_logging:
  driver: "json-file"
  options:
    max-size: "{{ homeautomation_docker_log_max_size }}"
    max-file: "{{ homeautomation_docker_log_max_file }}"

homeautomation_external_network:
  default:
    external: true
    name: "{{ homeautomation_docker_network_name }}"

homeautomation_tz: "{{ homeautomation_system_timezone.stdout.strip() }}"
