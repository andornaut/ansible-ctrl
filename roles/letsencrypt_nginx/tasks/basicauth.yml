---
- name: Create basicauth directory
  ansible.builtin.file:
    path: "{{ letsencrypt_nginx_docker_required_volumes.config }}/basicauth"
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: Configure basicauth .htpasswd files for main domains
  community.general.htpasswd:
    path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/basicauth/{{
      item.0.domain }}.htpasswd
    name: "{{ item.1.username }}"
    password: "{{ item.1.password }}"
    mode: "0644"
    owner: root
    group: root
    create: true
  when:
    - item.1 is defined
    - item.1.username is defined
    - item.1.password is defined
  with_subelements:
    - "{{ letsencrypt_nginx_websites }}"
    - credentials
    - skip_missing: true
  become: true

- name: Configure HTTP Basic Authentication for aliases
  community.general.htpasswd:
    path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/basicauth/{{
      item.0.file_basename }}.htpasswd
    name: "{{ item.1.username }}"
    password: "{{ item.1.password }}"
    mode: "0640"
    owner: root
    group: root
    create: true
  when:
    - item.1 is defined
    - item.1.username is defined
    - item.1.password is defined
    - item.0.file_basename is defined
  with_subelements:
    - >-
      {{ letsencrypt_nginx_websites
      | selectattr('aliases', 'defined')
      | map(attribute='aliases')
      | flatten }}
    - credentials
    - skip_missing: true
  become: true

- name: Find all .htpasswd files
  ansible.builtin.find:
    paths: "{{ letsencrypt_nginx_docker_required_volumes.config }}/basicauth"
    patterns: "*.htpasswd"
  register: letsencrypt_nginx_existing_htpasswd_files
  become: true

- name: Get list of valid htpasswd filenames
  ansible.builtin.set_fact:
    letsencrypt_nginx_valid_htpasswd_files: >-
      {{ (letsencrypt_nginx_websites | map(attribute='domain') | list) +
         (letsencrypt_nginx_websites
         | selectattr('aliases', 'defined')
         | map(attribute='aliases')
         | flatten
         | map(attribute='file_basename')
         | list) }}

- name: Remove obsolete .htpasswd files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  when: item.path | basename | splitext | first not in letsencrypt_nginx_valid_htpasswd_files
  with_items: "{{ letsencrypt_nginx_existing_htpasswd_files.files }}"
  become: true
