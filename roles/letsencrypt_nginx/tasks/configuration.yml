---
- name: Create the partial directory
  ansible.builtin.file:
    path: "{{ letsencrypt_nginx_docker_required_volumes.config }}/partial"
    state: directory
    mode: "0750"
    owner: root
    group: root
  become: true

- name: Find existing .conf files
  ansible.builtin.find:
    paths: "{{ letsencrypt_nginx_docker_required_volumes.config }}"
    patterns: "*.conf"
    file_type: file
    use_regex: false
    recurse: false # Don't look in subdirectories
  register: letsencrypt_nginx_find_conf_files
  become: true

- name: Delete existing .conf files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ letsencrypt_nginx_find_conf_files.files }}"
  become: true
  when: letsencrypt_nginx_find_conf_files.matched > 0

- name: Copy partial configurations
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ letsencrypt_nginx_docker_required_volumes.config }}/partial/"
    mode: "0640"
    owner: root
    group: root
  loop:
    - common_proxy_configuration
    - common_site_configuration
    - selfsigned_certificate
  become: true

- name: Copy default site configuration
  ansible.builtin.copy:
    src: 00-default.conf
    dest: "{{ letsencrypt_nginx_docker_required_volumes.config }}/00-default.conf"
    mode: "0640"
    owner: root
    group: root
    force: true # Overwrite if exists
  become: true

- name: Check if SSL certificates exist
  ansible.builtin.stat:
    path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/crt/{{
      item.csr_common_name | default(item.domain) | replace('*', '_')
      }}.crt
  loop: "{{ letsencrypt_nginx_websites }}"
  register: letsencrypt_nginx_check_crts
  become: true

- name: Generate site configurations
  ansible.builtin.template:
    src: configuration.j2
    dest: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/{{
      item.item.domain }}.conf
    mode: "0640"
    owner: root
    group: root
    force: true # Overwrite if exists
  loop: "{{ letsencrypt_nginx_check_crts.results }}"
  become: true
  notify: Restart nginx
