---
# state is derived from the flag rather than gated with `when`, so clearing the flag removes
# the job from a host that used to run it.
- name: Configure the certificate renewal cron job
  ansible.builtin.cron:
    name: Let's Encrypt certificate renewal
    cron_file: ansible-role-letsencrypt_nginx
    user: root
    hour: "{{ letsencrypt_nginx_renewal_cron_hour }}"
    minute: "{{ letsencrypt_nginx_renewal_cron_minute }}"
    job: >-
      cd {{ letsencrypt_nginx_renewal_cron_directory }} &&
      ansible-playbook webservers.yml --tags letsencrypt
      >> {{ letsencrypt_nginx_renewal_cron_log }} 2>&1
    state: "{{ letsencrypt_nginx_install_renewal_cron | ternary('present', 'absent') }}"
  become: true
