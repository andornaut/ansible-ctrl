- name: Create CSRs
  community.crypto.openssl_csr:
    path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/csr/{{
      item.csr_common_name | default(item.domain) | replace('*', '_') }}.csr
    privatekey_path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/key/private.pem
    mode: "0640"
    owner: root
    group: root
    country_name: "{{ letsencrypt_nginx_csr_country }}"
    common_name: "{{ item.csr_common_name | default(item.domain) }}"
  loop: "{{ letsencrypt_nginx_websites }}"
  when: not item.use_selfsigned_certificate | default(false)
  become: true

- name: Create self-signed certificate
  community.crypto.x509_certificate:
    path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/crt/selfsigned.pem
    privatekey_path: >-
      {{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/key/private.pem
    provider: selfsigned
    mode: "0640"
    owner: root
    group: root
  become: true
