---
- name: Set up SSL directories and keys
  become: true
  block:
    - name: Create SSL directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
        owner: root
        group: root
      loop:
        - "{{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/crt"
        - "{{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/csr"
        - "{{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/key"

    - name: Create keys
      community.crypto.openssl_privatekey:
        # Only create keys if they don't exist
        path: "{{ item }}"
        mode: "0640"
        owner: root
        group: root
      loop:
        - "{{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/key/private.pem"
        - "{{ letsencrypt_nginx_docker_required_volumes.config }}/ssl/key/public.pem"
      register: letsencrypt_nginx_create_keys

