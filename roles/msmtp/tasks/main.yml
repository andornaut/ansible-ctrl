---
# The next task purges the host's MTA, so fail here on missing host_vars rather than
# halfway through, which would leave the host with no MTA.
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - msmtp_domain is defined
      - msmtp_user is defined
      - msmtp_password_INSECURE is defined
      # Exact loopback match, not a prefix: a "127."-prefixed name resolving to a LAN
      # address would be an open relay (msmtpd accepts unauthenticated mail).
      - msmtp_relay_interface in ['127.0.0.1', '::1']
      # The systemd override clears CAP_NET_BIND_SERVICE, so a privileged port would
      # crash-loop msmtpd on bind.
      - msmtp_relay_port | int >= 1024
      - msmtp_relay_port | int <= 65535
    fail_msg: >-
      Set msmtp_domain, msmtp_user and msmtp_password_INSECURE in host_vars
      (gitignored), keep msmtp_relay_interface on loopback, and use an
      unprivileged msmtp_relay_port.
    quiet: true

- name: Uninstall MTAs
  ansible.builtin.apt:
    name:
      - exim4
      - postfix
      - sendmail
    state: absent
    install_recommends: false
  become: true

# msmtp-mta provides /usr/sbin/sendmail, which mailutils' mail(1) invokes by default.
# state=present, not latest: this role applies to `all`, so latest would make every run a
# partial apt upgrade of the fleet. upgrade.yml is where packages get upgraded.
- name: Install system packages
  ansible.builtin.apt:
    name:
      - msmtp
      - msmtp-mta
      - mailutils
    install_recommends: false
    state: present
    update_cache: true
  become: true

# msmtp's AppArmor profile for /usr/bin/msmtp only grants reads of the packaged config
# paths, so where it is enforced msmtpd's "-C /etc/msmtprc-relay" is denied and mail
# bounces. The profile reads this local include when enforced and ignores it otherwise, so
# writing it unconditionally is safe. blockinfile, not copy: the file is the operator's, so
# only the role's marker block is rewritten.
- name: Allow the relay config in the msmtp AppArmor profile
  ansible.builtin.blockinfile:
    path: /etc/apparmor.d/local/usr.bin.msmtp
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: ansible-role-msmtp"
    block: |
      {{ msmtp_relay_config_path }} r,
  become: true

# The profile is disabled by default via this symlink; reloading only matters when enforced.
- name: Check whether the msmtp AppArmor profile is disabled
  ansible.builtin.stat:
    path: /etc/apparmor.d/disable/usr.bin.msmtp
  register: msmtp_apparmor_disabled

# Unconditional (like the msmtpd restart below): gating on the include changing would let a
# run that wrote the rule and then died never converge, leaving an enforced profile denying
# msmtpd's relay-config reads.
- name: Reload AppArmor so the relay rule is live before msmtpd restarts
  ansible.builtin.systemd_service:
    name: apparmor
    state: reloaded
  when: not msmtp_apparmor_disabled.stat.exists
  become: true

# A profile disabled on disk can still be loaded in the kernel: the postinst creates the
# disable symlink without unloading a resident profile, and a legacy copy under the bare
# "/usr/bin/msmtp" name no longer matches the on-disk file so a bulk reload skips it. Either
# way it keeps denying msmtpd's relay-config read. Unload any loaded msmtp profile (both
# spellings, since removal is by name) so the kernel matches the disabled-on-disk state.
- name: Unload a stale msmtp AppArmor profile left enforcing while disabled on disk
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -euo pipefail
      changed=
      for name in msmtp /usr/bin/msmtp; do
        if grep -qE "^${name} \(" /sys/kernel/security/apparmor/profiles; then
          printf '%s' "${name}" > /sys/kernel/security/apparmor/.remove
          changed=1
        fi
      done
      [ -n "${changed}" ] && echo changed || true
  register: msmtp_apparmor_unload
  changed_when: "'changed' in msmtp_apparmor_unload.stdout"
  when: msmtp_apparmor_disabled.stat.exists
  become: true

# msmtpd runs as the "msmtp" user (from msmtp-mta) via the systemd override. msmtp rejects a
# -C config holding secrets unless it is owned by the caller and unreadable by group/other,
# so this is msmtp:msmtp 0600, not root:msmtp 0640.
- name: Copy msmtp relay config file
  ansible.builtin.template:
    src: msmtprc-relay
    dest: "{{ msmtp_relay_config_path }}"
    owner: msmtp
    group: msmtp
    mode: "0600"
  become: true
  no_log: true

- name: Create msmtpd systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/msmtpd.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Copy msmtpd systemd override
  ansible.builtin.template:
    src: msmtpd-override.conf
    dest: /etc/systemd/system/msmtpd.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  become: true

# Restart msmtpd against the relay config before /etc/msmtprc below points clients at it, or
# mail sent in between relays back into msmtpd. An ordering constraint, so not a handler.
# Unconditional: gating on the templates changing would let a run that wrote them and then
# died never converge (daemon_reload doesn't restart a running unit). msmtpd holds no queue,
# so restarting every run is cheap.
- name: Restart msmtpd before pointing clients at it
  ansible.builtin.systemd_service:
    name: msmtpd
    daemon_reload: true
    enabled: true
    state: restarted
  become: true

# Written before /etc/msmtprc, which references it via its "aliases" directive, so
# clients are never pointed at a config whose aliases file does not exist yet.
- name: Copy /etc/aliases
  ansible.builtin.template:
    src: aliases
    dest: /etc/aliases
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Copy /etc/mailname
  ansible.builtin.template:
    src: mailname
    dest: /etc/mailname
    owner: root
    group: root
    mode: "0644"
  become: true

# Holds no credentials, so it can stay world-readable: cron drops privileges to
# the crontab owner before invoking sendmail, and Ubuntu's msmtp package is not
# setgid, so unprivileged senders must be able to read this file.
- name: Copy msmtp config file
  ansible.builtin.template:
    src: msmtprc
    dest: /etc/msmtprc
    owner: root
    group: root
    mode: "0644"
  become: true

# The autoconf/automake/libtool/etc build packages an earlier version installed are
# deliberately not removed: none is a leaf (removing autoconf drags out the whole debhelper
# toolchain), the base role installs autoconf on every host anyway, and this role applies to
# `all`, so purging here would fight the base role forever. Harmless where they sit.
