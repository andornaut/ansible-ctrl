[Service]
# The shipped unit uses DynamicUser=true, whose transient UID can never own a file. msmtp
# refuses a -C config with secrets unless owned by the calling euid with no group/other bits,
# so pin the daemon to the "msmtp" user (from msmtp-mta) reading its own 0600 config.
DynamicUser=false
User=msmtp
Group=msmtp

# msmtp_relay_port is unprivileged, so the shipped unit's CAP_NET_BIND_SERVICE grants
# are dead weight. Ambient capabilities are also inherited by the piped /usr/bin/msmtp,
# so clear both sets.
AmbientCapabilities=
CapabilityBoundingSet=

# DynamicUser=true implied ProtectSystem=strict, RestrictSUIDSGID and RemoveIPC; restore them
# now that it is off. strict makes the filesystem read-only to the daemon, so a compromised
# msmtpd cannot rewrite the relay config it owns.
#
# strict declares no writable paths, which is correct only because ExecStart logs to syslog
# and msmtpd writes nothing else. A log file (--log=<path> or a `logfile` line in the relay
# config) would fail on EROFS and, with Restart=always, crash-loop: add a ReadWritePaths= then.
ProtectSystem=strict
RestrictSUIDSGID=true
RemoveIPC=true

# Point msmtpd at the credential-bearing config, not /etc/msmtprc (which would relay back into
# msmtpd). "%%F" renders as literal "%F", which msmtpd replaces with the envelope from address.
# Interface and port are literal, not ${INTERFACE}/${PORT}: an operator's /etc/default/msmtpd
# would override those and desync the daemon from /etc/msmtprc.
ExecStart=
ExecStart=/usr/bin/msmtpd --interface={{ msmtp_relay_interface }} --port={{ msmtp_relay_port }} --log=syslog --command="/usr/bin/msmtp -C {{ msmtp_relay_config_path }} -f %%F --"
