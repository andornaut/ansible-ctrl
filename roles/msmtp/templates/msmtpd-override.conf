[Service]
# The shipped unit runs msmtpd under DynamicUser=true, whose transient UID can never own
# a file on disk. msmtp refuses a config passed with -C that contains secrets unless the
# file is owned by the calling euid and carries no group or other permission bits, so the
# daemon is pinned to the "msmtp" system user that msmtp-mta creates and reads a 0600
# config of its own.
DynamicUser=false
User=msmtp
Group=msmtp

# msmtp_relay_port is unprivileged, so the shipped unit's CAP_NET_BIND_SERVICE grants
# are dead weight. Ambient capabilities are also inherited by the piped /usr/bin/msmtp,
# so clear both sets.
AmbientCapabilities=
CapabilityBoundingSet=

# DynamicUser=true implied ProtectSystem=strict, RestrictSUIDSGID and RemoveIPC, which
# turning it off silently dropped (ProtectHome, PrivateTmp and NoNewPrivileges are
# explicit in the shipped unit and survive). Restore them: strict in particular makes
# the filesystem read-only to the daemon, so a compromised msmtpd cannot rewrite the
# relay config it owns.
#
# strict leaves the whole hierarchy read-only except /dev, /proc and /sys, and this unit
# declares no ReadWritePaths=, LogsDirectory= or StateDirectory=. That is correct only
# because the ExecStart below logs to syslog over /dev/log and msmtpd writes nothing
# else. Pointing it at a log file (--log=<path>, or a `logfile` line in the relay
# config) would fail on EROFS and, with the shipped unit's Restart=always, crash-loop.
# Add a writable path here if that ever changes.
ProtectSystem=strict
RestrictSUIDSGID=true
RemoveIPC=true

# Point msmtpd at the credential-bearing config instead of /etc/msmtprc, which
# would relay back into msmtpd. "%%F" renders as a literal "%F", which msmtpd
# replaces with the envelope from address. The interface and port are written
# literally rather than read from ${INTERFACE}/${PORT}, because an operator-created
# /etc/default/msmtpd would override those and desync the daemon from /etc/msmtprc.
ExecStart=
ExecStart=/usr/bin/msmtpd --interface={{ msmtp_relay_interface }} --port={{ msmtp_relay_port }} --log=syslog --command="/usr/bin/msmtp -C {{ msmtp_relay_config_path }} -f %%F --"
