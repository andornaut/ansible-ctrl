---
- name: System dependencies
  block:
    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - btrfsmaintenance
          - libblockdev-mdraid3
        state: latest
        install_recommends: false
        update_cache: true
      become: true

- name: Storage setup
  become: true
  block:
    - name: Create RAID mount directory
      ansible.builtin.file:
        path: "{{ nas_raid_mount_directory }}"
        owner: root
        group: "{{ nas_raid_group }}"
        state: directory
        mode: "0755"

    - name: Update crypttab for nas_raid_devices
      ansible.builtin.lineinfile:
        path: /etc/crypttab
        line: "nas{{ index }} {{ item }} {{ nas_key_file }} luks,noauto"
        regexp: "^nas{{ index }}"
      loop: "{{ nas_raid_devices }}"
      loop_control:
        index_var: index
      notify: Reload systemd

    - name: Update fstab for nas_raid_devices # noqa: yaml[line-length]
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: >-
          /dev/mapper/nas0 {{ nas_raid_mount_directory }} {{ nas_raid_fs_type }}
          {{ nas_raid_fs_defaults }},{% for i in range(nas_raid_devices | length) %}{% if
          nas_raid_fs_type == 'btrfs' %}device=/dev/mapper/nas{{ i }},{% endif
          %}x-systemd.after=blockdev@dev-mapper-nas{{ i }}.target,x-systemd.requires=dev-mapper-nas{{
          i }}.device,x-systemd.requires-mounts-for=/dev/mapper/nas{{ i }}{% if i < (nas_raid_devices
          | length - 1) %},{% endif %}{% endfor %},x-systemd.device-timeout=20s
          0 0
        regexp: "^/dev/mapper/nas0"
      notify: Reload systemd

- name: Backup configuration
  become: true
  when: nas_backup_devices is defined and (nas_backup_devices | length) > 0
  tags: backupnas
  block:
    - name: Create backup mount directories
      ansible.builtin.file:
        path: "{{ nas_backup_mount_directory }}{{ '' if index == 0 else index + 1 }}"
        owner: root
        group: root
        state: directory
        mode: "0755"
      loop: "{{ nas_backup_devices }}"
      loop_control:
        index_var: index

    - name: Update crypttab for nas_backup_devices
      ansible.builtin.lineinfile:
        path: /etc/crypttab
        line: >-
          {{ nas_backup_device_name }}{{ '' if index == 0 else index + 1 }}
          {{ item }} {{ nas_key_file }} luks,noauto
        regexp: "^{{ nas_backup_device_name }}{{ '' if index == 0 else index + 1 }}\\s"
      loop: "{{ nas_backup_devices }}"
      loop_control:
        index_var: index
      notify: Reload systemd

    - name: Update fstab for nas_backup_devices # noqa: yaml[line-length]
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: >-
          /dev/mapper/{{ nas_backup_device_name }}{{ '' if index == 0 else index + 1 }}
          {{ nas_backup_mount_directory }}{{ '' if index == 0 else index + 1 }}
          {{ nas_backup_fs_type }}
          {{ nas_backup_fs_defaults }},x-systemd.after=blockdev@dev-mapper-{{
          nas_backup_device_name }}{{ '' if index == 0 else index + 1
          }}.target,x-systemd.requires=dev-mapper-{{ nas_backup_device_name }}{{
          '' if index == 0 else index + 1 }}.device,x-systemd.requires-mounts-for=/dev/mapper/{{
          nas_backup_device_name }}{{ '' if index == 0 else index + 1
          }},x-systemd.device-timeout=20s
          0 0
        regexp: "^/dev/mapper/{{ nas_backup_device_name }}{{ '' if index == 0 else index + 1 }}\\s"
      loop: "{{ nas_backup_devices }}"
      loop_control:
        index_var: index
      notify: Reload systemd

    - name: Install backupnas script
      ansible.builtin.template:
        src: backupnas
        dest: /usr/local/bin/
        mode: "0755"

- name: Security and systemd configuration
  become: true
  block:
    - name: Secure key_file ownership
      ansible.builtin.file:
        path: "{{ nas_key_file }}"
        owner: root
        group: root
        mode: "0400"

    - name: Install nas-mount.service
      ansible.builtin.template:
        src: nas-mount.service
        dest: /etc/systemd/system/
        mode: "0644"
      notify:
        - Reload systemd
        - Disable nas-mount.service
        - Enable nas-mount.service
