---
# Wayland-only utilities for the niri session; X11 equivalents live in the bspwm role.
# The idle/lock/wallpaper equivalents (hypridle, hyprlock, hyprpaper) are built from
# source in hypr.yml.
- name: Install Wayland system packages
  ansible.builtin.apt:
    name:
      - brightnessctl
      - grim
      - slurp
      - wl-clipboard
    state: latest
    install_recommends: false
    update_cache: true
  become: true
