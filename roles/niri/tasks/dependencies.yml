---
- name: Update dynamic linker cache
  ansible.builtin.command: ldconfig
  changed_when: false
  become: true

- name: Install system dependencies
  tags: [packages]
  block:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - clang
          - gcc-14
          - g++-14
          # - libdbus-1-dev  # A newer version is installed in hypr.yml
          - libdisplay-info-dev
          - libegl1-mesa-dev
          - libgbm-dev
          - libinput-dev
          - libpango1.0-dev
          - libpipewire-0.3-dev
          - libseat-dev
          - libsystemd-dev
          - libudev-dev
          - libwayland-dev
          - libxcb-cursor-dev
          - libxkbcommon-dev
          - wayland-scanner++
          - wl-clipboard
          - xdg-desktop-portal
          - xdg-desktop-portal-gnome
          - xdg-desktop-portal-gtk
          - xwayland
          - xwayland-run

          # wayland dependencies
          - doxygen
          - graphviz
          - xmlto
          - xsltproc

          # hypr dependencies
          - g++-14
          - gcc-14
          - libmagic-dev
          - libpugixml-dev
          # Must not be installed, b/c it conflicts with v2.1.0 which is installed from source
          # - libsdbus-c++-dev
          - libspng-dev
        state: present
        install_recommends: false
        update_cache: true
      become: true

    - name: Configure GCC alternatives
      community.general.alternatives:
        name: "{{ item }}"
        path: "/usr/bin/{{ item }}-14"
        link: "/usr/bin/{{ item }}"
        state: selected
      loop:
        - gcc
        - g++
      become: true

- name: Install libsdbus
  tags: [libsdbus]
  block:
    - name: Create a temporary directory for libsdbus
      ansible.builtin.tempfile:
        state: directory
      register: niri_libsdbus_tmp

    - name: Get releases of libsdbus
      ansible.builtin.uri:
        url: https://api.github.com/repos/Kistler-Group/sdbus-cpp/releases
        return_content: true
      register: niri_libsdbus_releases

    - name: Set libsdbus version to latest stable release
      ansible.builtin.set_fact:
        niri_libsdbus_version: >-
          {{ (niri_libsdbus_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first).name }}

    - name: Download and unarchive libsdbus {{ niri_libsdbus_version }}
      ansible.builtin.unarchive:
        src: "https://github.com/Kistler-Group/sdbus-cpp/archive/refs/tags/\
          {{ niri_libsdbus_version }}.tar.gz"
        dest: "{{ niri_libsdbus_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Create build directory for libsdbus
      ansible.builtin.file:
        path: "{{ niri_libsdbus_tmp.path }}/build"
        state: directory
        mode: "0755"

    # Workaround: Install into /usr instead of the default of /usr/local
    # https://github.com/hyprwm/hypridle/issues/109#issuecomment-2678603712
    - name: Build libsdbus (1/2)
      ansible.builtin.command:
        cmd: cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=/usr/local
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true

    - name: Build libsdbus (2/2)
      ansible.builtin.command:
        cmd: cmake --build .
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true

    - name: Install libsdbus
      ansible.builtin.command:
        cmd: cmake --build . --target install
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true
      become: true

- name: Install Wayland (for wayland-scanner)
  tags: [wayland]
  block:
    - name: Get latest release info from GitLab API
      ansible.builtin.uri:
        url: "https://gitlab.freedesktop.org/api/v4/projects/121/releases"
        method: GET
        return_content: true
      register: niri_wayland_scanner_info

    - name: Set Wayland variables
      ansible.builtin.set_fact:
        niri_wayland_scanner_version: "{{ niri_wayland_scanner_info.json[0].tag_name }}"
        niri_wayland_scanner_download_url: >-
          {{ niri_wayland_scanner_info.json[0].assets.sources
          | selectattr('format', 'equalto', 'tar.gz')
          | map(attribute='url') | first }}

    - name: Create a temporary directory for Wayland
      ansible.builtin.tempfile:
        state: directory
      register: niri_wayland_scanner_tmp

    - name: Download and unarchive Wayland {{ niri_wayland_scanner_version }}
      ansible.builtin.unarchive:
        src: "{{ niri_wayland_scanner_download_url }}"
        dest: "{{ niri_wayland_scanner_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Create build directory for Wayland
      ansible.builtin.file:
        path: "{{ niri_wayland_scanner_tmp.path }}/build"
        state: directory
        mode: "0755"

    - name: Configure Wayland
      ansible.builtin.command:
        cmd: meson build/ --prefix=/usr/local --buildtype=release
        chdir: "{{ niri_wayland_scanner_tmp.path }}"
      changed_when: true

    - name: Build Wayland
      ansible.builtin.command:
        cmd: ninja
        chdir: "{{ niri_wayland_scanner_tmp.path }}/build"
      changed_when: true

    - name: Install Wayland
      ansible.builtin.command:
        cmd: ninja install
        chdir: "{{ niri_wayland_scanner_tmp.path }}/build"
      changed_when: true
      become: true

