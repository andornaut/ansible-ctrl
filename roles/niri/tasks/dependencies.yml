---
- name: Update dynamic linker cache
  ansible.builtin.command: ldconfig
  changed_when: false
  become: true

- name: Install system dependencies
  tags: [packages]
  block:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - clang
          - gcc-14
          - g++-14
          # - libdbus-1-dev  # A newer version is installed in hypr.yml
          - libdisplay-info-dev
          - libegl1-mesa-dev
          - libgbm-dev
          - libinput-dev
          - libpango1.0-dev
          - libpipewire-0.3-dev
          - libseat-dev
          - libsystemd-dev
          - libudev-dev
          - libwayland-dev
          - libxcb-cursor-dev
          - libxkbcommon-dev
          - wayland-scanner++
          - xdg-desktop-portal
          - xdg-desktop-portal-gnome
          - xdg-desktop-portal-gtk
          - xwayland
          - xwayland-run

          # wayland dependencies
          - doxygen
          - graphviz
          - xmlto
          - xsltproc

          # hypr dependencies
          - g++-14
          - gcc-14
          - libmagic-dev
          - libpugixml-dev
          # Conflicts with the libsdbus built from source below; keep it out.
          # - libsdbus-c++-dev
          - libspng-dev
        state: latest
        install_recommends: false
        update_cache: true
      become: true

    - name: Configure GCC alternatives
      community.general.alternatives:
        name: "{{ item }}"
        path: "/usr/bin/{{ item }}-14"
        link: "/usr/bin/{{ item }}"
        state: selected
      loop:
        - gcc
        - g++
      become: true

- name: Build and install libsdbus
  tags: [libsdbus]
  block:
    - name: Create a temporary directory for libsdbus
      ansible.builtin.tempfile:
        state: directory
      register: niri_libsdbus_tmp

    - name: Get latest libsdbus release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: Kistler-Group/sdbus-cpp
        github_release_fact: niri_libsdbus_release

    - name: Set libsdbus version fact
      ansible.builtin.set_fact:
        niri_libsdbus_version: "{{ niri_libsdbus_release.name }}"

    - name: Download and unarchive libsdbus
      ansible.builtin.unarchive:
        src: "https://github.com/Kistler-Group/sdbus-cpp/archive/refs/tags/\
          {{ niri_libsdbus_version }}.tar.gz"
        dest: "{{ niri_libsdbus_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Create build directory for libsdbus
      ansible.builtin.file:
        path: "{{ niri_libsdbus_tmp.path }}/build"
        state: directory
        mode: "0755"

    # Pin the install prefix so hypridle finds libsdbus:
    # https://github.com/hyprwm/hypridle/issues/109#issuecomment-2678603712
    - name: Build libsdbus (1/2)
      ansible.builtin.command:
        cmd: cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX:PATH=/usr/local
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true

    - name: Build libsdbus (2/2)
      ansible.builtin.command:
        cmd: cmake --build .
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true

    - name: Install libsdbus
      ansible.builtin.command:
        cmd: cmake --build . --target install
        chdir: "{{ niri_libsdbus_tmp.path }}/build"
      changed_when: true
      become: true
  always:
    - name: Remove the temporary directory for libsdbus
      ansible.builtin.file:
        path: "{{ niri_libsdbus_tmp.path }}"
        state: absent
      when: niri_libsdbus_tmp.path is defined
      become: true

- name: Build and install Wayland (for wayland-scanner)
  tags: [wayland]
  block:
    - name: Get latest Wayland release
      ansible.builtin.uri:
        url: "https://gitlab.freedesktop.org/api/v4/projects/121/releases"
        method: GET
        return_content: true
      register: niri_wayland_scanner_info

    - name: Set Wayland version and download URL facts
      ansible.builtin.set_fact:
        niri_wayland_scanner_version: "{{ niri_wayland_scanner_info.json[0].tag_name }}"
        niri_wayland_scanner_download_url: >-
          {{ niri_wayland_scanner_info.json[0].assets.sources
          | selectattr('format', 'equalto', 'tar.gz')
          | map(attribute='url') | first }}

    - name: Create a temporary directory for Wayland
      ansible.builtin.tempfile:
        state: directory
      register: niri_wayland_scanner_tmp

    - name: Download and unarchive Wayland
      ansible.builtin.unarchive:
        src: "{{ niri_wayland_scanner_download_url }}"
        dest: "{{ niri_wayland_scanner_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Create build directory for Wayland
      ansible.builtin.file:
        path: "{{ niri_wayland_scanner_tmp.path }}/build"
        state: directory
        mode: "0755"

    - name: Configure Wayland
      ansible.builtin.command:
        cmd: meson build/ --prefix=/usr/local --buildtype=release
        chdir: "{{ niri_wayland_scanner_tmp.path }}"
      changed_when: true

    - name: Build Wayland
      ansible.builtin.command:
        cmd: ninja
        chdir: "{{ niri_wayland_scanner_tmp.path }}/build"
      changed_when: true

    - name: Install Wayland
      ansible.builtin.command:
        cmd: ninja install
        chdir: "{{ niri_wayland_scanner_tmp.path }}/build"
      changed_when: true
      become: true
  always:
    - name: Remove the temporary directory for Wayland
      ansible.builtin.file:
        path: "{{ niri_wayland_scanner_tmp.path }}"
        state: absent
      when: niri_wayland_scanner_tmp.path is defined
      become: true

