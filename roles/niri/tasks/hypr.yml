---
# Install and configure Hyprland ecosystem tools. Every component follows the same
# cmake configure/build/install sequence, which lives in build_hypr_component.yml; the
# calls below supply only what differs. Order matters: hyprutils, hyprlang, hyprgraphics
# and hyprwayland-scanner are build dependencies of hypridle, hyprlock and hyprpaper.
#
# Each call is wrapped in a tagged block rather than carrying the tag on the
# include_tasks itself. A tag written directly on a dynamic include applies only to the
# include statement, so the included tasks would be filtered out and `--tags hyprlock`
# would run nothing. A tag inherited from an enclosing block propagates into the
# included file, and into the includes it makes in turn.

- name: Install hyprutils
  tags: [hyprutils]
  block:
    - name: Build and install hyprutils
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprutils
        hypr_component_build_target: all

- name: Install hyprlang
  tags: [hyprlang]
  block:
    - name: Build and install hyprlang
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprlang
        hypr_component_build_target: hyprlang

- name: Install hyprgraphics
  tags: [hyprgraphics]
  block:
    - name: Build and install hyprgraphics
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprgraphics
        hypr_component_build_target: all

- name: Install hyprwayland-scanner
  tags: [hyprscanner]
  block:
    # The build runs as root. hyprwayland-scanner declares no named target, so cmake
    # builds its default one.
    - name: Build and install hyprwayland-scanner
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprwayland-scanner
        hypr_component_build_become: true

- name: Install hypridle
  tags: [hypridle]
  block:
    - name: Build and install hypridle
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hypridle
        hypr_component_build_target: hypridle

    # desktop/handlers/main.yml restarts hypridle on every hypridle.conf change, so a
    # shadowed copy in /etc/systemd/user fails at ExecStart while the play reports success.
    - name: Relocate the hypridle unit
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units: [hypridle.service]
        niri_relocate_enable_units: [hypridle.service]

    - name: Enable hypridle.service
      ansible.builtin.systemd_service:
        name: hypridle.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started

- name: Install hyprlock
  tags: [hyprlock]
  block:
    # `--target all` fails on versions >=0.6.1
    # https://github.com/hyprwm/hyprlock/issues/710
    - name: Build and install hyprlock
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprlock
        hypr_component_build_target: all

- name: Install hyprpaper
  tags: [hyprpaper]
  block:
    - name: Build and install hyprpaper
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprpaper
        hypr_component_build_target: hyprpaper

    # The shadowing copy here still points at /usr/bin/hyprpaper, which this role never
    # installs: cmake installs the binary to /usr/local/bin.
    - name: Relocate the hyprpaper unit
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units: [hyprpaper.service]
        niri_relocate_enable_units: [hyprpaper.service]

    - name: Enable hyprpaper.service
      ansible.builtin.systemd_service:
        name: hyprpaper.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
