---
# Hyprland ecosystem tools. Every component uses the shared cmake sequence in
# build_hypr_component.yml; the calls below supply only what differs. Order matters:
# hyprutils, hyprlang, hyprgraphics and hyprwayland-scanner are build dependencies of
# hypridle, hyprlock and hyprpaper.
#
# Each include is wrapped in a tagged block; tagging a dynamic include directly filters
# out the included tasks, while a block's tag propagates into them.

- name: Install hyprutils
  tags: [hyprutils]
  block:
    - name: Build and install hyprutils
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprutils
        hypr_component_build_target: all

- name: Install hyprlang
  tags: [hyprlang]
  block:
    - name: Build and install hyprlang
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprlang
        hypr_component_build_target: hyprlang

- name: Install hyprgraphics
  tags: [hyprgraphics]
  block:
    - name: Build and install hyprgraphics
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprgraphics
        hypr_component_build_target: all

- name: Install hyprwayland-scanner
  tags: [hyprscanner]
  block:
    # Builds as root; no named target, so cmake builds its default.
    - name: Build and install hyprwayland-scanner
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprwayland-scanner
        hypr_component_build_become: true

- name: Install hypridle
  tags: [hypridle]
  block:
    - name: Build and install hypridle
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hypridle
        hypr_component_build_target: hypridle

    # The desktop role restarts hypridle on config changes, so a shadowed copy in
    # /etc/systemd/user would fail at ExecStart. Relocate it first.
    - name: Relocate the hypridle unit
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units: [hypridle.service]
        niri_relocate_enable_units: [hypridle.service]

    - name: Enable hypridle.service
      ansible.builtin.systemd_service:
        name: hypridle.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started

- name: Install hyprlock
  tags: [hyprlock]
  block:
    # Needs the explicit `all` target: https://github.com/hyprwm/hyprlock/issues/710
    - name: Build and install hyprlock
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprlock
        hypr_component_build_target: all

- name: Install hyprpaper
  tags: [hyprpaper]
  block:
    - name: Build and install hyprpaper
      ansible.builtin.include_tasks: build_hypr_component.yml
      vars:
        hypr_component_name: hyprpaper
        hypr_component_build_target: hyprpaper

    # The shadowing unit points at /usr/bin/hyprpaper, but cmake installs to
    # /usr/local/bin. Relocate it first.
    - name: Relocate the hyprpaper unit
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units: [hyprpaper.service]
        niri_relocate_enable_units: [hyprpaper.service]

    - name: Enable hyprpaper.service
      ansible.builtin.systemd_service:
        name: hyprpaper.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
