---
# Install and configure Hyprland ecosystem tools
# Each component is built from source in the following order:
# - hyprlang: Core language parser
# - hyprutils: Common utilities
# - hyprgraphics: Graphics utilities
# - hyprwayland-scanner: Wayland protocol scanner
# - hypridle: Idle daemon
# - hyprlock: Screen locker
# - hyprpaper: Wallpaper utilihyprpaperty

- name: Install hyprutils
  tags: [hyprutils]
  block:
    - name: Create a temporary directory for hyprutils
      ansible.builtin.tempfile:
        state: directory
      register: niri_hyprutils_tmp

    - name: Get releases of hyprutils
      ansible.builtin.uri:
        url: https://api.github.com/repos/hyprwm/hyprutils/releases
        return_content: true
      register: niri_hyprutils_releases

    - name: Set hyprutils version to latest stable release
      ansible.builtin.set_fact:
        niri_hyprutils_version: >-
          {{ (niri_hyprutils_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first).name }}

    - name: Download and unarchive hyprutils {{ niri_hyprutils_version }}
      ansible.builtin.unarchive:
        src: https://github.com/hyprwm/hyprutils/archive/refs/tags/{{ niri_hyprutils_version }}/.tar.gz
        dest: "{{ niri_hyprutils_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Build hyprutils (1/2)
      ansible.builtin.command:
        cmd: "{{ niri_hypr_cmake_configure }}"
        chdir: "{{ niri_hyprutils_tmp.path }}"

    - name: Build hyprutils (2/2)
      ansible.builtin.shell:
        cmd: "{{ niri_hypr_cmake_build }} --target all"
        chdir: "{{ niri_hyprutils_tmp.path }}"

    - name: Install hyprutils
      ansible.builtin.command:
        cmd: "{{ niri_hypr_cmake_install }}"
        chdir: "{{ niri_hyprutils_tmp.path }}"
      become: true

    - name: Cleanup temporary directory
      ansible.builtin.file:
        path: "{{ niri_hyprutils_tmp.path }}"
        state: absent

