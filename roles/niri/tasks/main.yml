---
# niri_user names the account this role's user-scoped tasks act on, so a wrong value acts
# on the wrong account. It used to default to ansible_facts["user_id"], which is whoever
# ansible happens to be running as on the target, and so became root whenever ansible itself
# ran as root, as the nightly cert-renewal cron does. It now defaults to primary_user, which
# is inventory data and does not depend on the invocation. This assert is the backstop.
# tags: always so a --tags run cannot skip it.
- name: Validate niri_user
  ansible.builtin.assert:
    that:
      - niri_user != "root"
    fail_msg: >-
      niri_user resolved to "root", which would write user-scoped state to /root.
      Set primary_user in the inventory (or niri_user in host_vars) to the target
      account. If ansible was run as root and a stale fact cache is to blame, clear
      .ansible/fact_cache/.
    success_msg: 'niri_user "{{ niri_user }}" is valid'
  tags: always

# Install and configure Niri Wayland compositor and related tools

- name: Resolve home directory for {{ niri_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ niri_user }}"
  tags: always

- name: Install Wayland system packages
  ansible.builtin.import_tasks: apt.yml
  tags:
    - niri
    - wayland

- name: Install system dependencies
  ansible.builtin.import_tasks: dependencies.yml
  tags:
    - hypr
    - niri
    - wayland

- name: Install Hyprland ecosystem tools
  ansible.builtin.import_tasks: hypr.yml
  tags: hypr

- name: Install and configure Niri compositor
  ansible.builtin.import_tasks: niri.yml
  tags: niri

- name: Configure XWayland support
  ansible.builtin.import_tasks: xwayland.yml
  tags: wayland
