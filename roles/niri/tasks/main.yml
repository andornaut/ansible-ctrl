---
- name: Install system packages
  apt:
    install_recommends: false
    name:
      - clang
      - gcc-14
      - g++-14
      #- libdbus-1-dev  # A newer version is installed in hypr.yml
      - libdisplay-info-dev
      - libegl1-mesa-dev
      - libgbm-dev
      - libinput-dev
      - libpango1.0-dev
      - libpipewire-0.3-dev
      - libseat-dev
      - libsystemd-dev
      - libudev-dev
      - libwayland-dev
      - libxcb-cursor-dev
      - libxkbcommon-dev
      - wayland-protocols
      - wayland-protocols-amdgpu
      - wayland-scanner++
      - wl-clipboard
      - xdg-desktop-portal
      - xdg-desktop-portal-gnome
      - xdg-desktop-portal-gtk
      - xwayland
      - xwayland-run

      # hypr dependencies
      - g++-14
      - gcc-14
      - libmagic-dev
      - libpugixml-dev
      # Must not be installed, b/c it conflicts with v2.1.0 which is installed from source
      #- libsdbus-c++-dev
      - libspng-dev
    state: latest
    update_cache: true
  become: true

# Needed by hyprlang
- name: Install GCC 14 alternative and select it
  community.general.alternatives:
    name: gcc
    path: /usr/bin/gcc-14
    link: /usr/bin/gcc
    state: selected
  become: true

- name: Install G++ 14 alternative and select it
  community.general.alternatives:
    name: g++
    path: /usr/bin/g++-14
    link: /usr/bin/g++
    state: selected
  become: true

- import_tasks: hypr.yml

- import_tasks: niri.yml

- import_tasks: xwayland.yml
