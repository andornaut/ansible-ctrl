---
- name: Install niri
  tags: [niri]
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: niri_tmp

    - name: Get latest niri release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: YaLTeR/niri
        github_release_fact: niri_release

    - name: Set niri version fact
      ansible.builtin.set_fact:
        niri_version: "{{ niri_release.name }}"

    - name: Download and unarchive niri
      ansible.builtin.unarchive:
        src: https://github.com/YaLTeR/niri/archive/refs/tags/{{ niri_version }}.tar.gz
        dest: "{{ niri_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Build niri
      ansible.builtin.command:
        cmd: cargo build --release
        chdir: "{{ niri_tmp.path }}"
      changed_when: true

    - name: Set executable permissions for niri binaries
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0755"
      loop:
        - "{{ niri_tmp.path }}/resources/niri-session"
        - "{{ niri_tmp.path }}/target/release/niri"

    - name: Fix path to niri in niri.service
      community.general.ini_file:
        no_extra_spaces: true
        option: ExecStart
        path: "{{ niri_tmp.path }}/resources/niri.service"
        section: Service
        value: /usr/local/bin/niri --session
        mode: "0644"

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /usr/local/share/wayland-sessions
        - /usr/local/share/xdg-desktop-portal
        - /usr/local/lib/systemd/user
      become: true

    - name: Copy niri files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: true
        mode: "0644"
      loop:
        - src: "{{ niri_tmp.path }}/target/release/niri"
          dest: /usr/local/bin/
        - src: "{{ niri_tmp.path }}/resources/niri.desktop"
          dest: /usr/local/share/wayland-sessions/
        - src: "{{ niri_tmp.path }}/resources/niri-session"
          dest: /usr/local/bin/
        - src: "{{ niri_tmp.path }}/resources/niri-portals.conf"
          dest: /usr/local/share/xdg-desktop-portal/
        - src: "{{ niri_tmp.path }}/resources/niri.service"
          dest: /usr/local/lib/systemd/user/
        - src: "{{ niri_tmp.path }}/resources/niri-shutdown.target"
          dest: /usr/local/lib/systemd/user/
      become: true

    # Neither unit has an [Install] section, so neither has an enable symlink to re-assert.
    - name: Relocate the niri units
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units:
          - niri.service
          - niri-shutdown.target

    - name: Configure electron flags for Wayland
      ansible.builtin.lineinfile:
        path: "{{ niri_user_home }}/.config/electron-flags.conf"
        line: "--ozone-platform-hint=auto"
        create: true
        mode: "0644"

    - name: Enable niri.service
      ansible.builtin.systemd_service:
        name: niri.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
      when: ansible_service_mgr == 'systemd'
