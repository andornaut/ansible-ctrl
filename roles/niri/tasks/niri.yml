---
- name: Install niri
  tags: [niri]
  block:
    - name: Create a temporary directory
      ansible.builtin.tempfile:
        state: directory
      register: niri_tmp

    - name: Get latest niri release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: YaLTeR/niri
        github_release_fact: niri_release

    - name: Set niri version fact
      ansible.builtin.set_fact:
        niri_version: "{{ niri_release.name }}"

    - name: Download and unarchive niri
      ansible.builtin.unarchive:
        src: https://github.com/YaLTeR/niri/archive/refs/tags/{{ niri_version }}.tar.gz
        dest: "{{ niri_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Build niri
      ansible.builtin.command:
        cmd: cargo build --release
        chdir: "{{ niri_tmp.path }}"
      changed_when: true

    - name: Set executable permissions for niri binaries
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0755"
      loop:
        - "{{ niri_tmp.path }}/resources/niri-session"
        - "{{ niri_tmp.path }}/target/release/niri"

    - name: Fix path to niri in niri.service
      community.general.ini_file:
        no_extra_spaces: true
        option: ExecStart
        path: "{{ niri_tmp.path }}/resources/niri.service"
        section: Service
        value: /usr/local/bin/niri --session
        mode: "0644"

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /usr/local/share/wayland-sessions
        - /usr/local/share/xdg-desktop-portal
        - /usr/local/lib/systemd/user
      become: true

    - name: Copy niri files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: true
        mode: "0644"
      loop:
        - src: "{{ niri_tmp.path }}/target/release/niri"
          dest: /usr/local/bin/
        - src: "{{ niri_tmp.path }}/resources/niri.desktop"
          dest: /usr/local/share/wayland-sessions/
        - src: "{{ niri_tmp.path }}/resources/niri-session"
          dest: /usr/local/bin/
        - src: "{{ niri_tmp.path }}/resources/niri-portals.conf"
          dest: /usr/local/share/xdg-desktop-portal/
        - src: "{{ niri_tmp.path }}/resources/niri.service"
          dest: /usr/local/lib/systemd/user/
        - src: "{{ niri_tmp.path }}/resources/niri-shutdown.target"
          dest: /usr/local/lib/systemd/user/
      become: true

    # CLEANUP (added 2026-07-09): remove once every niri host has run this role at least
    # once.
    #
    # niri is installed under /usr/local, so its units belong in
    # /usr/local/lib/systemd/user. Copies written there by an earlier version of this
    # role outrank them and shadow every later change.
    - name: Remove niri units from the administrator unit directory
      ansible.builtin.file:
        path: "/etc/systemd/user/{{ item }}"
        state: absent
      loop:
        - niri.service
        - niri-shutdown.target
      become: true

    # Unconditional and idempotent: `reenable` rewrites the enable symlink, which records
    # an absolute path into the directory emptied above, and `systemctl enable` will not
    # rewrite it for a unit it already considers enabled. become_user and XDG_RUNTIME_DIR
    # are required because sudo's env_reset drops the latter, and without it
    # `systemctl --user` targets the escalated user's manager rather than niri_user's.
    - name: Re-enable niri.service against its unit path # noqa: command-instead-of-module
      ansible.builtin.command: systemctl --user reenable niri.service
      changed_when: false
      become: true
      become_user: "{{ niri_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ niri_user_uid }}"

    - name: Configure electron flags for Wayland
      ansible.builtin.lineinfile:
        path: "{{ niri_user_home }}/.config/electron-flags.conf"
        line: "--ozone-platform-hint=auto"
        create: true
        mode: "0644"

    - name: Enable niri.service
      ansible.builtin.systemd_service:
        name: niri.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
      when: ansible_service_mgr == 'systemd'
