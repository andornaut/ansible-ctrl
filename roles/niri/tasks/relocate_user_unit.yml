---
# Move systemd user units out of the administrator's directory and re-assert the enable
# symlinks of the ones that carry an [Install] section.
#
# Required vars:
#   niri_relocate_units (list[str]): unit filenames to remove from /etc/systemd/user
#
# Optional vars:
#   niri_relocate_enable_units (list[str]): units to re-enable, default []. Only units
#     with an [Install] section belong here: `reenable` on a unit without one warns and
#     changes nothing (niri.service and niri-shutdown.target are both in that category).
#
# /etc/systemd/user is the administrator's directory and outranks
# /usr/local/lib/systemd/user, so a copy written there by an earlier version of this role
# shadows the installed unit and every later change to it is a no-op.
#
# The enable symlink stores an absolute path into the directory emptied below, and
# `systemctl enable` will not overwrite a symlink whose target differs. `reenable` does,
# and is idempotent, so it asserts the end state: a run interrupted between the two tasks
# still converges on the next run.
#
# become_user and XDG_RUNTIME_DIR are both required. sudo's env_reset drops the latter,
# and without it `systemctl --user` targets the escalated user's manager, not niri_user's.

# CLEANUP (added 2026-07-09): remove the caller's include, and this file, once every niri
# host has run this role at least once.
- name: Remove {{ niri_relocate_units | join(', ') }} from the administrator unit directory
  ansible.builtin.file:
    path: "/etc/systemd/user/{{ item }}"
    state: absent
  loop: "{{ niri_relocate_units }}"
  become: true

- name: Re-enable the relocated units against their unit paths # noqa: command-instead-of-module
  ansible.builtin.command: "systemctl --user reenable {{ item }}"
  loop: "{{ niri_relocate_enable_units | default([]) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
  become: true
  become_user: "{{ niri_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ niri_user_uid }}"
