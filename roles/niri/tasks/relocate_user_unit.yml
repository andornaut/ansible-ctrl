---
# Remove shadowing systemd user units from /etc/systemd/user and re-assert enable symlinks.
# /etc/systemd/user outranks /usr/local/lib/systemd/user, so a stray copy there shadows the
# installed unit and every later change is a no-op.
#
# Required vars:
#   niri_relocate_units (list[str]): unit filenames to remove from /etc/systemd/user
#
# Optional vars:
#   niri_relocate_enable_units (list[str]): units to re-enable, default []. Only units with
#     an [Install] section; `reenable` on one without warns and does nothing.
#
# `reenable` (not `enable`) so the enable symlink's absolute path is repointed away from the
# emptied directory; it is idempotent, so an interrupted run still converges.
#
# become_user + XDG_RUNTIME_DIR are both required: sudo's env_reset drops the latter, so
# without it `systemctl --user` targets the escalated user's manager, not niri_user's.

# CLEANUP (added 2026-07-09): remove the caller's include, and this file, once every niri
# host has run this role at least once.
- name: Remove the relocated units from the administrator unit directory
  ansible.builtin.file:
    path: "/etc/systemd/user/{{ item }}"
    state: absent
  loop: "{{ niri_relocate_units }}"
  loop_control:
    label: "{{ item }}"
  become: true

- name: Re-enable the relocated units against their unit paths # noqa: command-instead-of-module
  ansible.builtin.command: "systemctl --user reenable {{ item }}"
  loop: "{{ niri_relocate_enable_units | default([]) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
  become: true
  become_user: "{{ niri_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ niri_user_uid }}"
