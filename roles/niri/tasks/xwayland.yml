---
- name: Install xwayland-satellite
  tags: [xwayland]
  block:
    - name: Create a temporary directory for xwayland-satellite
      ansible.builtin.tempfile:
        state: directory
      register: niri_xwayland_tmp

    - name: Get latest xwayland-satellite release
      ansible.builtin.include_tasks: get_latest_github_release.yml
      vars:
        github_release_repo: Supreeeme/xwayland-satellite
        github_release_fact: niri_xwayland_release

    - name: Set xwayland-satellite version fact
      ansible.builtin.set_fact:
        niri_xwayland_version: "{{ niri_xwayland_release.tag_name }}"

    - name: Download and unarchive xwayland-satellite
      ansible.builtin.unarchive:
        src: "https://github.com/Supreeeme/xwayland-satellite/archive/refs/tags/\
          {{ niri_xwayland_version }}.tar.gz"
        dest: "{{ niri_xwayland_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Build xwayland-satellite
      ansible.builtin.command:
        cmd: cargo build --release -F systemd
        chdir: "{{ niri_xwayland_tmp.path }}"
      changed_when: true

    - name: Configure xwayland-satellite.service
      community.general.ini_file:
        no_extra_spaces: true
        path: "{{ niri_xwayland_tmp.path }}/resources/xwayland-satellite.service"
        section: Service
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        mode: "0644"
      loop:
        - option: ExecStart
          value: /usr/local/bin/xwayland-satellite
        - option: Environment
          value: DISPLAY=:0

    # Binary lives under /usr/local, so its unit belongs in /usr/local/lib/systemd/user.
    - name: Create the local systemd user unit directory
      ansible.builtin.file:
        path: /usr/local/lib/systemd/user
        state: directory
        mode: "0755"
      become: true

    - name: Copy xwayland-satellite files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: true
        mode: "0644"
      loop:
        - src: "{{ niri_xwayland_tmp.path }}/resources/xwayland-satellite.service"
          dest: /usr/local/lib/systemd/user/
        - src: "{{ niri_xwayland_tmp.path }}/target/release/xwayland-satellite"
          dest: /usr/local/bin/
      become: true

    - name: Relocate the xwayland-satellite unit
      ansible.builtin.include_tasks: relocate_user_unit.yml
      vars:
        niri_relocate_units: [xwayland-satellite.service]
        niri_relocate_enable_units: [xwayland-satellite.service]

    - name: Enable xwayland-satellite.service
      ansible.builtin.systemd_service:
        name: xwayland-satellite.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
  always:
    - name: Remove the temporary directory for xwayland-satellite
      ansible.builtin.file:
        path: "{{ niri_xwayland_tmp.path }}"
        state: absent
      when: niri_xwayland_tmp.path is defined
      become: true
