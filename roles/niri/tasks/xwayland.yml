---
- name: Install xwayland-satellite
  tags: [xwayland]
  block:
    - name: Create a temporary directory for xwayland-satellite
      ansible.builtin.tempfile:
        state: directory
      register: niri_xwayland_tmp

    - name: Get releases of xwayland-satellite
      ansible.builtin.uri:
        url: https://api.github.com/repos/Supreeeme/xwayland-satellite/releases
        return_content: true
      register: niri_xwayland_releases

    - name: Set xwayland-satellite version to latest stable release
      ansible.builtin.set_fact:
        niri_xwayland_version: >-
          {{ (niri_xwayland_releases.json
          | selectattr('prerelease', 'equalto', false)
          | selectattr('draft', 'equalto', false)
          | list | first).tag_name }}

    - name: Download and unarchive xwayland-satellite {{ niri_xwayland_version }}
      ansible.builtin.unarchive:
        src: https://github.com/Supreeeme/xwayland-satellite/archive/refs/tags/{{ niri_xwayland_version }}.tar.gz
        dest: "{{ niri_xwayland_tmp.path }}"
        remote_src: true
        extra_opts:
          - --strip-components
          - 1

    - name: Build xwayland-satellite
      ansible.builtin.command:
        cmd: cargo build --release -F systemd
        chdir: "{{ niri_xwayland_tmp.path }}"

    - name: Configure xwayland-satellite.service
      community.general.ini_file:
        no_extra_spaces: true
        path: "{{ niri_xwayland_tmp.path }}/resources/xwayland-satellite.service"
        section: Service
        option: "{{ item.option }}"
        value: "{{ item.value }}"
      loop:
        - option: ExecStart
          value: /usr/local/bin/xwayland-satellite
        - option: Environment
          value: DISPLAY=:0

    - name: Copy xwayland-satellite files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
      loop:
        - src: "{{ niri_xwayland_tmp.path }}/resources/xwayland-satellite.service"
          dest: /etc/systemd/user/
        - src: "{{ niri_xwayland_tmp.path }}/target/release/xwayland-satellite"
          dest: /usr/local/bin/
      become: true

    - name: Enable xwayland-satellite.service
      ansible.builtin.systemd_service:
        name: xwayland-satellite.service
        daemon_reload: true
        enabled: true
        scope: user
        state: started
