---
- name: Ensure script directory exists
  ansible.builtin.file:
    path: "{{ repo_maintenance_script_path | dirname }}"
    state: directory
    mode: "0755"

- name: Download github-maintainer script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/andornaut/github-maintainer/main/github-maintainer
    dest: "{{ repo_maintenance_script_path }}"
    mode: "0755"
    force: true

- name: Remove old cron entry from user crontab
  ansible.builtin.cron:
    name: "Automated GitHub repository maintenance"
    state: absent

- name: Create cron file for automated repo maintenance
  ansible.builtin.template:
    src: cron.j2
    dest: /etc/cron.d/ansible-role-repo-maintenance
    mode: "0644"
    owner: root
    group: root
  become: true

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "Repository maintenance configured:"
      - "  Base directory: {{ repo_maintenance_base_dir }}"
      - "  Agent: {{ repo_maintenance_agent_command }} {{ repo_maintenance_agent_flags }}"
      - "  Script: {{ repo_maintenance_script_path }}"
      - "  Schedule: {{ repo_maintenance_cron_hour }}:{{ repo_maintenance_cron_minute }} daily"
      - "  Dry run: {{ repo_maintenance_dry_run }}"
      - ""
      - "Run manually:"
      - "  {{ repo_maintenance_script_path }}"
      - "  {{ repo_maintenance_script_path }} --dry-run --verbose"
