---
- name: Ensure script directory exists
  ansible.builtin.file:
    path: "{{ repo_maintenance_script_path | dirname }}"
    state: directory
    mode: "0755"

- name: Download github-maintainer script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/andornaut/github-maintainer/main/github-maintainer
    dest: "{{ repo_maintenance_script_path }}"
    mode: "0755"
    force: yes

- name: Create cron job for automated repo maintenance
  ansible.builtin.cron:
    name: "Automated GitHub repository maintenance"
    minute: "{{ repo_maintenance_cron_minute }}"
    hour: "{{ repo_maintenance_cron_hour }}"
    day: "{{ repo_maintenance_cron_day }}"
    weekday: "{{ repo_maintenance_cron_weekday }}"
    job: >
      {{ repo_maintenance_script_path }}
      --base-dir {{ repo_maintenance_base_dir }}
      --agent-command {{ repo_maintenance_agent_command }}
      --agent-flags "{{ repo_maintenance_agent_flags }}"
      --dependency-age-threshold {{ repo_maintenance_dependency_age_threshold }}
      {% if not repo_maintenance_auto_merge_dependabot %}--no-merge-dependabot{% endif %}
      {% if not repo_maintenance_auto_update_dependencies %}--no-update-dependencies{% endif %}
      {% if not repo_maintenance_run_tests %}--no-run-tests{% endif %}
      {% if not repo_maintenance_push_changes %}--no-push{% endif %}
      {% if repo_maintenance_dry_run %}--dry-run{% endif %}
    state: present

- name: Display configuration summary
  ansible.builtin.debug:
    msg:
      - "Repository maintenance configured:"
      - "  Base directory: {{ repo_maintenance_base_dir }}"
      - "  Agent: {{ repo_maintenance_agent_command }} {{ repo_maintenance_agent_flags }}"
      - "  Script: {{ repo_maintenance_script_path }}"
      - "  Schedule: {{ repo_maintenance_cron_hour }}:{{ repo_maintenance_cron_minute }} daily"
      - "  Dry run: {{ repo_maintenance_dry_run }}"
      - ""
      - "Run manually:"
      - "  {{ repo_maintenance_script_path }}"
      - "  {{ repo_maintenance_script_path }} --dry-run --verbose"
