# CI-only inventory for `ansible-playbook --syntax-check`.
# The real inventory (`hosts`) and `host_vars/` are gitignored, so this file exists
# only to give the lint workflow a resolvable member for every group the playbooks
# target. It is never used to run a playbook against a real host.
ci-dummy ansible_connection=local desktop_environment=bspwm

[desktop]
ci-dummy

[dev]
ci-dummy

[games]
ci-dummy

[hobbies]
ci-dummy

[homeautomation]
ci-dummy

[nas]
ci-dummy

[rsnapshot]
ci-dummy

[torrent]
ci-dummy

[webservers]
ci-dummy
