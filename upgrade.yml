--- # noqa: run-once[play]
- name: Upgrade all packages
  hosts: all
  # Upgrade durations vary widely per host, so let each host run ahead rather
  # than wait at a task barrier. Output from different hosts interleaves.
  # run-once[play] is suppressed above (play-level noqa must sit on line 1):
  # the rule guards run_once under strategy free, and this play has no run_once.
  strategy: free
  tasks:
    - name: Apt autoremove, clean, and dist-upgrade
      ansible.builtin.apt:
        autoclean: true
        autoremove: true
        clean: true
        purge: true
        update_cache: true
        upgrade: dist
      become: true

    - name: Gathering package facts
      ansible.builtin.package_facts:

    - name: Upgrade flatpak system packages
      ansible.builtin.command: flatpak --noninteractive --system upgrade
      become: true
      register: flatpak_system_result
      changed_when: "'Nothing to do.' not in flatpak_system_result.stdout"
      when: "'flatpak' in ansible_facts.packages"

    - name: Upgrade flatpak user packages
      ansible.builtin.command: flatpak --noninteractive --user upgrade
      register: flatpak_user_result
      changed_when: "'Nothing to do.' not in flatpak_user_result.stdout"
      when: "'flatpak' in ansible_facts.packages"
