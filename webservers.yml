---
# The renewal cron job that re-runs this playbook is set by the role, on the host whose
# host_vars sets letsencrypt_nginx_install_renewal_cron. It used to be a second play here,
# against localhost, which no tag selected: the nightly run passes --tags letsencrypt and so
# never reconciled it, and only a full run did. Being in the role, it is now reconciled by
# the run it schedules.
- name: Apply letsencrypt_nginx role
  hosts: webservers
  roles:
    # Uncomment the `base` and `docker` on the first run
    # - base
    # - docker
    - letsencrypt_nginx
  tags:
    - nginx
    - letsencrypt
